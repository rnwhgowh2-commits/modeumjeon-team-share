---
# 롯데홈쇼핑 셀렉터 (V7 lotteParseProduct + dataBenefit inline JSON)

site: lotteimall
schema_version: 0.1
last_updated: 2026-05-17

# ────────────────────────────────────────
# 상품명
# ────────────────────────────────────────
product_name:
  priority_1:
    selector: "div.title"
  priority_2:
    selector: "span.ir_name"
    filter: "첫 번째, length < 80, '[' 시작 X"
  priority_3:
    type: document_title
    transform: "split('|')[0].trim()"

# ────────────────────────────────────────
# 브랜드
# ────────────────────────────────────────
brand:
  primary:
    selector: "div.name"
  fallback: "'롯데홈쇼핑' 리터럴"

# ────────────────────────────────────────
# 가격
# ────────────────────────────────────────
prices:
  sale:
    selector: ".final span.num"
  max:
    selector: ".price > span.num"
    note: "할인가 셀렉터. ⚠️ 2026-07-18 정정 — '최대할인가=카드 반영' 이라는 옛 설명은 틀렸다.
      최대할인가(카드 포함)는 dataBenefit.commonDiscountObj.benefitPrc 다.
      표면노출가(crawled_price)는 _resolve_surface_price() 가 단일 진실 원천."
  original:
    selector: "span.num"
    filter: "부모 className 에 'ir_price' 포함된 첫 번째"
  discount_info:
    selector: ".max_discount_list"
    transform: "줄바꿈을 ' / ' 로 join"

# ────────────────────────────────────────
# 옵션
# ────────────────────────────────────────
options:
  containers: "div.inp_option.inpOptList"
  positions:
    color: opt_lists[0]
    size: opt_lists[1]
  item: "p.txt_option"
  header_filter:
    regex: '^(색상|사이즈)\\s*선택$'
    action: "이 텍스트는 옵션 아님 — 제외"
  soldout:
    selector: "div.layer_option li.soldout p.txt_option"
    behavior: "색상/사이즈 모두 같은 set 사용 (matched by name)"

# ────────────────────────────────────────
# Inline JSON (dataBenefit)
# ────────────────────────────────────────
inline_json:
  data_benefit:
    pattern: 'dataBenefit\\s*=\\s*\\n?\\s*(\\{.+?\\});'
    flags: DOTALL
    why: "JS 변수에 commonDiscountObj.benefitPrc / cardDiscountList / lPointObj 등 핵심 정책 데이터 포함"
  card_discount_em:
    pattern: '\\d{1,3}(?:,\\d{3})*원\\s*\\(([가-힣]+카드)\\s*(\\d+)%\\)'
    selector_context: "em.txt_em 텍스트 예: '120,320원 (국민카드 5%)'"

# ────────────────────────────────────────
# 알려진 변동
# ────────────────────────────────────────
known_changes:
  - date: 2026-05-13
    change: "사이트 자동 카드 할인 추출 추가 (em.txt_em + dataBenefit.cardDiscountList[])"
  - date: 2026-05-14
    change: "구매 적립 L.POINT 추출 추가 (dataBenefit.lPointObj)"
  - date: 2026-05-14
    change: "도메인 라우팅 추가 — lotteon.com 은 별도 Playwright + pbf API 분기 (docs/sources/lotteon/)"
