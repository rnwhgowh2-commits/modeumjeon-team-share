# fly.toml app configuration file generated for modeumjeon-team-share on 2026-05-15T00:03:10+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'modeumjeon-team-share'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  # v34.10 — 단일 머신 강제. icon_overrides.json 이 머신 로컬 파일이라
  #   여러 머신 spawn 시 데이터 불일치 (한 머신에 저장 → 다른 머신에 없음 → 색 사라짐).
  #   해결: 자동 스케일링 비활성 + 항상 1대 유지.
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
