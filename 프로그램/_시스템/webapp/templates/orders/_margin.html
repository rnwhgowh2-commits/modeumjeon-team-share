<link rel="stylesheet" href="{{ url_for('static', filename='margin.css') }}?v=20260711a">
<div id="margin-app">

  <div class="mg-upload">
    <div class="mg-ucard">
      <div class="mg-urow" data-step="buy">
        <span class="mg-ubadge">1</span>
        <div class="mg-umain"><div class="mg-ut">더망고 엑셀 올리기</div>
          <div class="mg-us" id="mg-buy-status">파일을 선택하거나 끌어다 놓으세요</div></div>
        <label class="mg-uact p">파일 선택<input type="file" id="mg-buy-file" accept=".xls,.xlsx,.htm,.html" hidden></label>
      </div>
      <div class="mg-urow" data-step="period">
        <span class="mg-ubadge">2</span>
        <div class="mg-umain"><div class="mg-ut">조회 기간</div>
          <div class="mg-us">
            <input type="date" id="mg-since"> ~ <input type="date" id="mg-until">
            <span id="mg-period-auto" class="mg-hint"></span></div></div>
      </div>
      <div class="mg-urow" data-step="fetch">
        <span class="mg-ubadge">3</span>
        <div class="mg-umain"><div class="mg-ut">주문 불러오기 + 분석</div>
          <div class="mg-us" id="mg-analyze-status">더망고 엑셀을 먼저 올리세요</div></div>
        <button class="mg-uact p" id="mg-analyze-btn" disabled>분석 시작</button>
      </div>
      <details class="mg-optional">
        <summary>옥션·G마켓 주문이 있으면 — 샵마인 엑셀 추가 (선택)</summary>
        <label class="mg-uact g">샵마인 엑셀<input type="file" id="mg-sm-file" accept=".xls,.xlsx" hidden></label>
        <span id="mg-sm-status" class="mg-hint"></span>
      </details>
    </div>
  </div>

  <div id="mg-warn" class="mg-warn" hidden></div>

  <div class="mg-body">
    <nav class="mg-subnav" id="mg-subnav">
      <a data-mtab="summary" class="on">요약</a>
      <a data-mtab="all">전체내역</a>
      <a data-mtab="daily">일별</a>
      <a data-mtab="monthly">월별</a>
      <a data-mtab="brand">브랜드별</a>
      <a data-mtab="pricerange">금액대별</a>
      <a data-mtab="product">상품별</a>
      <a data-mtab="market">마켓별</a>
      <a data-mtab="source">소싱처별</a>
      <a class="soon" title="다음 업데이트에서 제공">⚫ 블랙스팟 · 준비중</a>
      <a class="soon" title="다음 업데이트에서 제공">⚙️ 설정 · 준비중</a>
    </nav>
    <section class="mg-content" id="mg-content">
      <div class="mg-empty" id="mg-empty">더망고 엑셀을 올리고 <b>분석 시작</b>을 누르면 결과가 여기 표시됩니다.</div>
      <div id="mg-panes" hidden></div>
    </section>
  </div>

  <div class="mg-history">
    <div class="mg-hh">최근 분석</div>
    <div id="mg-history-list" class="mg-hlist"></div>
  </div>
</div>
<script src="{{ url_for('static', filename='margin_rules.js') }}?v=20260711a"></script>
<script src="{{ url_for('static', filename='margin_render.js') }}?v=20260711a"></script>
<script src="{{ url_for('static', filename='margin_app.js') }}?v=20260711a"></script>
<script>
  window.MG_RENDER = function(d){
    window.__mgData = d;
    var nav = document.getElementById('mg-subnav');
    if (nav) {
      nav.querySelectorAll('a').forEach(function(x){ x.classList.remove('on'); });
      var s = nav.querySelector('a[data-mtab="summary"]'); if (s) s.classList.add('on');
    }
    window.MG_SHOW_TAB('summary', d);
  };
  window.MG_SHOW_TAB = function(tab, d){
    var r = (window.MG_RENDERERS || {})[tab];
    document.getElementById('mg-panes').innerHTML = r ? r(d)
      : '<div class="mg-empty">이 탭은 다음 태스크에서 구현됩니다.</div>';
  };
</script>
<script>
  document.getElementById('mg-panes').addEventListener('change', function(e){
    var sel = e.target.closest('select[data-f]'); if(!sel) return;
    function q(f){ var s=document.querySelector('select[data-f="'+f+'"]'); return s?s.value:''; }
    var mk=q('마켓'), br=q('브랜드'), pr=q('금액대');
    document.querySelectorAll('.mg-tbl tbody tr').forEach(function(tr){
      var show=(!mk||tr.dataset.mk===mk)&&(!br||tr.dataset.br===br)&&(!pr||tr.dataset.pr===pr);
      tr.style.display = show?'':'none';
    });
  });
  document.getElementById('mg-panes').addEventListener('click', function(e){
    var b=e.target.closest('[data-export]'); if(!b||!window.__mgData) return;
    var visible=[...document.querySelectorAll('.mg-tbl tbody tr')].filter(function(tr){return tr.style.display!=='none';});
    // 화면 필터 결과를 서버로 보내 엑셀 생성 (analysis_id + tab)
    fetch('/api/margin/export',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({analysis_id:window.__mgData.analysis_id, tab:'all'})})
      .then(function(r){return r.blob();}).then(function(bl){
        var u=URL.createObjectURL(bl),a=document.createElement('a');a.href=u;a.download='마진분석.xlsx';a.click();URL.revokeObjectURL(u);
      });
  });
</script>
