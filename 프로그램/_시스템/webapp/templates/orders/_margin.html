{# 마진 탭 = 원본 마진계산기 풀페이지(무수정 이식)를 same-origin iframe 으로 임베드 (C3).
   구 재구현본(margin_app.js·margin_render.js·margin.css·_margin.html 본문)은 폐기 —
   원본을 그대로 담는다. 바레 라우트 /orders/margin-embed 가 X-Frame-Options: SAMEORIGIN 로 서빙. #}
<iframe
  id="margin-embed-frame"
  src="{{ url_for('orders.margin_embed') }}"
  title="마진계산기"
  style="display:block;width:100%;height:calc(100vh - 210px);min-height:720px;border:0;border-radius:12px;background:#fff;"
  loading="lazy"></iframe>
