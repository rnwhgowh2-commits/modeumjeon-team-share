{# PARITY_720 Tier 1 (A4-57, A4-58) — 세금·할인 섹션 + 일괄 적용. #}

{% macro tax_discount_section() %}
<div style="border:1px solid #E5E8EB;border-radius:6px;padding:12px;background:#FAFBFC">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <strong style="font-size: 14px;color:#191F28">세금 및 할인</strong>
    <span style="font-size: 14px;color:#9CA3AF">(라인별이 아닌 거래 전체)</span>
    <button type="button" onclick="td_addTax()" style="margin-left:auto;background:#fff;border:1px dashed #D1D6DB;color:#4E5968;padding:4px 10px;border-radius:5px;font-size: 14px;cursor:pointer">+ 세금 추가</button>
    <button type="button" onclick="td_addDiscount()" style="background:#fff;border:1px dashed #D1D6DB;color:#4E5968;padding:4px 10px;border-radius:5px;font-size: 14px;cursor:pointer">+ 할인 추가</button>
    <select id="td_preset" onchange="td_preset(this.value)" style="padding:4px 10px;border:1px solid #D1D6DB;border-radius:5px;font-size: 14px;background:#fff">
      <option value="">▾ 일괄 적용</option>
      <option value="vat10_incl">부가세 10% (포함)</option>
      <option value="vat10_excl">부가세 10% (별도)</option>
      <option value="vat0">면세 (0%)</option>
      <option value="dc_amount_1000">할인 -1,000원</option>
      <option value="dc_rate_5">할인 -5%</option>
    </select>
  </div>
  <div id="td_taxes"></div>
  <div id="td_discounts"></div>
  <input type="hidden" name="tax_data" id="td_taxData" value="[]">
  <input type="hidden" name="discount_data" id="td_discData" value="[]">
  <div style="display:flex;justify-content:flex-end;gap:14px;margin-top:8px;padding-top:8px;border-top:1px solid #E5E8EB;font-size: 14px;color:#4E5968">
    <span>세금 합계: <strong id="td_taxTotal" style="color:#191F28">0</strong>원</span>
    <span>할인 합계: <strong id="td_dcTotal" style="color:#EF4444">0</strong>원</span>
    <span>총액: <strong id="td_grandTotal" style="color:#3182F6;font-size:13px">0</strong>원</span>
  </div>
</div>
<script>
(function(){
  let taxes=[], discounts=[];
  function row(item, kind, idx){
    const isTax=kind==='tax';
    const opts=isTax?'<option value="incl">포함</option><option value="excl">별도</option>':'<option value="amount">정액(원)</option><option value="rate">정률(%)</option>';
    return `<div style="display:flex;gap:6px;margin-bottom:5px" data-idx="${idx}" data-kind="${kind}">
      <input type="text" placeholder="${isTax?'세금명 (예: 부가세)':'할인명 (예: 단골 할인)'}" value="${item.name||''}" onchange="td_update('${kind}',${idx},'name',this.value)" style="flex:1;padding:6px 9px;border:1px solid #D1D6DB;border-radius:5px;font-size: 14px">
      <input type="number" placeholder="${isTax?'세율':'값'}" value="${item.value||''}" onchange="td_update('${kind}',${idx},'value',this.value)" style="width:80px;padding:6px 9px;border:1px solid #D1D6DB;border-radius:5px;font-size: 14px;text-align:right">
      <select onchange="td_update('${kind}',${idx},'type',this.value)" style="padding:6px 9px;border:1px solid #D1D6DB;border-radius:5px;font-size: 14px;background:#fff">${opts}</select>
      <button type="button" onclick="td_remove('${kind}',${idx})" style="background:none;border:none;color:#EF4444;font-size:14px;cursor:pointer">×</button>
    </div>`;
  }
  function render(){
    document.getElementById('td_taxes').innerHTML=taxes.map((t,i)=>row(t,'tax',i)).join('');
    document.getElementById('td_discounts').innerHTML=discounts.map((d,i)=>row(d,'discount',i)).join('');
    // 같은 행 select 의 value 강제 동기화
    document.querySelectorAll('#td_taxes [data-idx]').forEach(d=>{const i=+d.dataset.idx;d.querySelector('select').value=taxes[i].type||'incl'});
    document.querySelectorAll('#td_discounts [data-idx]').forEach(d=>{const i=+d.dataset.idx;d.querySelector('select').value=discounts[i].type||'amount'});
    document.getElementById('td_taxData').value=JSON.stringify(taxes);
    document.getElementById('td_discData').value=JSON.stringify(discounts);
    recalc();
  }
  function recalc(){
    const subtotal = parseInt(document.getElementById('kpiSubtotal')?.textContent.replace(/,/g,'')) || 0;
    let tx=0, dc=0;
    taxes.forEach(t=>{const v=parseFloat(t.value)||0; tx += t.type==='excl' ? Math.round(subtotal*v/100) : 0});
    discounts.forEach(d=>{const v=parseFloat(d.value)||0; dc += d.type==='rate' ? Math.round(subtotal*v/100) : v});
    document.getElementById('td_taxTotal').textContent=tx.toLocaleString();
    document.getElementById('td_dcTotal').textContent='-'+dc.toLocaleString();
    document.getElementById('td_grandTotal').textContent=(subtotal+tx-dc).toLocaleString();
  }
  window.td_addTax=function(){taxes.push({name:'',value:0,type:'incl'});render()};
  window.td_addDiscount=function(){discounts.push({name:'',value:0,type:'amount'});render()};
  window.td_remove=function(kind,i){if(kind==='tax')taxes.splice(i,1);else discounts.splice(i,1);render()};
  window.td_update=function(kind,i,key,val){const arr=kind==='tax'?taxes:discounts; arr[i][key]=key==='value'?parseFloat(val)||0:val; if(kind==='tax')document.getElementById('td_taxData').value=JSON.stringify(taxes);else document.getElementById('td_discData').value=JSON.stringify(discounts); recalc()};
  window.td_preset=function(v){
    if(v==='vat10_incl'){taxes=[{name:'부가세',value:10,type:'incl'}]}
    else if(v==='vat10_excl'){taxes=[{name:'부가세',value:10,type:'excl'}]}
    else if(v==='vat0'){taxes=[{name:'면세',value:0,type:'incl'}]}
    else if(v==='dc_amount_1000'){discounts=[{name:'할인',value:1000,type:'amount'}]}
    else if(v==='dc_rate_5'){discounts=[{name:'할인',value:5,type:'rate'}]}
    document.getElementById('td_preset').value='';
    render();
  };
  // 라인 변경 시 KPI subtotal 갱신 후 recalc 도 자동 호출되도록 polling
  setInterval(recalc, 500);
  render();
})();
</script>
{% endmacro %}
