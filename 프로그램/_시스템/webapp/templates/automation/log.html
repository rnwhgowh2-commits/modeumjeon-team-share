{% extends 'base.html' %}
{% block title %}자동화 로그기록 — 모음전 자동화{% endblock %}
{% block head %}
<style>
  .lg-wrap{max-width:1000px;padding:6px 4px;font-family:Pretendard,system-ui,sans-serif;}
  .lg-h{font-size:20px;font-weight:700;color:#191F28;margin-bottom:3px;}
  .lg-sub{font-size:13px;color:#6b7684;margin-bottom:18px;}
  /* 자동화 내역 로그 */
  .log-panel{background:#fff;border:1px solid #ececef;border-radius:14px;overflow:hidden;}
  .log-ph{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid #f2f3f5;}
  .log-t{font-size:14.5px;font-weight:700;} .log-c{font-size:12px;color:#9aa3af;margin-left:auto;font-variant-numeric:tabular-nums;}
  .log-tools{display:flex;flex-direction:column;gap:9px;padding:12px 16px;border-bottom:1px solid #f2f3f5;background:#fbfcfd;}
  .log-search{display:flex;align-items:center;gap:8px;border:1px solid #e9ebef;background:#fff;border-radius:9px;padding:0 12px;height:38px;}
  .log-search input{flex:1;border:0;outline:0;font-size:13px;font-family:inherit;color:#191F28;height:100%;background:transparent;}
  .log-search .clr{font-size:14px;color:#9aa3af;cursor:pointer;display:none;} .log-search.has .clr{display:block;}
  .frow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .flab{font-size:11.5px;font-weight:700;color:#9aa3af;width:44px;flex:none;}
  .fch{font-size:11.5px;font-weight:600;border:1px solid #e9ebef;background:#fff;color:#6b7684;border-radius:20px;padding:4px 11px;cursor:pointer;}
  .fch.on{background:#191F28;color:#fff;border-color:#191F28;}
  /* 상품단위(모음전×마켓) 그룹 아코디언 */
  .lgrp{border-bottom:1px solid #f2f3f5;}
  .lghead{display:flex;align-items:center;gap:9px;padding:12px 16px;cursor:pointer;user-select:none;}
  .lghead:hover{background:#fbfcfd;}
  .lcaret{color:#b0b8c1;font-size:12px;width:12px;flex:none;transition:transform .15s;display:inline-block;}
  .lgrp.open .lcaret{transform:rotate(90deg);}
  .lgname{font-size:13.5px;font-weight:700;color:#191F28;}
  .lbrd{font-size:11.5px;font-weight:700;color:#333d4b;background:#f4f5f7;border-radius:6px;padding:2px 8px;white-space:nowrap;}
  .lmkt{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#4e5968;border:1px solid #e9ebef;border-radius:6px;padding:2px 8px;white-space:nowrap;background:#fff;}
  .lmkt .dot{width:7px;height:7px;border-radius:50%;flex:none;background:#c5ccd4;}
  .lmkt.coupang .dot{background:#854F0B;} .lmkt.smart .dot{background:#0a8f43;}
  .lgsum{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:#6b7684;}
  .lcnt{font-variant-numeric:tabular-nums;font-weight:700;} .lcnt.s{color:#c0392b;} .lcnt.p{color:#0F6E56;}
  .ltm{font-variant-numeric:tabular-nums;color:#9aa3af;}
  .lgbody{display:none;background:#fbfcfd;border-top:1px solid #f2f3f5;}
  .lgrp.open .lgbody{display:block;}
  /* 옵션 줄 — 배지 스타일(소/판 배지 + 라벨 + 오른쪽 값), 재고 별도 */
  .lorow{padding:15px 22px 17px;border-top:1px solid #eef1f4;}
  .lorow:first-child{border-top:0;}
  .loname{font-size:18px;font-weight:700;color:#191F28;margin-bottom:10px;}
  .prow{display:grid;grid-template-columns:24px 56px 1fr;align-items:center;column-gap:9px;padding:5px 0;font-size:16px;}
  .bdg{width:24px;height:24px;border-radius:6px;color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .bdg.src{background:#185FA5;} .bdg.sell{background:#854F0B;} .bdg.stock{background:#B4530B;}
  .plab{color:#4e5968;font-weight:600;}
  .pval{justify-self:end;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap;color:#191F28;}
  .pempty{color:#c0c6cf;font-weight:600;font-size:13.5px;}
  /* 위상: 최종 매입가=강조(진하게 큼) / 표면 노출가=회색 약하게 */
  .prow.cost .plab,.prow.cost .pval{color:#111827;font-weight:800;} .prow.cost .pval{font-size:18px;}
  .prow.surface .plab,.prow.surface .pval{color:#9aa3af;font-weight:500;}
  .prices{margin-top:10px;padding-top:10px;border-top:1px dashed #eef1f4;}
  .grp-lbl{font-size:12.5px;font-weight:700;color:#9aa3af;margin:0 0 5px 2px;}
  .log-empty{padding:26px;text-align:center;color:#9aa3af;font-size:12.5px;line-height:1.6;}
  .lgrp mark{background:#fff2ac;border-radius:2px;padding:0 1px;}
</style>
{% endblock %}
{% block content %}
<section class="screen active" id="screen-automation-log">
<div class="lg-wrap">
  <div class="lg-h">📜 자동화 로그기록</div>
  <div class="lg-sub">자동으로 감지·실행된 내역을 상품(모음전)별로 봅니다. 줄을 누르면 옵션별 변동이 펼쳐집니다.</div>

  <div class="log-panel">
    <div class="log-ph"><span class="log-t">자동화 내역</span><span class="log-c" id="log-count">최근 내역</span></div>
    <div class="log-tools">
      <div class="log-search" id="sbox">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9aa3af" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" placeholder="모음전·마켓·옵션에서 찾기 (예: 크림핑크, 쿠팡)">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="frow"><span class="flab">브랜드</span><span id="fbchips"></span></div>
      <div class="frow"><span class="flab">마켓</span><span id="fmchips"></span></div>
    </div>
    <div id="log-body"></div>
  </div>
  <script id="logdata" type="application/json">{{ logrows|tojson }}</script>
</div>
</section>
{% endblock %}
{% block scripts %}
<script>
// 자동화 내역 로그 — 상품단위(모음전×마켓) 접기 + 필터 + 검색
(function(){
  var el=document.getElementById('logdata'); if(!el) return;
  var GROUPS; try{ GROUPS=JSON.parse(el.textContent)||[]; }catch(e){ GROUPS=[]; }
  var brs=['전체'].concat(GROUPS.map(function(g){return g.brand;}).filter(function(v,i,a){return v&&a.indexOf(v)===i;}));
  var mks=['전체'].concat(GROUPS.map(function(g){return g.market;}).filter(function(v,i,a){return v&&a.indexOf(v)===i;}));
  document.getElementById('fbchips').innerHTML=brs.map(function(b,i){return '<span class="fch'+(i===0?' on':'')+'" data-fb="'+b+'">'+b+'</span>';}).join('');
  document.getElementById('fmchips').innerHTML=mks.map(function(m,i){return '<span class="fch'+(i===0?' on':'')+'" data-fm="'+m+'">'+m+'</span>';}).join('');
  var fbSel='전체',fmSel='전체',qStr='';
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function hl(t){ t=String(t); if(!qStr) return esc(t); var i=t.toLowerCase().indexOf(qStr.toLowerCase()); if(i<0) return esc(t); return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+qStr.length))+'</mark>'+esc(t.slice(i+qStr.length)); }
  function mkk(g){ return g.market_key==='coupang'?'coupang':(g.market_key==='smartstore'?'smart':''); }
  function tOf(iso){ var s=String(iso||''); if(s&&!/[zZ]|[+\-]\d\d:?\d\d$/.test(s)) s+='Z'; var d=new Date(s); if(isNaN(d.getTime())) return '—'; var p=function(n){return(n<10?'0':'')+n;}; return p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }
  function optText(g){ return (g.options||[]).map(function(o){ return o.name+' '+(o.parts||[]).map(function(p){return p.label+' '+p.value;}).join(' '); }).join(' '); }
  function pval(p){ if(p.empty){ var v=String(p.value).replace(/^→\s*/,''); return '<span class="pempty">빈데이터</span> → '+hl(v); } return hl(p.value); }
  function prow(p){
    var bcls=p.side==='소'?'src':(p.side==='판'?'sell':'stock');
    return '<div class="prow '+(p.field||'')+'"><span class="bdg '+bcls+'">'+hl(p.side)+'</span>'
      +'<span class="plab">'+hl(p.label)+'</span><span class="pval">'+pval(p)+'</span></div>';
  }
  function optHTML(o){
    var ps=o.parts||[];
    var stock=ps.filter(function(p){return p.field==='stock';});
    var prices=ps.filter(function(p){return p.field!=='stock';});
    var h='<div class="lorow"><div class="loname">'+hl(o.name)+'</div>';
    h+=stock.map(prow).join('');
    if(prices.length) h+='<div class="prices"><div class="grp-lbl">가격</div>'+prices.map(prow).join('')+'</div>';
    return h+'</div>';
  }
  function grpHTML(g,open){
    var sum='<span>재고 바뀐 옵션 <span class="lcnt s">'+g.stock_count+'</span> · 가격 <span class="lcnt p">'+g.price_count+'</span></span><span class="ltm">'+tOf(g.latest_at)+'</span>';
    return '<div class="lgrp'+(open?' open':'')+'"><div class="lghead"><span class="lcaret">▸</span>'
      +'<span class="lgname">'+hl(g.set_name)+'</span>'
      +'<span class="lmkt '+mkk(g)+'"><span class="dot"></span>'+hl(g.market)+'</span>'
      +'<span class="lgsum">'+sum+'</span></div>'
      +'<div class="lgbody">'+(g.options||[]).map(optHTML).join('')+'</div></div>';
  }
  function draw(){
    var body=document.getElementById('log-body');
    if(!GROUPS.length){ body.innerHTML='<div class="log-empty">아직 자동으로 감지된 변동이 없어요.<br>자동 실행이 돌면 여기에 쌓입니다.</div>'; document.getElementById('log-count').textContent='0개 상품'; return; }
    var list=GROUPS.filter(function(g){
      if(fbSel!=='전체'&&g.brand!==fbSel) return false;
      if(fmSel!=='전체'&&g.market!==fmSel) return false;
      if(qStr){ var hay=(g.set_name+' '+g.brand+' '+g.market+' '+optText(g)).toLowerCase(); if(hay.indexOf(qStr.toLowerCase())<0) return false; }
      return true;
    });
    var filtered=(qStr||fbSel!=='전체'||fmSel!=='전체');
    if(!list.length){ body.innerHTML='<div class="log-empty">조건에 맞는 내역이 없어요.</div>'; }
    else body.innerHTML=list.map(function(g,i){ return grpHTML(g, qStr?true:(i===0)); }).join('');
    body.querySelectorAll('.lghead').forEach(function(h){ h.addEventListener('click',function(){ h.parentNode.classList.toggle('open'); }); });
    var totOpt=list.reduce(function(a,g){return a+((g.options&&g.options.length)||0);},0);
    document.getElementById('log-count').textContent='상품 '+list.length+'개 · 옵션 '+totOpt+'개'+(filtered?' (걸러짐)':'');
  }
  document.querySelectorAll('[data-fb]').forEach(function(c){ c.addEventListener('click',function(){ document.querySelectorAll('[data-fb]').forEach(function(x){x.classList.remove('on');}); c.classList.add('on'); fbSel=c.getAttribute('data-fb'); draw(); }); });
  document.querySelectorAll('[data-fm]').forEach(function(c){ c.addEventListener('click',function(){ document.querySelectorAll('[data-fm]').forEach(function(x){x.classList.remove('on');}); c.classList.add('on'); fmSel=c.getAttribute('data-fm'); draw(); }); });
  var q=document.getElementById('q'), sbox=document.getElementById('sbox');
  q.addEventListener('input',function(){ qStr=q.value.trim(); sbox.classList.toggle('has',!!qStr); draw(); });
  document.getElementById('clr').addEventListener('click',function(){ q.value=''; qStr=''; sbox.classList.remove('has'); draw(); q.focus(); });
  draw();
})();
</script>
{% endblock %}
