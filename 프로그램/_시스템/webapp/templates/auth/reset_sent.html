{% extends "auth/_base_auth.html" %}
{% block title %}메일 발송 완료{% endblock %}

{% block content %}
  <h1 class="auth-title">메일을 확인해 주세요</h1>
  <p class="auth-desc">입력하신 이메일이 가입된 계정이라면 재설정 링크를 보냈습니다.</p>

  <div style="background: var(--color-info-bg); color: var(--color-info); padding: 14px 16px; border-radius: 10px; font-size: var(--fs-caption); line-height: 1.7; margin-bottom: 16px;">
    <strong>📬 메일이 도착하지 않으면?</strong><br>
    · 스팸 메일함도 확인해 주세요<br>
    · 잠시 후에도 안 오면 이메일 주소를 다시 확인해 주세요<br>
    · 링크는 <strong>1시간</strong> 동안 유효합니다
  </div>

  <a href="{{ url_for('auth.login') }}" class="btn-primary" style="display: block; text-align: center; text-decoration: none;">로그인 화면으로</a>
{% endblock %}
