{% extends 'base.html' %}
{% block title %}옵션을 찾을 수 없음{% endblock %}
{% block content %}
<div style="padding:48px 32px;max-width:680px;margin:80px auto;background:#fff;border:1px solid #E5E8EB;border-radius:12px;text-align:center">
  <div style="font-size:48px;margin-bottom:12px">🔍</div>
  <h1 style="font-size:22px;font-weight:700;margin:0 0 8px 0;color:#292A2F">옵션을 찾을 수 없습니다</h1>
  <p style="font-size:13.5px;color:#6B7684;line-height:1.7;margin:0 0 24px 0">
    요청하신 옵션 페이지가 더 이상 존재하지 않거나, 모음전이 삭제·이름 변경됐을 수 있어요.<br>
    북마크·즐겨찾기·옛 링크에서 이동하신 경우 이 페이지가 나옵니다.
  </p>
  <div style="background:#F9FAFB;border:1px solid #E5E8EB;border-radius:8px;padding:14px 18px;text-align:left;font-size: 14px;color:#6B7684;font-family:ui-monospace,monospace;margin-bottom:24px">
    <div>모음전 코드: <strong style="color:#292A2F">{{ requested_code }}</strong></div>
    <div>옵션 SKU: <strong style="color:#292A2F">{{ requested_sku }}</strong></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:center">
    <a href="{{ url_for('bundles.bundle_list') }}" style="background:#4F67FF;color:#fff;padding:10px 20px;border-radius:6px;font-size:13.5px;font-weight:600;text-decoration:none">모음전 목록으로</a>
    <a href="{{ url_for('inventory.data_items') }}" style="background:#fff;border:1px solid #CBCCD3;color:#292A2F;padding:10px 20px;border-radius:6px;font-size:13.5px;text-decoration:none">제품 목록</a>
    <a href="/" style="background:#fff;border:1px solid #CBCCD3;color:#292A2F;padding:10px 20px;border-radius:6px;font-size:13.5px;text-decoration:none">홈</a>
  </div>
</div>
{% endblock %}
