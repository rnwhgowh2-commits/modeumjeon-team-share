{% extends "base.html" %}
{% block title %}판매처 연동{% endblock %}
{% block head %}
<style>
  .sd-wrap{max-width:740px;margin:0 auto;padding:10px 6px;font-family:Pretendard,system-ui,sans-serif;zoom:1.5;}
  .sd-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .sd-title{font-size:20px;font-weight:700;color:#191F28;}
  .sd-sub{font-size:13px;color:#6b7684;margin-top:2px;}
  .sd-new{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:700;border:1px solid #3182f6;background:#3182f6;color:#fff !important;border-radius:8px;padding:9px 16px;text-decoration:none;white-space:nowrap;}
  .sd-edit{font-size:12px;font-weight:600;color:#3182f6;text-decoration:none;border:1px solid #c7d7f0;border-radius:6px;padding:3px 9px;margin-left:8px;white-space:nowrap;}
  .sd-edit:hover{background:#eef4ff;}
  .sd-del{font-size:12px;font-weight:600;color:#dc2626;background:#fff5f5;border:1px solid #f3c2c2;border-radius:6px;padding:3px 9px;margin-left:6px;cursor:pointer;white-space:nowrap;}
  .sd-del:hover{background:#fee2e2;}
  .dm-back{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;}
  .dm-back.on{display:flex;}
  .dm{width:100%;max-width:440px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;zoom:1.7;}
  .dm-h{padding:18px 20px 6px;font-size:17px;font-weight:800;color:#191F28;}
  .dm-b{padding:6px 20px 16px;font-size:13.5px;color:#4e5968;line-height:1.7;}
  .dm-warn{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;padding:10px 12px;font-size:12.5px;margin:4px 0 8px;line-height:1.6;}
  .dm-chk{display:flex;gap:8px;align-items:flex-start;font-size:13px;margin:8px 0;color:#4e5968;cursor:pointer;}
  .dm-code{font-family:monospace;background:#f1f3f5;padding:1px 6px;border-radius:4px;font-weight:700;}
  .dm-ipt{width:100%;border:1px solid #e5e8eb;border-radius:8px;padding:10px 12px;font-size:14px;margin-top:6px;font-family:inherit;}
  .dm-f{display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;background:#fafbfc;border-top:1px solid #e5e8eb;}
  .dm-cancel{background:#fff;border:1px solid #e5e8eb;border-radius:8px;padding:9px 16px;font-weight:600;color:#4e5968;cursor:pointer;}
  .dm-del{background:#dc2626;color:#fff !important;border:0;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;}
  .dm-del[disabled]{opacity:.45;cursor:not-allowed;}
  .sd-new:hover{background:#1b64da;}
  .sd-search{display:flex;align-items:center;gap:8px;border:1px solid #e5e8eb;border-radius:10px;padding:9px 13px;background:#fff;margin-bottom:14px;}
  .sd-search input{border:0;outline:0;flex:1;font-size:14px;font-family:inherit;color:#191F28;background:transparent;}
  .sd-card{background:#fff;border:1px solid #e5e8eb;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .sd-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;cursor:pointer;}
  .sd-name{font-size:15px;font-weight:700;color:#191F28;}
  .sd-bundle{font-size:11px;font-weight:700;background:#e8f1ff;color:#1d4ed8;border-radius:5px;padding:2px 7px;margin-right:6px;}
  .sd-chev{color:#b0b8c1;font-size:13px;margin-left:8px;}
  .sd-mk{display:inline-block;font-size:11.5px;font-weight:700;border-radius:5px;padding:3px 8px;margin-left:6px;}
  .sd-mk.coupang{background:#FAEEDA;color:#854F0B;}
  .sd-mk.smartstore{background:#E1F5EE;color:#0F6E56;}
  .sd-mk.other{background:#f1f3f5;color:#4e5968;}
  .sd-meta{font-size:11.5px;color:#8b95a1;margin-top:7px;}
  .sd-prods{margin-top:10px;border-top:1px solid #e5e8eb;padding-top:4px;}
  .sd-prod{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#4e5968;}
  .sd-cnt{font-size:11px;color:#8b95a1;}
  .sd-empty{text-align:center;padding:54px 20px;color:#8b95a1;font-size:14px;line-height:1.7;}
  .sd-match-ok{color:#047857;font-weight:700;}
  .sd-match-part{color:#b45309;font-weight:700;}
  /* 상세 */
  .sd-detail{margin-top:12px;border-top:1px solid #e5e8eb;padding-top:12px;}
  .det-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .det-tabs{display:inline-flex;border:1px solid #e5e8eb;border-radius:7px;overflow:hidden;}
  .det-tab{font-size:12px;padding:5px 12px;color:#4e5968;cursor:pointer;background:#fff;}
  .det-tab.on{background:#e8f1ff;color:#1d4ed8;font-weight:700;}
  .det-legend{font-size:11.5px;color:#8b95a1;}
  .b-buy{font-size:10.5px;padding:1px 6px;border-radius:4px;background:#FAEEDA;color:#854F0B;}
  .b-src{font-size:10.5px;padding:1px 6px;border-radius:4px;background:#E6F1FB;color:#185FA5;}
  table.det-tbl{width:100%;border-collapse:collapse;font-size:12px;}
  table.det-tbl th{font-weight:600;color:#8b95a1;text-align:left;padding:6px 6px;border-bottom:1px solid #e5e8eb;}
  table.det-tbl td{padding:6px 6px;border-bottom:1px solid #f1f3f5;color:#4e5968;}
  table.det-tbl tr.opt-row{cursor:pointer;}
  table.det-tbl tr.opt-row:hover{background:#f7faff;}
  .ta-r{text-align:right;}
  .rcp{background:#f9fafb;border:1px solid #eef1f4;border-radius:8px;padding:9px 12px;margin:2px 0 6px;}
  .rcp .rl{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#4e5968;}
  .rcp .rl.ded span:last-child{color:#dc2626;}
  .rcp .rl.ded span:first-child{padding-left:10px;}
  .rcp .rl.base{font-size:10.5px;color:#8b95a1;justify-content:flex-end;}
  .rcp .rl.total{border-top:1px solid #d7dbe0;margin-top:4px;padding-top:5px;}
  .rcp .rl.total b{color:#1d4ed8;font-size:14px;}
  table.mx-tbl{border-collapse:collapse;font-size:11.5px;text-align:center;}
  table.mx-tbl th,table.mx-tbl td{border:1px solid #e5e8eb;padding:5px 7px;}
  table.mx-tbl th{background:#f9fafb;color:#8b95a1;font-weight:700;}
  .mx-na{color:#c4cad2;}
  .pv-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:6px 0 4px;}
  .pv-btn{font-size:12px;font-weight:700;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;border-radius:7px;padding:6px 12px;cursor:pointer;}
  .pv-btn:hover{background:#dbeafe;}
  .pv-box{margin-top:10px;border:1px solid #e5e8eb;border-radius:10px;padding:11px 13px;background:#fafbfc;}
  .pv-head{font-size:12.5px;font-weight:700;color:#191F28;margin-bottom:8px;}
  .pv-warn{font-size:12px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:7px 10px;margin-bottom:8px;}
  .mk-logo{display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;border-radius:6px;}
  table.mx3{width:100%;table-layout:fixed;border-collapse:collapse;font-size:12px;margin-top:11px;}
  table.mx3 th{color:#98a2b3;font-weight:700;font-size:11px;padding:6px 8px;text-align:center;border-bottom:1px solid #eef1f4;}
  table.mx3 th.ta-l{text-align:left;}
  table.mx3 td{padding:8px;border-bottom:1px solid #f1f3f5;vertical-align:top;}
  table.mx3 td.ta-c{text-align:center;}
  table.mx3 td.mx-mk{display:flex;align-items:center;gap:8px;font-weight:700;color:#191F28;}
  table.mx3 tr:last-child td{border-bottom:0;}
  .mx-ts{display:block;font-size:10px;color:#98a2b3;line-height:1.3;font-variant-numeric:tabular-nums;}
  .mx-na{color:#c4cad2;}
  .mx-dual{margin-top:3px;display:flex;flex-direction:column;gap:1px;}
  .mx-dl{font-size:10px;color:#8b95a1;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:4px;justify-content:center;}
  .mx-dl i{font-style:normal;font-weight:800;width:14px;height:14px;line-height:14px;text-align:center;border-radius:3px;font-size:9px;color:#fff;}
  .dl-src{background:#185FA5;} .dl-mkt{background:#854F0B;}
  .mx-cell{cursor:pointer;border-radius:6px;}
  .mx-cell:hover{background:#eef4ff;outline:1px solid #c7d7f0;}
  .mx-legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:11px;color:#6b7684;margin:11px 0 2px;}
  .mx-legend i{font-style:normal;font-weight:800;width:14px;height:14px;line-height:14px;text-align:center;border-radius:3px;font-size:9px;color:#fff;margin-right:3px;display:inline-block;}
  .mx-hint{margin-left:auto;color:#1d4ed8;font-weight:700;}
  .st-done{color:#0F8A4D;} .st-part{color:#B45309;} .st-none{color:#98A2B3;}
</style>
{% endblock %}
{% block content %}
<div class="sd-wrap">
  <div class="sd-head">
    <div>
      <div class="sd-title">🏬 판매처 연동</div>
      <div class="sd-sub">판매처에 연동된 모음전 상품 · 마켓 매칭 · 최신 재고/가격 수집 현황</div>
    </div>
    <a class="sd-new" href="/api/sets/flow"><span style="font-size:17px;line-height:1;color:#fff">+</span>새 연동 만들기</a>
  </div>
  <div class="sd-search">
    <span style="color:#8b95a1">🔍</span>
    <input id="sd-q" type="text" placeholder="상품명·코드·마켓 상품번호 검색…" autocomplete="off">
  </div>
  <div id="sd-list"><div class="sd-empty">불러오는 중…</div></div>
</div>
<div class="dm-back" id="delModal">
  <div class="dm">
    <div class="dm-h">🗑️ 구성 삭제 — 확인</div>
    <div class="dm-b">
      <div class="dm-warn" id="delImpact"></div>
      <label class="dm-chk"><input type="checkbox" id="delChk1"> 연동된 마켓 매칭이 모두 사라지는 걸 이해합니다</label>
      <label class="dm-chk"><input type="checkbox" id="delChk2"> 되돌릴 수 없음을 이해합니다</label>
      확인을 위해 아래에 <span class="dm-code">삭제</span> 라고 입력하세요.
      <input class="dm-ipt" id="delInput" placeholder="삭제" autocomplete="off">
    </div>
    <div class="dm-f"><button class="dm-cancel" id="delCancel">취소</button><button class="dm-del" id="delConfirm" disabled>삭제</button></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  var listEl=document.getElementById('sd-list');
  var qEl=document.getElementById('sd-q');
  var timer=null;
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function fmt(n){ return (n==null||isNaN(n))?'-':Number(n).toLocaleString(); }
  function rel(iso){ if(!iso) return null; var d=new Date(iso); var s=(Date.now()-d.getTime())/1000; if(isNaN(s)) return null; if(s<0)s=0; if(s<3600)return Math.floor(s/60)+'분 전'; if(s<86400)return Math.floor(s/3600)+'시간 전'; return Math.floor(s/86400)+'일 전'; }

  function mkBadge(c){
    var cls=c.market==='coupang'?'coupang':(c.market==='smartstore'?'smartstore':'other');
    var nm=c.market==='coupang'?'쿠팡':(c.market==='smartstore'?'스마트스토어':esc(c.market));
    var num=c.market_product_id?(' '+esc(c.market_product_id)):' (번호없음)';
    var m;
    if(c.total>0){ m=' · 매칭 '+(c.matched===c.total?('<span class=sd-match-ok>'+c.matched+'</span>'):('<span class=sd-match-part>'+c.matched+'/'+c.total+'</span>')); }
    else { m=' · 미연동'; }
    return '<span class="sd-mk '+cls+'">'+nm+num+'</span>'+'<span class="sd-cnt">'+m+'</span>';
  }
  var MK={coupang:{nm:'쿠팡',sh:'쿠',c:'#E03A3E'},smartstore:{nm:'스마트스토어',sh:'스',c:'#03C75A'},gmarket:{nm:'G마켓',sh:'G',c:'#00A862'},st11:{nm:'11번가',sh:'11',c:'#FF0038'},toss:{nm:'토스',sh:'토',c:'#3182F6'},musinsa:{nm:'무신사',sh:'무',c:'#1a1a1a'}};
  function m3mk(market){ return MK[market]||{nm:esc(market),sh:(market||'?').slice(0,2),c:'#94a3b8'}; }
  function m3logo(market){ var m=m3mk(market); return '<span class="mk-logo" style="width:22px;height:22px;font-size:10px;background:'+m.c+'">'+m.sh+'</span>'; }
  function m3date(iso){ if(!iso) return '<span class="mx-na">-</span>'; var d=new Date(iso); if(isNaN(d.getTime())) return '<span class="mx-na">-</span>'; var p=function(n){return (n<10?'0':'')+n;}; var ymd=String(d.getFullYear()).slice(2)+'.'+p(d.getMonth()+1)+'.'+p(d.getDate()); return ymd+'<span class="mx-ts">'+p(d.getHours())+':'+p(d.getMinutes())+'</span>'; }
  function m3dual(srcIso, mktIso){ return '<div class="mx-dual"><span class="mx-dl"><i class="dl-src">소</i>'+m3date(srcIso)+'</span><span class="mx-dl"><i class="dl-mkt">판</i>'+m3date(mktIso)+'</span></div>'; }
  function m3match(c){ if(!c.total) return '<span class="st-none">-</span>'; var cls=(c.matched===c.total)?'st-done':'st-part'; return '<span class="'+cls+'" style="font-weight:700">'+c.matched+'/'+c.total+'</span>'; }
  function m3Table(r){
    if(!r.channels||!r.channels.length) return '<div class="sd-cnt" style="padding:6px 2px">판매처 없음</div>';
    var legend='<div class="mx-legend"><span><i class="dl-src">소</i> 소싱처 크롤 일자</span><span><i class="dl-mkt">판</i> 판매처 API 일자</span><span class="mx-hint">셀 클릭 - 변동이력</span></div>';
    var rows=r.channels.map(function(c){
      var mk=m3mk(c.market); var linked=c.total>0&&c.matched>0;
      var stock=linked?('있음'+m3dual(r.last_collected_at,c.mkt_fetched_at)):'<span class="mx-na">-</span>';
      var price=linked?('최신'+m3dual(r.last_collected_at,c.mkt_fetched_at)):'<span class="mx-na">-</span>';
      var send=r.last_sent_at?rel(r.last_sent_at):'<span class="mx-na">미전송</span>';
      return '<tr><td class="mx-mk">'+m3logo(c.market)+'<span>'+mk.nm+'</span></td>'
        +'<td class="ta-c">'+m3match(c)+'</td>'
        +'<td class="ta-c mx-cell" data-sid="'+r.set_id+'" data-mk="'+esc(c.market)+'" data-fld="stock">'+stock+'</td>'
        +'<td class="ta-c mx-cell" data-sid="'+r.set_id+'" data-mk="'+esc(c.market)+'" data-fld="price">'+price+'</td>'
        +'<td class="ta-c">'+send+'</td></tr>';
    }).join('');
    return legend+'<table class="mx3"><colgroup><col style="width:25%"><col style="width:13%"><col style="width:23%"><col style="width:23%"><col style="width:16%"></colgroup><thead><tr><th class="ta-l">마켓</th><th>매칭</th><th>재고 (소/판)</th><th>가격 (소/판)</th><th>전송</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  function render(sets){
    if(!sets.length){ listEl.innerHTML='<div class="sd-empty">아직 연동된 구성이 없어요.<br>오른쪽 위 <b>＋ 새 연동 만들기</b> 로 시작하세요.</div>'; return; }
    var h='';
    sets.forEach(function(r){
      var multi=r.products.length>1;
      var chans=r.channels.map(mkBadge).join('');
      var coll=rel(r.last_collected_at); var sent=r.last_sent_at?rel(r.last_sent_at):null;
      h+='<div class="sd-card" data-sid="'+r.set_id+'">';
      h+=' <div class="sd-card-top" data-act="toggle"><div>'+(multi?('<span class="sd-bundle">'+r.products.length+'개 묶음</span>'):'')+'<span class="sd-name">'+esc(r.name)+'</span></div><div>'+'<a class="sd-edit" href="/api/sets/flow?edit='+r.set_id+'">✎ 편집</a><button class="sd-del" data-sid="'+r.set_id+'" data-name="'+esc(r.name)+'">🗑 삭제</button><span class="sd-chev">▾</span></div></div>';
      h+=' '+m3Table(r);
      h+=' <div class="sd-meta">수집 '+(coll||'수집 안 됨')+' · 전송 '+(sent||'이력 없음')+'</div>';
      h+=' <div class="sd-prods">';
      r.products.forEach(function(p){ h+='<div class="sd-prod">└ <span>'+esc(p.model_name)+'</span> <span class="sd-cnt">'+p.option_count+'옵션 · 수량 '+p.quantity+'</span></div>'; });
      h+=' </div>';
      h+=' <div class="sd-detail" data-det style="display:none"></div>';
      h+='</div>';
    });
    listEl.innerHTML=h;
  }
  function load(){
    var q=qEl.value.trim();
    fetch('/api/sets/linked'+(q?('?q='+encodeURIComponent(q)):''),{headers:{'Accept':'application/json'}})
      .then(function(r){return r.json();})
      .then(function(d){ if(d&&d.ok) render(d.sets||[]); else listEl.innerHTML='<div class="sd-empty">목록을 불러오지 못했어요.</div>'; })
      .catch(function(){ listEl.innerHTML='<div class="sd-empty">목록을 불러오지 못했어요.</div>'; });
  }

  // ── 상세(1b·1c) ──────────────────────────────────────────────
  function srcKind(o){ return o.purchase_priority_resolved==='purchase'?'사입':'소싱'; }
  function stockOf(o){
    if(o.purchase_priority_resolved==='purchase') return o.purchase_stock!=null?(o.purchase_stock+'개'):'-';
    return o.src_stock_label||(o.src_stock!=null?(o.src_stock+'개'):'-');
  }
  function costOf(o, bd){
    if(o.purchase_priority_resolved==='purchase') return fmt(o.purchase_avg_cost);
    if(bd && bd.final_price!=null) return fmt(bd.final_price);   // 매트릭스·영수증과 동일(단일 진실 원천)
    return fmt(o.src_cost);   // breakdown 없을 때만 폴백(소싱처 미수집 등)
  }
  function collOf(o){
    var ts=null; (o.sources||[]).forEach(function(sc){ if(sc.last_fetched_at){ var t=new Date(sc.last_fetched_at).getTime(); if(!isNaN(t)&&(ts==null||t>ts))ts=t; } });
    return ts?rel(new Date(ts).toISOString()):'-';
  }
  function matchCell(o){
    var ch=o.channels||{}; var out=[];
    ['smartstore','coupang'].forEach(function(mk){
      if(ch[mk]){ var st=ch[mk].status; var nm=mk==='smartstore'?'스스':'쿠팡';
        var col=st==='matched'?'#047857':'#b45309'; var tx=st==='matched'?'✓':'✗';
        out.push('<span style="color:'+col+'">'+nm+' '+tx+'</span>'); }
    });
    return out.length?out.join(' '):'<span class=sd-cnt>-</span>';
  }
  function receipt(bd){
    if(!bd||!bd.steps||!bd.steps.length) return '<div class="rcp"><div class="rl total"><span>표면 노출가 = 최종 매입가</span><b>'+fmt(bd&&bd.final_price)+'</b></div></div><div class="sd-cnt" style="padding:4px 0">차감할 소싱 혜택이 없어요.</div>';
    var h='<div class="rcp"><div class="rl"><span>표면 노출가</span><b>'+fmt(bd.sale_price)+'</b></div>';
    bd.steps.forEach(function(st,i){
      h+='<div class="rl ded"><span>└ '+esc(st.name)+'</span><span>-'+fmt(st.deduct)+'</span></div>';
      if(i<bd.steps.length-1) h+='<div class="rl base">베이스금액 '+fmt(st.base_after)+'</div>';
    });
    h+='<div class="rl total"><span>최종 매입가</span><b>'+fmt(bd.final_price)+'</b></div></div>';
    return h;
  }
  function loadReceipt(o, td, bd){
    if(!o){ td.innerHTML='<div class="sd-cnt">옵션 정보를 찾지 못했어요.</div>'; return; }
    if(o.purchase_priority_resolved==='purchase'){
      td.innerHTML='<div class="rcp"><div class="rl total"><span>사입 매입가(이동평균)</span><b>'+fmt(o.purchase_avg_cost)+'</b></div></div><div class="sd-cnt" style="padding:4px 0">사입 옵션은 직접 매입가를 사용해요(소싱 혜택 영수증 없음).</div>';
      return;
    }
    var cand=(o.sources||[]).filter(function(s){ return s.source_id!=null && s.crawled_price!=null; });
    if(!cand.length){ td.innerHTML='<div class="sd-cnt" style="padding:6px 0">소싱처 가격 정보가 없어요(수집 전).</div>'; return; }
    cand.sort(function(a,b){ return a.crawled_price-b.crawled_price; });
    var s=cand[0];
    if(bd){ td.innerHTML='<div style="font-size:11px;color:#185FA5;margin-bottom:4px">'+esc(s.source_name)+' 기준 (최저가 소싱처)</div>'+receipt(bd); return; }
    var url='/api/source-benefits/breakdown/'+encodeURIComponent(o.sku)+'/'+s.source_id+'?sale_price='+s.crawled_price+(s.source_product_id?('&source_product_id='+encodeURIComponent(s.source_product_id)):'');
    td.innerHTML='<div class="sd-cnt" style="padding:6px 0">영수증 불러오는 중…</div>';
    fetch(url,{headers:{'Accept':'application/json'}}).then(function(r){return r.json();})
      .then(function(bd){ td.innerHTML='<div style="font-size:11px;color:#185FA5;margin-bottom:4px">'+esc(s.source_name)+' 기준 (최저가 소싱처)</div>'+receipt(bd); })
      .catch(function(){ td.innerHTML='<div class="sd-cnt" style="padding:6px 0">영수증을 불러오지 못했어요.</div>'; });
  }
  function renderTable(opts, bd){
    if(!opts.length) return '<div class="sd-cnt" style="padding:8px 0">옵션이 없어요.</div>';
    var h='<table class="det-tbl"><thead><tr><th>옵션</th><th>출처</th><th class="ta-r">재고</th><th class="ta-r">최종 매입가</th><th class="ta-r">마켓 매칭</th><th class="ta-r">수집</th><th class="ta-r">전송</th></tr></thead><tbody>';
    opts.forEach(function(o,i){
      var k=srcKind(o); var bcls=k==='사입'?'b-buy':'b-src';
      h+='<tr class="opt-row" data-oi="'+i+'">';
      h+='<td>'+esc((o.color_display||o.color_code||'')+' · '+(o.size_display||o.size_code||''))+'</td>';
      h+='<td><span class="'+bcls+'">'+k+'</span></td>';
      h+='<td class="ta-r">'+esc(stockOf(o))+'</td>';
      h+='<td class="ta-r">'+costOf(o, bd&&bd[o.sku])+'</td>';
      h+='<td class="ta-r">'+matchCell(o)+'</td>';
      h+='<td class="ta-r sd-cnt">'+collOf(o)+'</td>';
      h+='<td class="ta-r sd-cnt">미전송</td>';
      h+='</tr>';
      h+='<tr data-rcp="'+i+'" style="display:none"><td colspan="7" data-rcp-body><div class="sd-cnt">행을 누르면 영수증을 불러옵니다.</div></td></tr>';
    });
    h+='</tbody></table><div class="sd-cnt" style="margin-top:6px">행을 누르면 가격 영수증(표면노출가→혜택→최종매입가)이 펼쳐져요. 전송일자는 실제 전송 기능(다음 단계) 도입 후 표기됩니다.</div>';
    return h;
  }
  function renderMatrix(opts, bd){
    var colors=[],sizes=[],cell={};
    opts.forEach(function(o){
      var c=o.color_display||o.color_code||''; var z=o.size_display||o.size_code||'';
      if(colors.indexOf(c)<0)colors.push(c); if(sizes.indexOf(z)<0)sizes.push(z);
      cell[c+'|'+z]=o;
    });
    var h='<table class="mx-tbl"><thead><tr><th></th>';
    sizes.forEach(function(z){ h+='<th>'+esc(z)+'</th>'; });
    h+='</tr></thead><tbody>';
    colors.forEach(function(c){
      h+='<tr><th>'+esc(c)+'</th>';
      sizes.forEach(function(z){
        var o=cell[c+'|'+z];
        if(!o){ h+='<td class="mx-na">·</td>'; return; }
        var k=srcKind(o);
        h+='<td><div style="font-weight:700;color:#191F28">'+esc(stockOf(o))+'</div><div class="sd-cnt">'+costOf(o, bd&&bd[o.sku])+'</div><div style="font-size:10px;color:'+(k==='사입'?'#854F0B':'#185FA5')+'">'+k+'</div></td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table>';
    return h;
  }
  var detailCache={};   // sid → options
  var bdCache={};       // sid → {sku: breakdown}  (최종 매입가·영수증 단일 소스)
  function pickSrc(o){  // 옵션의 대표 소싱처(최저 표면가, id 유효)
    var cand=(o.sources||[]).filter(function(s){ return s.source_id!=null && s.crawled_price!=null; });
    if(!cand.length) return null;
    cand.sort(function(a,b){ return a.crawled_price-b.crawled_price; });
    return cand[0];
  }
  function renderDetail(box, sid, data){
    detailCache[sid]=data.options||[];
    var legend='<span class="det-legend"><span class="b-buy">사입</span> 직접매입 우선 · <span class="b-src">소싱</span> 소싱처 크롤 — 옵션마다 모음전 판매조건을 그대로 따름</span>';
    var pvBtns=(data.channels||[]).filter(function(c){return c.status==='linked';}).map(function(c){
      var nm=c.market==='coupang'?'쿠팡':(c.market==='smartstore'?'스마트스토어':esc(c.market));
      return '<button class="pv-btn" data-cid="'+c.id+'" data-mk="'+esc(c.market)+'">📋 '+nm+' 전송 미리보기</button>';
    }).join('');
    box.innerHTML='<div class="det-bar"><div class="det-tabs"><span class="det-tab on" data-view="cell">셀 보기</span><span class="det-tab" data-view="matrix">매트릭스 보기</span></div>'+legend+'</div>'
      +(pvBtns?'<div class="pv-bar">'+pvBtns+'<span class="sd-cnt">전송 전 \'마켓 현재값 → 보낼 값\' 대조(마켓에 쓰지 않음)</span></div>':'')
      +'<div data-detbody>'+renderTable(detailCache[sid], bdCache[sid])+'</div>'
      +'<div data-pvbox></div>';
  }
  function renderPreview(d, mk, cid){
    var nm=mk==='coupang'?'쿠팡':(mk==='smartstore'?'스마트스토어':mk);
    var s=d.summary||{};
    var warn = s.hold ? '<div class="pv-warn">⚠️ 평균 가격변동 '+s.avg_price_change_pct+'% — 큰 변동이에요. 실제 전송 시 한 번 더 확인하세요.</div>' : '';
    var h='<div class="pv-head">'+nm+' 전송 미리보기 · 변동 '+s.changed+'/'+s.total+'건 · 평균 가격변동 '+s.avg_price_change_pct+'%</div>'+warn;
    if(d.note){ h+='<div class="sd-cnt" style="padding:6px 0">'+esc(d.note)+'</div>'; }
    if((d.rows||[]).length){
      h+='<table class="det-tbl"><thead><tr><th>옵션</th><th class="ta-r">현재 재고</th><th class="ta-r">→ 보낼 재고</th><th class="ta-r">현재 가격</th><th class="ta-r">→ 보낼 가격</th></tr></thead><tbody>';
      d.rows.forEach(function(r){
        var sc=r.stock_changed?' style="color:#1d4ed8;font-weight:700"':'';
        var pc=r.price_changed?' style="color:#1d4ed8;font-weight:700"':'';
        h+='<tr><td>'+esc((r.color||'')+' · '+(r.size||''))+'</td>'
          +'<td class="ta-r">'+(r.cur_stock==null?'<span class="sd-cnt">미상</span>':r.cur_stock)+'</td>'
          +'<td class="ta-r"'+sc+'>'+(r.new_stock==null?'-':r.new_stock)+'</td>'
          +'<td class="ta-r">'+fmt(r.cur_price)+'</td>'
          +'<td class="ta-r"'+pc+'>'+fmt(r.new_price)+'</td></tr>';
      });
      h+='</tbody></table>';
    }
    h+='<div class="sd-cnt" style="margin-top:6px">파란 값 = 전송하면 바뀔 값. 시뮬(🧪)은 마켓에 쓰지 않고 계산만, 실제 전송(⚠️)은 쿠팡 재고만 보냅니다(가격·스마트스토어는 준비 중).'+(mk==='coupang'?' 쿠팡은 현재 재고를 응답에 주지 않아 \'미상\'으로 표시돼요.':'')+'</div>';
    h+='<div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">'
      +'<button class="pv-btn" data-send="dry" data-cid="'+cid+'">🧪 재고 전송 시뮬</button>'
      +(mk==='coupang'?'<button class="pv-btn" style="border-color:#dc2626;background:#fee2e2;color:#991b1b" data-send="real" data-cid="'+cid+'">⚠️ 실제 재고 전송</button>':'<span class="sd-cnt" style="align-self:center">실제 전송은 쿠팡만 지원(준비 중)</span>')
      +'</div><div data-sendres></div>';
    return h;
  }
  function renderSendResult(d){
    var s=d.summary||{};
    var head=d.dry_run?'🧪 시뮬 결과 (마켓에 쓰지 않음)':'✅ 실제 전송 결과';
    var h='<div class="pv-head" style="margin-top:10px">'+head+' · 전송 '+(s.sent||0)+' · 실패 '+(s.failed||0)+' · 제외 '+(s.skipped||0)+' / '+(s.total||0)+'</div>';
    if(d.note){ h+='<div class="sd-cnt" style="padding:4px 0">'+esc(d.note)+'</div>'; }
    if((d.results||[]).length){
      h+='<table class="det-tbl"><thead><tr><th>옵션</th><th class="ta-r">보낼 재고</th><th class="ta-r">결과</th></tr></thead><tbody>';
      d.results.forEach(function(r){
        var st = r.skipped ? ('<span class="sd-cnt">제외: '+esc(r.reason||'')+'</span>')
          : (r.ok ? ('<span style="color:#047857;font-weight:700">'+(r.dry?'시뮬 OK':'✓ 성공')+'</span>')
          : ('<span style="color:#b45309;font-weight:700">✗ '+esc(r.error||'실패')+'</span>'));
        h+='<tr><td>'+esc(r.label||r.sku)+'</td><td class="ta-r">'+(r.new_stock==null?'-':r.new_stock)+'</td><td class="ta-r">'+st+'</td></tr>';
      });
      h+='</tbody></table>';
    }
    return h;
  }
  function sendStock(cid, dryRun, box){
    if(!dryRun && !confirm('실제로 쿠팡에 재고를 전송합니다(가격은 전송 안 함). 진행할까요?')) return;
    var rb=box.querySelector('[data-sendres]'); if(!rb){ rb=document.createElement('div'); rb.setAttribute('data-sendres',''); box.appendChild(rb); }
    rb.innerHTML='<div class="sd-cnt" style="padding:8px 0">'+(dryRun?'시뮬 계산 중…':'전송 중… (마켓에 쓰는 중, 잠시만요)')+'</div>';
    fetch('/api/sets/channel/'+cid+'/send',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({dry_run:dryRun})})
      .then(function(r){return r.json();})
      .then(function(d){ if(d&&d.ok) rb.innerHTML=renderSendResult(d); else rb.innerHTML='<div class="sd-cnt" style="padding:8px 0">전송 실패: '+esc(d&&d.error||'')+'</div>'; })
      .catch(function(){ rb.innerHTML='<div class="sd-cnt" style="padding:8px 0">전송 호출에 실패했어요.</div>'; });
  }
  function loadPreview(cid, mk, box){
    box.innerHTML='<div class="sd-cnt" style="padding:10px 0">미리보기 불러오는 중… (마켓 현재값 읽기, 잠시 걸려요)</div>';
    fetch('/api/sets/channel/'+cid+'/preview',{headers:{'Accept':'application/json'}})
      .then(function(r){return r.json();})
      .then(function(d){ if(d&&d.ok) box.innerHTML='<div class="pv-box">'+renderPreview(d,mk,cid)+'</div>'; else box.innerHTML='<div class="sd-cnt" style="padding:8px 0">미리보기 실패: '+esc(d&&d.error||'')+'</div>'; })
      .catch(function(){ box.innerHTML='<div class="sd-cnt" style="padding:8px 0">미리보기를 불러오지 못했어요.</div>'; });
  }
  function loadDetail(box, sid){
    box.innerHTML='<div class="sd-cnt" style="padding:8px 0">상세 불러오는 중…</div>';
    fetch('/api/sets/'+sid+'/detail-matrix',{headers:{'Accept':'application/json'}})
      .then(function(r){return r.json();})
      .then(function(d){
        if(!(d&&d.ok)){ box.innerHTML='<div class="sd-cnt" style="padding:8px 0">상세를 불러오지 못했어요.</div>'; return; }
        var items=[];
        (d.options||[]).forEach(function(o){
          if(o.purchase_priority_resolved==='purchase') return;
          var s=pickSrc(o); if(s) items.push({sku:o.sku, source_id:s.source_id, sale_price:s.crawled_price, source_product_id:s.source_product_id});
        });
        if(!items.length){ bdCache[sid]={}; renderDetail(box,sid,d); return; }
        fetch('/api/source-benefits/breakdowns',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({items:items})})
          .then(function(r){return r.json();})
          .then(function(bd){ var m={}; var res=(bd&&bd.results)||{}; items.forEach(function(it){ var b=res[it.sku+'|'+it.source_id]; if(b) m[it.sku]=b; }); bdCache[sid]=m; renderDetail(box,sid,d); })
          .catch(function(){ bdCache[sid]={}; renderDetail(box,sid,d); });
      })
      .catch(function(){ box.innerHTML='<div class="sd-cnt" style="padding:8px 0">상세를 불러오지 못했어요.</div>'; });
  }

  // ── 이벤트 위임 ──────────────────────────────────────────────
  listEl.addEventListener('click', function(e){
    if(e.target.closest('.sd-edit')) return;
    var delBtn=e.target.closest('.sd-del');
    if(delBtn){ e.stopPropagation(); openDelModal(delBtn.getAttribute('data-sid'), delBtn.getAttribute('data-name')); return; }
    var pvBtn=e.target.closest('.pv-btn');
    if(pvBtn){
      var pcard=pvBtn.closest('.sd-card'); var pvbox=pcard.querySelector('[data-pvbox]');
      if(pvBtn.hasAttribute('data-send')){ sendStock(pvBtn.getAttribute('data-cid'), pvBtn.getAttribute('data-send')==='dry', pvbox); }
      else { loadPreview(pvBtn.getAttribute('data-cid'), pvBtn.getAttribute('data-mk'), pvbox); }
      return;
    }
    var tabEl=e.target.closest('.det-tab');
    if(tabEl){
      var card=tabEl.closest('.sd-card'); var sid=card.getAttribute('data-sid');
      card.querySelectorAll('.det-tab').forEach(function(t){ t.classList.toggle('on', t===tabEl); });
      var body=card.querySelector('[data-detbody]');
      var opts=detailCache[sid]||[];
      body.innerHTML = tabEl.getAttribute('data-view')==='matrix' ? renderMatrix(opts, bdCache[sid]) : renderTable(opts, bdCache[sid]);
      return;
    }
    var optRow=e.target.closest('tr.opt-row');
    if(optRow){
      var rcp=optRow.nextElementSibling;
      if(rcp&&rcp.hasAttribute('data-rcp')){
        var show = rcp.style.display==='none';
        rcp.style.display = show?'':'none';
        if(show && !rcp.__loaded){
          rcp.__loaded=true;
          var card=optRow.closest('.sd-card'); var sid=card.getAttribute('data-sid');
          var oi=parseInt(optRow.getAttribute('data-oi'),10);
          var _o=(detailCache[sid]||[])[oi]; loadReceipt(_o, rcp.querySelector('[data-rcp-body]'), _o&&(bdCache[sid]||{})[_o.sku]);
        }
      }
      return;
    }
    var top=e.target.closest('.sd-card-top');
    if(top){
      var card2=top.closest('.sd-card'); var det=card2.querySelector('[data-det]');
      var chev=top.querySelector('.sd-chev');
      if(det.style.display==='none'){ det.style.display=''; if(chev)chev.textContent='▴'; loadDetail(det, card2.getAttribute('data-sid')); }
      else { det.style.display='none'; if(chev)chev.textContent='▾'; }
      return;
    }
  });

  qEl.addEventListener('input',function(){ clearTimeout(timer); timer=setTimeout(load,250); });
  // 삭제 모달 (체크2 + '삭제' 입력)
  var delSid=null;
  function refreshDel(){ var ok=document.getElementById('delChk1').checked && document.getElementById('delChk2').checked && document.getElementById('delInput').value.trim()==='삭제'; document.getElementById('delConfirm').disabled=!ok; }
  function closeDel(){ document.getElementById('delModal').classList.remove('on'); delSid=null; }
  function openDelModal(sid,name){ delSid=sid; document.getElementById('delImpact').innerHTML='<b>'+esc(name)+'</b> 구성을 삭제합니다. 연결된 <b>마켓 매칭·연동 정보가 모두 사라집니다.</b> (쿠팡/스마트스토어 상품 자체는 영향 없음)'; document.getElementById('delChk1').checked=false; document.getElementById('delChk2').checked=false; document.getElementById('delInput').value=''; refreshDel(); document.getElementById('delModal').classList.add('on'); }
  (function(){ var m=document.getElementById('delModal'); if(!m) return; m.addEventListener('input',refreshDel); m.addEventListener('change',refreshDel); m.addEventListener('click',function(e){ if(e.target.id==='delModal') closeDel(); }); document.getElementById('delCancel').addEventListener('click',closeDel); document.getElementById('delConfirm').addEventListener('click',function(){ if(!delSid)return; var b=this; b.disabled=true; b.textContent='삭제 중…'; fetch('/api/sets/'+delSid,{method:'DELETE',headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ closeDel(); load(); } else { alert('삭제 실패: '+(d&&d.error||'')); b.disabled=false; b.textContent='삭제'; } }).catch(function(){ alert('삭제 호출 실패'); b.disabled=false; b.textContent='삭제'; }); }); })();
  load();
})();
</script>
{% endblock %}
