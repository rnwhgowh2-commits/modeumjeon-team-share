{% extends "base.html" %}
{% block title %}판매처 연동{% endblock %}
{% block head %}
<style>
  /* === 최종 통합본 카드 디자인 변수/베이스 === */
  :root{--ink:#191F28;--sub:#6B7684;--line:#E5E8EB;--line2:#EFF1F4;--blue:#3182F6;--blueDk:#185FA5;--brown:#854F0B;--green:#0F8A4D;--amber:#B45309;--red:#E03A3E;--coupang:#E03A3E;--smart:#03C75A;--gmarket:#00A862;--cur:#98A2B3;}
  .sd-wrap{max-width:1180px;margin:0 auto;padding:14px 14px 60px;font-family:Pretendard,system-ui,sans-serif;color:var(--ink);zoom:1.4;}
  .sd-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .sd-title{font-size:20px;font-weight:800;color:#191F28;letter-spacing:-.4px;}
  .sd-sub{font-size:13px;color:#6b7684;margin-top:2px;}
  .sd-new{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:700;border:1px solid #3182f6;background:#3182f6;color:#fff !important;border-radius:8px;padding:9px 16px;text-decoration:none;white-space:nowrap;}
  .sd-new:hover{background:#1b64da;}
  .dm-back{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;}
  .dm-back.on{display:flex;}
  .dm{width:100%;max-width:440px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;zoom:1.7;}
  .dm-h{padding:18px 20px 6px;font-size:17px;font-weight:800;color:#191F28;}
  .dm-b{padding:6px 20px 16px;font-size:13.5px;color:#4e5968;line-height:1.7;}
  .dm-warn{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;padding:10px 12px;font-size:12.5px;margin:4px 0 8px;line-height:1.6;}
  .dm-chk{display:flex;gap:8px;align-items:flex-start;font-size:13px;margin:8px 0;color:#4e5968;cursor:pointer;}
  .dm-code{font-family:monospace;background:#f1f3f5;padding:1px 6px;border-radius:4px;font-weight:700;}
  .dm-ipt{width:100%;border:1px solid #e5e8eb;border-radius:8px;padding:10px 12px;font-size:14px;margin-top:6px;font-family:inherit;}
  .dm-f{display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;background:#fafbfc;border-top:1px solid #e5e8eb;}
  .dm-cancel{background:#fff;border:1px solid #e5e8eb;border-radius:8px;padding:9px 16px;font-weight:600;color:#4e5968;cursor:pointer;}
  .dm-del{background:#dc2626;color:#fff !important;border:0;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;}
  .dm-del[disabled]{opacity:.45;cursor:not-allowed;}
  .sd-new:hover{background:#1b64da;}
  .sd-search{display:flex;align-items:center;gap:8px;border:1px solid #e5e8eb;border-radius:10px;padding:9px 13px;background:#fff;margin-bottom:14px;}
  .sd-search input{border:0;outline:0;flex:1;font-size:14px;font-family:inherit;color:#191F28;background:transparent;}
  /* F10 필터 + 알림 노출 */
  .sd-filter{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:12px;}
  .sd-fl-label{font-size:11.5px;color:#8b95a1;font-weight:700;margin:0 2px 0 6px;}
  .sd-chip{font-size:12px;border:1px solid #e5e8eb;background:#fff;color:#4e5968;border-radius:14px;padding:4px 12px;cursor:pointer;}
  .sd-chip.on{background:#3182f6;border-color:#3182f6;color:#fff;font-weight:700;}
  .sd-summary{font-size:12.5px;color:#B45309;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:7px 12px;margin-bottom:10px;font-weight:700;}
  .sd-alert{display:inline-block;font-size:11px;font-weight:800;color:#fff;border-radius:10px;padding:1px 8px;margin-right:8px;vertical-align:middle;}
  .mx-alert{font-weight:800;cursor:help;}
  .sd-card{background:#fff;border:1px solid #e5e8eb;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .sd-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;cursor:pointer;}
  .sd-name{font-size:15px;font-weight:700;color:#191F28;}
  /* 구성별 자동 (미니멀 M-10 · 회색 + 포인트 1색) */
  .b-auto{font-size:12px;font-weight:600;border-radius:7px;padding:4px 10px;cursor:pointer;white-space:nowrap;background:#f4f5f7;color:#6b7684;border:1px solid #e9ebef;}
  .b-auto.exc{background:#eef4ff;color:#1b64da;border-color:#d8e6ff;}
  /* V3 자동 컨트롤 — 마스터 토글(켜짐/끄기) + 자동/수동 세그먼트 */
  .b-auto3{display:inline-flex;align-items:center;gap:8px;white-space:nowrap;vertical-align:middle;}
  .v3-mtog{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;border-radius:20px;padding:4px 11px 4px 7px;cursor:pointer;border:1px solid #cfd4da;background:#f4f5f7;color:#8b95a1;}
  .v3-mtog.on{border-color:#cfe9dc;background:#F0FBF6;color:#0F8A4D;}
  .v3-knob{width:26px;height:15px;border-radius:10px;background:#c2c8cf;position:relative;transition:background .15s;}
  .v3-mtog.on .v3-knob{background:#0F8A4D;}
  .v3-knob::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#fff;transition:left .15s;}
  .v3-mtog.on .v3-knob::after{left:13px;}
  .v3-seg{display:inline-flex;background:#f1f3f5;border-radius:9px;padding:2px;transition:opacity .15s;}
  .v3-seg.dim{opacity:.4;pointer-events:none;}
  .v3-rb{font-size:12px;font-weight:600;color:#8b95a1;padding:4px 12px;border-radius:7px;cursor:pointer;}
  .v3-rb.on{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.12);}
  .v3-rb.on.g{color:#0F8A4D;}
  .v3-rb.on.a{color:#854F0B;}
  .v3-cv{color:#b0b8c1;font-size:12px;cursor:pointer;padding:2px 3px;}
  .au-set{margin:8px 0 2px;border:1px solid #ececef;background:#fff;border-radius:11px;overflow:hidden;}
  .au-strip{background:#f4f5f7;color:#333d4b;font-size:11.5px;font-weight:700;padding:8px 14px;border-bottom:1px solid #ececef;}
  .au-inner{padding:12px 14px;}
  .au-row{display:flex;align-items:center;gap:12px;min-height:34px;padding:6px 0;}
  .au-rl{flex:1;font-size:13px;font-weight:600;color:#191F28;line-height:1;}
  .seg3{display:inline-flex;background:#f4f5f7;border-radius:7px;padding:2px;}
  .s3{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:5px;color:#9aa3af;cursor:pointer;line-height:1;}
  .s3.on{background:#3182f6;color:#fff;}
  /* 수동설정 주기 패널 (E-주기-4) — 무채색 + 아이콘 구분 */
  .au-manual{margin-top:4px;border-top:1px solid #f2f3f5;padding-top:8px;}
  .au-mrow{padding:8px 0;}
  .au-mlbl{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#4e5968;border-radius:6px;padding:3px 8px;background:#f4f5f7;margin-bottom:8px;}
  .au-fx{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .pchip{font-size:11.5px;font-weight:600;border:1px solid #e5e8eb;background:#fff;color:#6b7684;border-radius:8px;padding:5px 10px;cursor:pointer;}
  .pchip.on-s,.pchip.on-p{background:#eef4ff;border-color:#3182f6;color:#1b64da;}
  .mhm{display:inline-flex;align-items:center;border:1px solid #e5e8eb;border-radius:8px;overflow:hidden;background:#fff;}
  .mhm input{width:34px;height:30px;border:0;text-align:center;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;font-family:inherit;color:#191F28;-moz-appearance:textfield;}
  .mhm input::-webkit-outer-spin-button,.mhm input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .mhm .colon{font-size:13px;font-weight:800;color:#9aa3af;}
  .mhm .u{font-size:10.5px;color:#9aa3af;padding:0 7px 0 2px;}
  .au-foot{font-size:11px;color:#9aa3af;margin-top:8px;line-height:1.5;}
  .sd-bundle{font-size:11px;font-weight:700;background:#e8f1ff;color:#1d4ed8;border-radius:5px;padding:2px 7px;margin-right:6px;}
  .sd-chev{color:#b0b8c1;font-size:13px;margin-left:8px;}
  .sd-mk{display:inline-block;font-size:11.5px;font-weight:700;border-radius:5px;padding:3px 8px;margin-left:6px;}
  .sd-mk.coupang{background:#FAEEDA;color:#854F0B;}
  .sd-mk.smartstore{background:#E1F5EE;color:#0F6E56;}
  .sd-mk.other{background:#f1f3f5;color:#4e5968;}
  .sd-meta{font-size:11.5px;color:#8b95a1;margin-top:7px;}
  .sd-prods{margin-top:10px;border-top:1px solid #e5e8eb;padding-top:4px;}
  .sd-prod{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#4e5968;}
  .sd-cnt{font-size:11px;color:#8b95a1;}
  .sd-empty{text-align:center;padding:54px 20px;color:#8b95a1;font-size:14px;line-height:1.7;}
  .sd-match-ok{color:#047857;font-weight:700;}
  .sd-match-part{color:#b45309;font-weight:700;}
  /* 상세 */
  .sd-detail{margin-top:12px;border-top:1px solid #e5e8eb;padding-top:12px;}
  .det-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .det-tabs{display:inline-flex;border:1px solid #e5e8eb;border-radius:7px;overflow:hidden;}
  .det-tab{font-size:12px;padding:5px 12px;color:#4e5968;cursor:pointer;background:#fff;}
  .det-tab.on{background:#e8f1ff;color:#1d4ed8;font-weight:700;}
  .det-legend{font-size:11.5px;color:#8b95a1;}
  .b-buy{font-size:10.5px;padding:1px 6px;border-radius:4px;background:#FAEEDA;color:#854F0B;}
  .b-src{font-size:10.5px;padding:1px 6px;border-radius:4px;background:#E6F1FB;color:#185FA5;}
  table.det-tbl{width:100%;border-collapse:collapse;font-size:12px;}
  table.det-tbl th{font-weight:600;color:#8b95a1;text-align:left;padding:6px 6px;border-bottom:1px solid #e5e8eb;}
  table.det-tbl td{padding:6px 6px;border-bottom:1px solid #f1f3f5;color:#4e5968;}
  table.det-tbl tr.opt-row{cursor:pointer;}
  table.det-tbl tr.opt-row:hover{background:#f7faff;}
  .ta-r{text-align:right;}
  table.det-tbl th.ta-r,table.det-tbl td.ta-r{text-align:right;}
  .rcp{background:#f9fafb;border:1px solid #eef1f4;border-radius:8px;padding:9px 12px;margin:2px 0 6px;}
  .rcp .rl{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#4e5968;}
  .rcp .rl.ded span:last-child{color:#dc2626;}
  .rcp .rl.ded span:first-child{padding-left:10px;}
  .rcp .rl.base{font-size:10.5px;color:#8b95a1;justify-content:flex-end;}
  .rcp .rl.total{border-top:1px solid #d7dbe0;margin-top:4px;padding-top:5px;}
  .rcp .rl.total b{color:#1d4ed8;font-size:14px;}
  .mxscroll{overflow-x:auto;max-width:100%;}
  table.mx-tbl{border-collapse:collapse;font-size:11.5px;text-align:center;}
  table.mx-tbl th,table.mx-tbl td{border:1px solid #e5e8eb;padding:5px 7px;}
  table.mx-tbl th{background:#f9fafb;color:#8b95a1;font-weight:700;}
  .mx-na{color:#c4cad2;}
  .pv-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:6px 0 4px;}
  .pv-btn{font-size:12px;font-weight:700;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;border-radius:7px;padding:6px 12px;cursor:pointer;}
  .pv-btn:hover{background:#dbeafe;}
  .pv-box{margin-top:10px;border:1px solid #e5e8eb;border-radius:10px;padding:11px 13px;background:#fafbfc;}
  .pv-head{font-size:12.5px;font-weight:700;color:#191F28;margin-bottom:8px;}
  .pv-warn{font-size:12px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:7px 10px;margin-bottom:8px;}
  /* 전송 미리보기 모달 + 아이디어3(현재→보낼 인라인) */
  .dm.dm-wide{max-width:600px;zoom:1.4;}
  .pv-modal-body{padding:10px 20px 14px;max-height:62vh;overflow:auto;}
  .pv-legend{font-size:11.5px;color:#6b7684;background:#f7faff;border:1px solid #e8f1ff;border-radius:7px;padding:7px 10px;margin-bottom:8px;line-height:1.6;}
  .pv-summary{font-size:12.5px;font-weight:700;color:#191F28;margin-bottom:8px;}
  .pv-sub{display:block;font-weight:500;color:#b0b8c1;font-size:10px;margin-top:1px;}
  .pv-cur{color:#8b95a1;}
  .pv-arr{color:#c4cad2;margin:0 5px;}
  .pv-new{font-weight:700;color:#4e5968;}
  .pv-new.chg{color:#1d4ed8;}
  .pv-na{color:#b0b8c1;}
  /* 정렬 규율(design-mockup 원칙4): 숫자 우측+자릿수 / 상태 가운데 / 비교셀 3칸 grid */
  .ta-c{text-align:center;}
  table.det-tbl th.ta-c,table.det-tbl td.ta-c{text-align:center;}
  table.det-tbl th.ta-r,table.det-tbl td.ta-r{font-variant-numeric:tabular-nums;}
  .det-unit{font-size:10px;color:#8b95a1;margin-left:1px;font-weight:400;}
  .pv-cmp{display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;column-gap:5px;font-variant-numeric:tabular-nums;}
  .pv-cmp .pv-cur{text-align:right;}
  .pv-cmp .pv-new{text-align:left;}
  .pv-cmp .pv-arr{margin:0;text-align:center;}
  .pv-h-title{text-align:center;font-weight:500;}
  .pv-h-sub{font-size:10px;color:#b0b8c1;font-weight:400;margin-top:1px;}
  .pv-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;align-items:center;}
  .pv-btn-danger{border-color:#dc2626;background:#fee2e2;color:#991b1b;}
  /* H2 변동이력 모달 */
  .hist-cols{display:flex;gap:12px;}
  .hist-col{flex:1;min-width:0;}
  .hist-h{font-size:12px;font-weight:800;margin-bottom:6px;padding:4px 8px;border-radius:6px;text-align:center;}
  .hist-h.src{background:#E6F1FB;color:#185FA5;} .hist-h.mkt{background:#FAEEDA;color:#854F0B;}
  .hist-ev{font-size:11.5px;border-bottom:1px solid #f1f3f5;padding:5px 4px;display:flex;flex-direction:column;gap:1px;}
  .hist-t{color:#8b95a1;font-size:10px;}
  .hist-v .dn{color:#1d4ed8;font-weight:700;} .hist-v .up{color:#dc2626;font-weight:700;}
  .hist-empty{font-size:11.5px;color:#b0b8c1;text-align:center;padding:14px 0;}
  /* 가격 3단계(소싱표면가·최종매입가·판매예정가) 이력 테이블 */
  .htbl{width:100%;border-collapse:collapse;font-size:12.5px;}
  .htbl th{font-size:10.5px;color:var(--sub);font-weight:700;padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);background:#fff;white-space:nowrap;}
  .htbl th.l{text-align:left;}
  .htbl td{padding:9px 12px;border-bottom:1px solid var(--line2);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .htbl td.l{text-align:left;color:var(--sub);font-size:11.5px;}
  .htbl tr:last-child td{border-bottom:none;}
  .htbl .v{font-weight:800;color:var(--ink);}
  .htbl .na{color:#b0b8c1;font-weight:600;}
  .stg{display:inline-block;font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:4px;}
  .stg-s{background:#E7F0FB;color:var(--blueDk);}
  .stg-c{background:#EAF7EF;color:var(--green);}
  .stg-p{background:#F3EBDD;color:var(--brown);}
  .htbl td .d{font-size:10px;margin-left:4px;font-weight:800;}
  .htbl td .d.dl{color:#1d4ed8;} .htbl td .d.up{color:#dc2626;}
  .mk-logo{display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;border-radius:6px;}
  table.mx3{width:100%;table-layout:fixed;border-collapse:collapse;font-size:12px;margin-top:11px;}
  table.mx3 th{color:#98a2b3;font-weight:700;font-size:11px;padding:6px 8px;text-align:center;border-bottom:1px solid #eef1f4;}
  table.mx3 th.ta-l{text-align:left;}
  table.mx3 td{padding:8px;border-bottom:1px solid #f1f3f5;vertical-align:top;}
  table.mx3 td.ta-c{text-align:center;}
  table.mx3 td.mx-mk{display:flex;align-items:center;gap:8px;font-weight:700;color:#191F28;}
  table.mx3 tr:last-child td{border-bottom:0;}
  .mx-ts{display:block;font-size:10px;color:#98a2b3;line-height:1.3;font-variant-numeric:tabular-nums;}
  .mx-na{color:#c4cad2;}
  .mx-dual{margin:3px auto 0;display:flex;flex-direction:column;gap:1px;align-items:flex-start;width:fit-content;}
  .mx-dl{font-size:10px;color:#8b95a1;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:4px;justify-content:flex-start;}
  .mx-dl i{font-style:normal;font-weight:800;padding:1px 5px;line-height:1.5;text-align:center;border-radius:3px;font-size:9px;color:#fff;}
  .dl-src{background:#185FA5;} .dl-mkt{background:#854F0B;}
  .mx-cell{cursor:pointer;border-radius:6px;}
  .mx-cell:hover{background:#eef4ff;outline:1px solid #c7d7f0;}
  .mx-legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:11px;color:#6b7684;margin:11px 0 2px;}
  .mx-legend i{font-style:normal;font-weight:800;padding:1px 5px;line-height:1.5;text-align:center;border-radius:3px;font-size:9px;color:#fff;margin-right:3px;display:inline-block;}
  .mx-hint{margin-left:auto;color:#1d4ed8;font-weight:700;}
  .st-done{color:#0F8A4D;} .st-part{color:#B45309;} .st-none{color:#98A2B3;}

  /* ============================================================
     최종 통합본 카드 (header·신호등 E2·소판 스택·행 펼침 D3)
     ============================================================ */
  .sd-card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:0;margin-bottom:18px;}
  /* 헤더: 제목 + ↻업데이트▾ 드롭다운(박스) + 편집(파랑 글자) + 삭제(빨강 글자) */
  .c-head{display:flex;align-items:center;gap:10px;padding:16px 24px 14px;}
  .c-title{font-size:17px;font-weight:800;letter-spacing:-.4px;color:#191F28;}
  .c-bundle{font-size:11px;font-weight:700;background:#e8f1ff;color:#1d4ed8;border-radius:5px;padding:2px 7px;margin-right:8px;vertical-align:middle;}
  .c-sp{flex:1;}
  .updwrap{position:relative;}
  .b-up{height:32px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:12.5px;font-weight:700;color:#4E5968;display:inline-flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;}
  .b-up:hover{background:#F4F6F8;}
  .b-up[disabled]{opacity:.5;cursor:wait;}
  .updmenu{display:none;position:absolute;top:36px;right:0;z-index:30;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:5px;min-width:178px;}
  .updwrap.open .updmenu{display:block;}
  .updmenu button{display:flex;align-items:center;gap:7px;width:100%;border:0;background:transparent;text-align:left;font-size:12.5px;font-weight:600;color:#4E5968;padding:8px 10px;border-radius:7px;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .updmenu button:hover{background:#F4F6F8;}
  .b-txt{height:32px;padding:0 8px;border:none;background:transparent;font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;gap:4px;border-radius:7px;cursor:pointer;text-decoration:none;font-family:inherit;}
  .b-txt.edit{color:var(--blue);} .b-txt.del{color:var(--red);} .b-txt:hover{background:#F4F6F8;}
  .head-div{height:1px;background:var(--line);margin:0 24px;}
  /* 표: 마켓 | 매칭 | 재고(소/판) | 가격(소/판) | 상태 — 내용폭 컬럼 균등분배 */
  .row6{display:grid;grid-template-columns:148px 56px 146px 154px 118px 172px;justify-content:space-between;align-items:center;padding:13px 20px;gap:8px;}
  .hrow6{padding:11px 24px 9px;border-bottom:1px solid var(--line);}
  .hrow6>div{font-size:11px;color:var(--sub);font-weight:700;}
  .ctr{text-align:center;}.rgt{text-align:right;}
  .mrow{border-top:1px solid var(--line2);}
  .mrow:first-of-type{border-top:none;}
  .mk{display:flex;align-items:center;gap:9px;min-width:0;}
  .mk-tile{width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;flex:none;}
  .mk-n{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .match{color:var(--green);font-weight:800;font-size:14px;font-variant-numeric:tabular-nums;}
  .match.part{color:var(--amber);}
  .match.none{color:#98A2B3;font-weight:700;}
  .dual{display:grid;grid-template-columns:16px auto auto;column-gap:7px;row-gap:4px;align-items:center;width:max-content;}
  .ps{background:#E7F0FB;color:var(--blueDk);font-weight:800;font-size:9.5px;padding:1px 0;border-radius:4px;text-align:center;}
  .pp{background:#F3EBDD;color:var(--brown);font-weight:800;font-size:9.5px;padding:1px 0;border-radius:4px;text-align:center;}
  /* 현(판매처에 지금 걸린 값) 배지 — 연한 회색 */
  .pcur{background:#EDEFF2;color:var(--cur);font-weight:800;font-size:9.5px;padding:1px 0;border-radius:4px;text-align:center;}
  .dn{font-size:11.5px;color:#4E5968;font-weight:600;white-space:nowrap;}
  .dn.cur{color:var(--cur);}
  /* 소싱처 바로가기 ↗ 칩 (「소」 줄 이름 옆) — 이름은 그대로, 작은 버튼만 링크 */
  a.src-chip{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;margin-left:5px;border:1px solid #BBD3F5;border-radius:5px;background:#fff;color:var(--blue);font-size:9px;font-weight:800;text-decoration:none;vertical-align:middle;line-height:1;}
  a.src-chip:hover{background:#EFF6FF;}
  .dv{font-size:13px;font-weight:800;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .dv small{font-size:10px;color:var(--sub);font-weight:600;margin-left:2px;}
  .dv.bad{color:var(--amber);}.dv.sev{color:var(--red);}
  .dv.muted{color:#98A2B3;font-weight:700;cursor:pointer;}
  /* 「소」 2값: 표면노출가=보조(작은 회색) / 최종매입가=강조(진하게) */
  .dv.surf{font-size:11px;color:#98A2B3;font-weight:600;}
  .dv.surf small{color:#98A2B3;}
  .dv.finalb{color:#191F28;font-weight:800;}
  /* 9번: 소(표면·매입) 묶음 아래 얇은 구분선 — 판/현과 시각 분리 */
  .dual .hairline{grid-column:1/-1;height:1px;background:var(--line2);margin:1px 0;}
  /* 현재(판매처 실제 걸린) 값 = 강조 안 함, 연한 회색 */
  .dv.cur{color:var(--cur);font-weight:600;}
  .dv.cur small{color:var(--cur);}
  /* 상태 신호등(E2) */
  .stcell{display:inline-flex;align-items:center;gap:8px;cursor:pointer;padding:5px 8px;border-radius:8px;}
  .stcell:hover{background:#F0F6FF;}
  .signals{display:inline-flex;gap:9px;}
  .sig{display:inline-flex;flex-direction:column;align-items:center;gap:3px;}
  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.g{background:#2bb673;}.dot.a{background:#E3A93B;}.dot.r{background:#E24B4A;}
  .siglab{font-size:9px;color:var(--sub);font-weight:700;}
  .e-caret{font-size:10px;color:#98A2B3;transition:transform .15s;}
  .mrow.open .e-caret{transform:rotate(180deg);}
  /* 행 액션(이력·미리보기) */
  .rowacts{display:inline-flex;gap:6px;justify-content:flex-end;}
  .mini-btn{height:28px;padding:0 10px;border-radius:7px;border:1px solid var(--line);background:#fff;font-size:11.5px;font-weight:700;color:#4E5968;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer;font-family:inherit;}
  .mini-btn:hover{background:#F4F6F8;}
  .mini-btn.accent{border-color:#BBD3F5;color:var(--blue);}
  .mini-btn[disabled]{opacity:.4;cursor:default;}
  /* 행 펼침 상세(D3) */
  .expand{display:none;background:#F8FAFB;border-top:1px dashed var(--line);padding:12px 24px 14px 30px;}
  .mrow.open .expand{display:block;}
  .expand h4{margin:0 0 7px;font-size:12px;font-weight:800;color:#4E5968;}
  .det-row{display:flex;align-items:center;gap:9px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--line2);}
  .det-row:last-child{border-bottom:none;}
  .det-ty{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:5px;flex:none;}
  .ty-a{background:#FEF4E6;color:var(--amber);}.ty-g{background:#EAF7EF;color:var(--green);}.ty-r{background:#FDECEC;color:var(--red);}
  .det-cmp{color:#4E5968;font-weight:600;font-variant-numeric:tabular-nums;}
  .det-act{height:26px;padding:0 10px;border-radius:6px;border:1px solid #BBD3F5;background:#fff;color:var(--blue);font-size:11.5px;font-weight:800;margin-left:auto;cursor:pointer;flex:none;font-family:inherit;}
  .det-act.sev{border-color:#F3B0B0;color:var(--red);}
  /* 상세 영수증(표면 노출가 → 혜택 항목별 차감 → 최종 매입가) — 대표(최저가 옵션) 기준 */
  .rcpt-row{align-items:flex-start;}
  .rcpt{flex:1;min-width:0;max-width:330px;}
  .rcpt-src{font-size:11px;color:var(--blue);font-weight:700;margin-bottom:6px;}
  .rl{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:2.5px 0;font-size:12px;}
  .rl-n{color:#4E5968;font-weight:600;}
  .rl.sub .rl-n{color:#8b95a1;}
  .rl-a{font-variant-numeric:tabular-nums;font-weight:700;color:#191F28;white-space:nowrap;text-align:right;}
  .rl-a small{font-size:10px;color:var(--sub);font-weight:600;margin-left:1px;}
  .rl-a.neg{color:var(--red);}
  .rl-base{font-size:10.5px;color:#b0b8c1;padding:0 0 2px 14px;font-variant-numeric:tabular-nums;}
  .rl-hr{height:1px;background:var(--line);margin:5px 0;}
  .rl.final .rl-n{font-weight:800;color:#191F28;}
  .rl.final .rl-a{font-weight:800;font-size:14px;}
  .rl.final .rl-a small{color:#191F28;}
  /* 푸터 */
  .c-foot{font-size:11.5px;color:#98A2B3;padding:8px 24px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
  .c-foot .more{color:var(--blue);cursor:pointer;}
  /* 푸터에서 펼치는 기존 상세(날짜·매트릭스) */
  .sd-card .sd-detail{margin:0 24px 16px;border-top:1px solid #e5e8eb;padding-top:12px;}

  /* === 2단 레이아웃: 왼쪽 필터 패널 + 오른쪽 카드 목록 === */
  .sd-cols{display:grid;grid-template-columns:220px minmax(0,1fr);gap:18px;align-items:start;}
  .sd-main{min-width:0;}
  /* 왼쪽 필터 패널 (밝은 카드 스타일 — 다크 사이드바 아님) */
  .sd-panel{background:var(--surface,#fff);border:1px solid var(--line);border-radius:12px;padding:16px 16px 14px;position:sticky;top:14px;}
  .sd-panel-h{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px;}
  .sd-panel-t{font-size:14px;font-weight:800;color:var(--ink);letter-spacing:-.3px;}
  .sd-panel-n{font-size:11.5px;color:var(--sub);font-weight:700;font-variant-numeric:tabular-nums;}
  .sd-panel .sd-search{margin-bottom:12px;padding:8px 11px;}
  .sd-panel .sd-search input{font-size:13px;}
  /* [B] 맨 위 「전체」 마스터 체크 (구 전체선택/해제 버튼 2개 통합) */
  .fp-master{display:flex;align-items:center;gap:8px;padding:7px 4px;margin-bottom:10px;border-bottom:1px solid var(--line2);cursor:pointer;user-select:none;}
  .fp-master input{width:15px;height:15px;flex:none;cursor:pointer;accent-color:var(--blue);}
  .fp-master-nm{flex:1;font-size:13px;font-weight:700;color:#4e5968;}
  .fp-master-cnt{font-size:11px;color:#8b95a1;font-weight:700;font-variant-numeric:tabular-nums;flex:none;}
  /* [B] 접기 그룹(아코디언) — 브랜드 / 마켓 */
  .fp-acc + .fp-acc{margin-top:6px;border-top:1px solid var(--line2);padding-top:4px;}
  .fp-acc-h{width:100%;display:flex;align-items:center;gap:8px;background:none;border:0;padding:6px 4px;cursor:pointer;font-family:inherit;border-radius:6px;}
  .fp-acc-h:hover{background:#f7faff;}
  .fp-acc-nm{font-size:11px;color:#8b95a1;font-weight:800;letter-spacing:.2px;}
  .fp-acc-ct{font-size:10.5px;font-weight:800;color:#8b95a1;background:#f2f4f6;border-radius:10px;padding:1px 7px;font-variant-numeric:tabular-nums;}
  .fp-acc-arw{display:inline-block;margin-left:auto;font-size:10px;color:#b0b8c1;}
  .fp-acc[data-open="0"] .fp-acc-arw{transform:rotate(-90deg);}
  .fp-acc[data-open="0"] .fp-acc-b{display:none;}
  .fp-list{display:flex;flex-direction:column;gap:1px;margin-bottom:4px;}
  .fp-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#4e5968;padding:5px 4px;border-radius:6px;cursor:pointer;}
  .fp-row:hover{background:#f7faff;}
  .fp-row input{width:15px;height:15px;flex:none;cursor:pointer;accent-color:var(--blue);}
  .fp-row .fp-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fp-row .fp-cnt{font-size:11px;color:#b0b8c1;font-weight:700;font-variant-numeric:tabular-nums;flex:none;}
  .fp-empty{font-size:11.5px;color:#b0b8c1;padding:4px;}
  @media(max-width:860px){
    .sd-cols{grid-template-columns:1fr;}
    .sd-panel{position:static;}
  }
</style>
{% endblock %}
{% block content %}
<div class="sd-wrap">
  <div class="sd-head">
    <div>
      <div class="sd-title">🏬 판매처 연동</div>
      <div class="sd-sub">판매처에 연동된 모음전 상품 · 마켓 매칭 · 최신 재고/가격 수집 현황</div>
    </div>
    <a class="sd-new" href="/api/sets/flow"><span style="font-size:17px;line-height:1;color:#fff">+</span>새 연동 만들기</a>
  </div>
  <div class="sd-cols">
    <aside class="sd-panel">
      <div class="sd-panel-h">
        <span class="sd-panel-t">필터</span>
        <span class="sd-panel-n" id="sd-result-n">결과 -건</span>
      </div>
      <div class="sd-search">
        <span style="color:#8b95a1">🔍</span>
        <input id="sd-q" type="text" placeholder="상품명·코드·번호 검색…" autocomplete="off">
      </div>
      <label class="fp-master">
        <input type="checkbox" id="fp-master-cb">
        <span class="fp-master-nm">전체</span>
        <span class="fp-master-cnt" id="fp-master-cnt">전체</span>
      </label>
      <div class="sd-filter" id="sd-filter"></div>
    </aside>
    <div class="sd-main">
      <div id="sd-summary"></div>
      <div id="sd-list"><div class="sd-empty">불러오는 중…</div></div>
    </div>
  </div>
</div>
<div class="dm-back" id="delModal">
  <div class="dm">
    <div class="dm-h">🗑️ 구성 삭제 — 확인</div>
    <div class="dm-b">
      <div class="dm-warn" id="delImpact"></div>
      <label class="dm-chk"><input type="checkbox" id="delChk1"> 연동된 마켓 매칭이 모두 사라지는 걸 이해합니다</label>
      <label class="dm-chk"><input type="checkbox" id="delChk2"> 되돌릴 수 없음을 이해합니다</label>

  </div>
</div>
<div class="dm-back" id="pvModal">
  <div class="dm dm-wide">
    <div class="dm-h" id="pvTitle">전송 미리보기</div>
    <div class="pv-modal-body" id="pvBody"></div>
    <div class="dm-f"><button class="dm-cancel" id="pvClose">닫기</button></div>
  </div>
</div>
<div class="dm-back" id="histModal">
  <div class="dm dm-wide">
    <div class="dm-h" id="histTitle">변동 이력</div>

    <div class="dm-f"><button class="dm-cancel" id="histClose">닫기</button></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  var listEl=document.getElementById('sd-list');
  var qEl=document.getElementById('sd-q');
  var timer=null;
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function fmt(n){ return (n==null||isNaN(n))?'-':Number(n).toLocaleString(); }
  // 서버 시각은 UTC(naive, Z 없음) — Z 없으면 붙여 UTC로 파싱(브라우저 로컬 오해 방지)
  function _pdate(iso){ var s=String(iso||''); if(s && !/[zZ]|[+\-]\d\d:?\d\d$/.test(s)) s+='Z'; return new Date(s); }
  function rel(iso){ if(!iso) return null; var d=_pdate(iso); var s=(Date.now()-d.getTime())/1000; if(isNaN(s)) return null; if(s<0)s=0; if(s<3600)return Math.floor(s/60)+'분 전'; if(s<86400)return Math.floor(s/3600)+'시간 전'; return Math.floor(s/86400)+'일 전'; }
  // 알림 노출 헬퍼 (severity: critical>danger>warning>info)
  var AL_SEV={critical:4,danger:3,warning:2,info:1};
  var AL_COLOR={critical:'#b91c1c',danger:'#e03a3e',warning:'#B45309',info:'#185FA5'};
  function alTop(alerts){ var best=null; (alerts||[]).forEach(function(a){ if(!best||(AL_SEV[a.severity]||0)>(AL_SEV[best]||0)) best=a.severity; }); return best; }
  function alBadge(alerts){ if(!alerts||!alerts.length) return ''; var sev=alTop(alerts); return '<span class="sd-alert" style="background:'+(AL_COLOR[sev]||'#888')+'" title="주의가 필요한 항목 '+alerts.length+'건">⚠ '+alerts.length+'</span>'; }
  function alForMarket(alerts, mk){ return (alerts||[]).filter(function(a){return a.market===mk;}); }

  function mkBadge(c){
    var cls=c.market==='coupang'?'coupang':(c.market==='smartstore'?'smartstore':'other');
    var nm=c.market==='coupang'?'쿠팡':(c.market==='smartstore'?'스마트스토어':esc(c.market));
    var num=c.market_product_id?(' '+esc(c.market_product_id)):' (번호없음)';
    var m;
    if(c.total>0){ m=' · 매칭 '+(c.matched===c.total?('<span class=sd-match-ok>'+c.matched+'</span>'):('<span class=sd-match-part>'+c.matched+'/'+c.total+'</span>')); }
    else { m=' · 미연동'; }
    return '<span class="sd-mk '+cls+'">'+nm+num+'</span>'+'<span class="sd-cnt">'+m+'</span>';
  }
  var MK={coupang:{nm:'쿠팡',sh:'쿠',c:'#E03A3E'},smartstore:{nm:'스마트스토어',sh:'스',c:'#03C75A'},gmarket:{nm:'G마켓',sh:'G',c:'#00A862'},st11:{nm:'11번가',sh:'11',c:'#FF0038'},toss:{nm:'토스',sh:'토',c:'#3182F6'},musinsa:{nm:'무신사',sh:'무',c:'#1a1a1a'}};
  function m3mk(market){ return MK[market]||{nm:esc(market),sh:(market||'?').slice(0,2),c:'#94a3b8'}; }
  function m3logo(market){ var m=m3mk(market); return '<span class="mk-logo" style="width:22px;height:22px;font-size:10px;background:'+m.c+'">'+m.sh+'</span>'; }
  function m3date(iso){ if(!iso) return '<span class="mx-na">-</span>'; var d=_pdate(iso); if(isNaN(d.getTime())) return '<span class="mx-na">-</span>'; var p=function(n){return (n<10?'0':'')+n;}; var ymd=String(d.getFullYear()).slice(2)+'.'+p(d.getMonth()+1)+'.'+p(d.getDate()); return ymd+'<span class="mx-ts">'+p(d.getHours())+':'+p(d.getMinutes())+'</span>'; }
  function m3dual(srcIso, mktIso){ return '<div class="mx-dual"><span class="mx-dl"><i class="dl-src">소싱처</i>'+m3date(srcIso)+'</span><span class="mx-dl"><i class="dl-mkt">판매처</i>'+m3date(mktIso)+'</span></div>'; }
  function m3match(c){ if(!c.total) return '<span class="st-none">-</span>'; var cls=(c.matched===c.total)?'st-done':'st-part'; return '<span class="'+cls+'" style="font-weight:700">'+c.matched+'/'+c.total+'</span>'; }
  // ── 최종 통합본 카드 빌더 ──────────────────────────────────────
  var MK_NAME={coupang:'쿠팡',smartstore:'스마트스토어',gmarket:'G마켓',st11:'11번가',toss:'토스',musinsa:'무신사'};
  function mkName(m){ return MK_NAME[m]||esc(m||'?'); }
  // 신호등 → 점 클래스
  function sigDot(v){ return v==='sev'?'r':(v==='warn'?'a':'g'); }
  // 'N개' 우측정렬(숫자+단위 small)
  function numUnit(n, unit){ if(n==null||isNaN(n)) return '<span style="color:#98A2B3">미상</span>'; return Number(n).toLocaleString()+'<small>'+unit+'</small>'; }
  // 매칭 셀
  function cMatch(c){
    if(!c.total) return '<span class="match none">미연동</span>';
    var cls=(c.matched===c.total)?'match':'match part';
    return '<span class="'+cls+'">'+c.matched+'/'+c.total+'</span>';
  }
  // 재고(소/판·현재) 스택 — 소=진하게 / 판(현재 판매처 설정)=연한 회색(경고는 신호등이 담당)
  function cStock(r, c){
    var ss=r.src_summary||{};
    var srcName=esc(ss.source_name||'소싱');
    // 소싱처 바로가기(↗ 칩) — 대표 소싱처 상품 URL 있을 때만(사입·미매칭은 글자만)
    var srcUrl=ss.source_url;
    var nameHtml=srcUrl
      ? srcName+'<a class="src-chip" href="'+esc(srcUrl)+'" target="_blank" rel="noopener" title="소싱처 상품 페이지 열기">↗</a>'
      : srcName;
    var srcN=(ss.src_stock_total!=null)?numUnit(ss.src_stock_total,'개'):'<span style="color:#98A2B3">미상</span>';
    var mkN=(c.mkt_stock_total!=null)?numUnit(c.mkt_stock_total,'개'):'<span style="color:#98A2B3">미상</span>';
    return '<div class="dual">'
      +'<span class="ps">소</span><span class="dn">'+nameHtml+'</span><span class="dv">'+srcN+'</span>'
      +'<span class="pcur">현</span><span class="dn cur">설정</span><span class="dv cur">'+mkN+'</span></div>';
  }

  // ── 구성별 자동 (켜기 / 끄기 / 수동설정) ──

  // F10 필터 (브랜드 OR + 마켓 OR, 그룹간 AND, 미선택=전체)
  var allSets=[];

  // [B] 마스터 「전체」 체크 상태·개수 갱신 (선택 0 = 전체 노출 규칙 유지)
  function updateMaster(){

    var sel=0;
    Object.keys(selBrands).forEach(function(k){ if(selBrands[k]) sel++; });
    Object.keys(selMarkets).forEach(function(k){ if(selMarkets[k]) sel++; });
    var total=_facetTotal||0;
    cb.checked = total>0 && sel===total;

    if(cnt) cnt.textContent = sel>0 ? (sel+' / '+total+' 선택') : '전체';
  }

    return sets.filter(function(r){
      var bOk = !bsel.length || brandsOf(r).some(function(b){return selBrands[b];});
      var mOk = !msel.length || marketsOf(r).some(function(m){return selMarkets[m];});
      return bOk && mOk;

  function verGte(v,min){ var a=String(v||'0').split('.').map(function(n){return parseInt(n,10)||0;}); var b=String(min).split('.').map(function(n){return parseInt(n,10)||0;}); for(var i=0;i<Math.max(a.length,b.length);i++){ if((a[i]||0)!==(b[i]||0)) return (a[i]||0)>(b[i]||0); } return true; }
  // 소싱처 업데이트 = 로컬 확장 크롤(전 소싱처 로컬 PC). 구성의 모음전들을 기존 크롤 큐에 넣어
  //   우상단 크롤 위젯이 진행·결과 표시, 완료 시 목록 자동 갱신. 서버 크롤 호출 안 함.
  function recrawlSources(btn){
    var sid=btn.getAttribute('data-sid');
    var codes=(btn.getAttribute('data-codes')||'').split(',').filter(Boolean);
    if(!codes.length){ alert('이 구성에 연결된 모음전이 없어요.'); return; }
    if(!(window.MoumExt && window.MoumExt.installed && window.MoumExt.installed())){
      alert('소싱처 크롤은 크롬 확장(모음전 크롤러)으로 합니다.\n확장을 설치·활성화한 뒤 다시 눌러 주세요.');
      return;
    }
    function go(){
      codes.forEach(function(c){
        try{ window.MoumExt.enqueueCrawl(c); }catch(_){}
        var onFin=function(ev){ var d=ev.detail; if(!d||d.type!=='finish'||d.bundle!==c) return; window.removeEventListener('moum-crawl-log', onFin);
          // 크롤 완료 직후 소싱 변동 스냅샷(H2 변동이력 소싱열 즉시 점등) → 그 뒤 목록 갱신
          fetch('/api/sets/'+sid+'/snapshot-sources',{method:'POST',headers:{'Accept':'application/json'}}).catch(function(){}).then(function(){ try{ load(); }catch(_){} }); };
        window.addEventListener('moum-crawl-log', onFin);
      });
      alert(codes.length+'개 모음전 소싱처 로컬 크롤을 시작했어요.\n우상단 크롤 위젯에서 진행·결과를 확인하세요. 완료되면 목록이 자동 갱신됩니다.');
    }
    if(window.MoumExt.ping){
      window.MoumExt.ping().then(function(p){
        if(!verGte((p&&p.version)||'0','0.4.0')){ alert('크롤러 확장 버전이 낮습니다(v0.4.0+ 필요).\n확장을 업데이트해 주세요.'); return; }
        go();
      }).catch(go);
    } else { go(); }
  }

  // H2 변동이력 모달 (하락=파랑▼ 상승=빨강▲, 한국증시)
  function histDir(p, n){ if(p==null||n==null||p===n) return ''; return n<p?' class="dn"':' class="up"'; }
  function histArrow(p, n){ if(p==null||n==null||p===n) return ''; return n<p?' ▼':' ▲'; }
  // 시각 → 'YY.MM.DD HH:mm'
  function histTs(iso){ var d=_pdate(iso); if(isNaN(d.getTime())) return ''; var p=function(n){return(n<10?'0':'')+n;};
    return String(d.getFullYear()).slice(2)+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }
  // 값 셀(값 + ▼/▲ 델타). 값 없으면 '–'(날조 금지)
  function histValCell(prev, next){
    if(next==null) return '<span class="na">–</span>';
    var arrow=''; if(prev!=null && next<prev) arrow=' <span class="d dl">▼</span>'; else if(prev!=null && next>prev) arrow=' <span class="d up">▲</span>';
    return '<span class="v">'+fmt(next)+'</span>'+arrow;
  }
  // 재고 이력(소싱/판매 2단) — 「하루 1줄(일자 기준)」. 그날 최신 값 · 전날 대비 ▼/▲.
  function renderHistStock(events){
    var src=events.filter(function(e){return e.source==='source';});
    var mkt=events.filter(function(e){return e.source==='market';});
    var p2=function(n){return(n<10?'0':'')+n;};
    function col(list){
      // 일자별 그날 마지막 값(at 최댓값)
      var byDay={}, days=[];
      (list||[]).forEach(function(e){
        var d=_pdate(e.at); if(isNaN(d.getTime())) return;
        var day=String(d.getFullYear()).slice(2)+'.'+p2(d.getMonth()+1)+'.'+p2(d.getDate());
        var atk=String(e.at||'');
        if(!(day in byDay)){ byDay[day]={atk:'', val:null}; days.push(day); }
        if(atk>=byDay[day].atk){ byDay[day].atk=atk; byDay[day].val=e.next_value; }
      });
      if(!days.length) return '<div class="hist-empty">변동 없음</div>';
      days.sort();   // 과거 → 최신
      var prev=null, rows=[];
      days.forEach(function(day){ rows.push({day:day, prev:prev, next:byDay[day].val}); prev=byDay[day].val; });
      rows.reverse();
      return rows.map(function(r){
        return '<div class="hist-ev"><span class="hist-t">'+r.day+'</span>'
          +'<span class="hist-v">'+histValCell(r.prev, r.next)+'</span></div>';
      }).join('');
    }
    return '<div class="sd-cnt" style="margin-bottom:8px">하루 1줄(일자 기준) · 그날 최신 값 · 전날 대비 하락 <span style="color:#1d4ed8;font-weight:700">▼ 파랑</span> · 상승 <span style="color:#dc2626;font-weight:700">▲ 빨강</span></div>'
      +'<div class="hist-cols"><div class="hist-col"><div class="hist-h src">소싱처</div>'+col(src)+'</div>'
      +'<div class="hist-col"><div class="hist-h mkt">판매처</div>'+col(mkt)+'</div></div>';
  }
  // 가격 이력 3단계 — 「하루 1줄(일자 기준)」. 그날 마지막 값 · 전날 대비 변하면 ▼/▲.
  //   (하루에 크롤·수집이 여러 번 들어와도 그날 1줄로 묶음. 변동 없는 단계는 – )
  function renderHistPrice(events){
    var STAGES=['surface','cost','planned'];
    var p2=function(n){return(n<10?'0':'')+n;};
    // 1) 일자별·단계별 '그날 마지막 값'(at 최댓값)
    var byDay={}, days=[];
    (events||[]).forEach(function(e){
      var f=(e.field==='price')?'cost':e.field;   // 레거시 'price'(=최종매입가)는 최종매입가 칸으로
      if(STAGES.indexOf(f)<0) return;
      var d=_pdate(e.at); if(isNaN(d.getTime())) return;
      var day=String(d.getFullYear()).slice(2)+'.'+p2(d.getMonth()+1)+'.'+p2(d.getDate());
      var atk=String(e.at||'');
      if(!(day in byDay)){ byDay[day]={val:{}, atk:{}}; days.push(day); }
      if(byDay[day].atk[f]==null || atk>=byDay[day].atk[f]){ byDay[day].val[f]=e.next_value; byDay[day].atk[f]=atk; }
    });
    if(!days.length) return '<div class="hist-empty">가격 변동 이력이 없어요.</div>';
    days.sort();   // 과거 → 최신 (전일 대비 델타 계산 위해)
    // 2) 전일 대비 델타 — 단계별 직전(더 과거 날) 값 추적
    var prevVal={};
    var rows=days.map(function(day){
      var cells={};
      STAGES.forEach(function(f){
        if(f in byDay[day].val){
          cells[f]={prev:(f in prevVal ? prevVal[f] : null), next:byDay[day].val[f]};
          prevVal[f]=byDay[day].val[f];
        } else cells[f]=null;   // 그날 그 단계 변동 없음
      });
      return {day:day, cells:cells};
    });
    rows.reverse();   // 최신 → 과거
    var legend='<div class="sd-cnt" style="margin-bottom:8px">하루 1줄(일자 기준) · 표면 노출가 → 최종매입가(표면−혜택fx) → 판매예정가. '
      +'전날 대비 하락 <span style="color:#1d4ed8;font-weight:700">▼ 파랑</span> · 상승 <span style="color:#dc2626;font-weight:700">▲ 빨강</span>. 변동 없는 단계는 –.</div>';
    var h='<table class="htbl"><thead><tr><th class="l">날짜</th>'
      +'<th><span class="stg stg-s">표면 노출가</span></th>'
      +'<th><span class="stg stg-c">최종매입가</span></th>'
      +'<th><span class="stg stg-p">판매예정가</span></th></tr></thead><tbody>';
    rows.forEach(function(r){
      h+='<tr><td class="l">'+esc(r.day)+'</td>';
      STAGES.forEach(function(f){
        var c=r.cells[f];
        h+='<td>'+(c?histValCell(c.prev, c.next):'<span class="na">–</span>')+'</td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table>';
    return legend+h;
  }
  function renderHist(events, fld){
    return (fld==='price') ? renderHistPrice(events) : renderHistStock(events);
  }

  // 필터 체크박스 토글 (브랜드 OR · 마켓 OR · 그룹간 AND · 미선택=전체)

      var cb=e.target; if(!cb||cb.tagName!=='INPUT') return;
      var b=cb.getAttribute('data-fb'); if(b!=null){ selBrands[b]=cb.checked; updateMaster(); renderFiltered(); return; }
      var m=cb.getAttribute('data-fm'); if(m!=null){ selMarkets[m]=cb.checked; updateMaster(); renderFiltered(); return; }
    });
    // [B] 접기 그룹 헤더 클릭 → 펼침/접힘 토글
    f.addEventListener('click',function(e){
      var h=e.target.closest('.fp-acc-h'); if(!h) return;
      var acc=h.parentElement; acc.setAttribute('data-open', acc.getAttribute('data-open')==='1'?'0':'1');
    });
    // [B] 마스터 「전체」 = 모든 브랜드+마켓 체크 / 다시 누르면 모두 해제
    function setAll(on){
      f.querySelectorAll('input[data-fb]').forEach(function(cb){ var k=cb.getAttribute('data-fb'); selBrands[k]=on; cb.checked=on; });
      f.querySelectorAll('input[data-fm]').forEach(function(cb){ var k=cb.getAttribute('data-fm'); selMarkets[k]=on; cb.checked=on; });
      updateMaster(); renderFiltered();
    }
    var mcb=document.getElementById('fp-master-cb');
    if(mcb) mcb.addEventListener('change',function(){ setAll(mcb.checked); });
  })();
  load();
})();
</script>
{% endblock %}
