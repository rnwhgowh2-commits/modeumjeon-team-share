{# [v2] 임시저장 Floating Bubble — 시안 C #}
{# 사용:
   {% include 'partials/draft_bubble.html' %}
   <script>mountDraftBubble({page: 'new'});</script>
   페이지: 'new' | 'migrate'
#}
<style>
  .draft-fab { position: fixed; right: 20px; bottom: 20px; background: #f59e0b; color: #fff; padding: 12px 16px; border-radius: 30px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4); display: flex; align-items: center; gap: 8px; z-index: 1000; transition: transform 0.15s; }
  .draft-fab:hover { transform: translateY(-2px); }
  .draft-fab .badge { background: #fff; color: #f59e0b; border-radius: 12px; padding: 2px 8px; font-size: 14px; }
  .draft-fab.empty { background: #94a3b8; box-shadow: 0 4px 12px rgba(148,163,184,0.3); }
  .draft-fab.empty .badge { color: #94a3b8; }
  .draft-popup { position: fixed; right: 20px; bottom: 70px; width: 340px; max-height: 60vh; overflow-y: auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 14px; z-index: 1001; display: none; }
  .draft-popup.open { display: block; }
  .draft-popup h3 { font-size: 14px; margin: 0 0 10px; color: #92400e; display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; border-bottom: 1px solid #f3f4f6; }
  .draft-popup .closex { background: none; border: 0; cursor: pointer; font-size: 16px; color: #6b7280; }
  .draft-row { padding: 10px 12px; border-radius: 8px; background: #fff8f1; border: 1px solid #fde4c5; margin-bottom: 8px; font-size: 13px; }
  .draft-row .draft-meta { font-size: 14px; color: #92400e; margin-bottom: 4px; }
  .draft-row .draft-key { font-family: ui-monospace, monospace; color: #1f2937; font-weight: 600; word-break: break-all; }
  .draft-row .draft-actions { display: flex; gap: 6px; margin-top: 8px; }
  .draft-row .draft-actions a, .draft-row .draft-actions button { padding: 4px 10px; border: 1px solid #fde4c5; background: #fff; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; color: #92400e; }
  .draft-row .draft-actions a:hover, .draft-row .draft-actions button:hover { background: #fef3e2; }
  .draft-empty { text-align: center; color: #9ca3af; font-size: 14px; padding: 20px 0; }
</style>
<div id="draft-fab" class="draft-fab" style="display:none">💾 임시저장 <span class="badge" id="draft-fab-count">0</span></div>
<div id="draft-popup" class="draft-popup">
  <h3>💾 임시저장 작업
    <button class="closex" onclick="document.getElementById('draft-popup').classList.remove('open')">✕</button>
  </h3>
  <div id="draft-popup-body"></div>
</div>
