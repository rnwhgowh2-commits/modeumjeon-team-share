{% extends "mobile/_base.html" %}
{% block title %}재고 목록{% endblock %}
{% set back_url = '/mobile' %}

{% block content %}
<div class="m-field">
  <input type="search" id="search-input" placeholder="🔍 SKU / 색상 / 사이즈 / 바코드 검색" autocomplete="off">
</div>

<div id="inventory-summary" style="font-size: 14px; color: var(--n600); padding: 0 4px 8px; display: none;"></div>

<div id="inventory-list">
  <div class="m-loading"><span class="m-spinner"></span>불러오는 중...</div>
</div>
{% endblock %}

{% block extra_script %}
<script>
  let debounceTimer = null;

  async function loadInventory(query = '') {
    const list = document.getElementById('inventory-list');
    const summary = document.getElementById('inventory-summary');
    list.innerHTML = '<div class="m-loading"><span class="m-spinner"></span>불러오는 중...</div>';
    summary.style.display = 'none';

    try {
      const url = '/mobile/api/options?limit=200' + (query ? '&q=' + encodeURIComponent(query) : '');
      const r = await fetch(url);
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || '재고 API 실패');
      render(d.items, d.total, query);
    } catch (e) {
      console.error('[mobile-inv]', e);
      list.innerHTML =
        `<div class="m-empty">
          <div class="icon">⚠️</div>
          재고 불러오기 실패<br>
          <span style="font-size: 14px; color: var(--n500);">${e.message || ''}</span>
        </div>`;
    }
  }

  function render(items, total, query) {
    const list = document.getElementById('inventory-list');
    const summary = document.getElementById('inventory-summary');

    if (!items || !items.length) {
      list.innerHTML = `<div class="m-empty">
        <div class="icon">📭</div>
        ${query ? `"${query}" 검색 결과 없음` : '옵션 없음'}
      </div>`;
      return;
    }

    summary.style.display = 'block';
    summary.textContent = `${total}개 옵션` + (query ? ` · "${query}" 결과` : '');

    list.innerHTML = items.map(it => {
      const sku = it.canonical_sku;
      const stock = it.stock || 0;
      const color = it.color_code || '';
      const size = it.size_code || '';
      const boxhero = it.boxhero_sku || '';
      const img = it.image_url
        ? `<img src="${it.image_url}" style="width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0;">`
        : `<div style="width: 48px; height: 48px; border-radius: 8px; background: var(--n100); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;">📦</div>`;
      const stockColor = stock > 0 ? 'var(--color-ok, #16a34a)' : (stock < 0 ? 'var(--danger, #F04452)' : 'var(--n500, #8B95A1)');
      return `<a href="/mobile/sku/${encodeURIComponent(sku)}" class="m-card" style="display: flex; gap: 12px; align-items: center; text-decoration: none; color: inherit; padding: 12px 14px; margin-bottom: 8px;">
        ${img}
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${sku}</div>
          <div style="font-size: 14px; color: var(--n600); margin-top: 2px;">
            ${color} ${size}${boxhero ? ' · <span style="color: var(--n500); font-family: monospace;">' + boxhero + '</span>' : ''}
          </div>
        </div>
        <div style="text-align: right; flex-shrink: 0;">
          <div style="font-size: 20px; font-weight: 700; color: ${stockColor};">${stock}</div>
          <div style="font-size: 12px; color: var(--n500);">재고</div>
        </div>
      </a>`;
    }).join('');
  }

  // 검색 입력 — 300ms 디바운스 후 서버 호출
  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    const q = e.target.value.trim();
    debounceTimer = setTimeout(() => loadInventory(q), 300);
  });

  loadInventory();
</script>
{% endblock %}
