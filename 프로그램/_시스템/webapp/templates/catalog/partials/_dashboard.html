{# 현황 보기 — 확정 시안 ②(모음전/대량등록 탭) + ③(숫자 + 색 점) #}
<style>
  .cd-seg{display:inline-flex;background:var(--color-bg-muted);border-radius:8px;
    padding:3px;gap:2px;margin-bottom:var(--sp-4)}
  .cd-seg button{height:32px;padding:0 16px;border:0;background:none;border-radius:6px;
    font-family:inherit;font-size:12.5px;font-weight:600;
    color:var(--color-text-secondary);cursor:pointer}
  .cd-seg button.on{background:#fff;color:var(--color-text-primary);
    box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .cd-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--sp-4);
    margin-bottom:var(--sp-5)}
  .cd-kpi{background:#fff;border:1px solid var(--color-border);border-radius:12px;
    padding:var(--sp-4) var(--sp-5)}
  .cd-kpi .l{font-size:12px;color:var(--color-text-tertiary);font-weight:500}
  .cd-kpi .v{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;
    margin-top:2px}
  .cd-kpi .v small{font-size:13px;font-weight:600;
    color:var(--color-text-tertiary);margin-left:3px}
  .cd-wrap{background:#fff;border:1px solid var(--color-border);border-radius:12px;
    overflow:hidden}
  .cd-wrap table{width:100%;border-collapse:collapse}
  .cd-wrap th{background:#FBFCFD;font-size:11.5px;font-weight:600;
    color:var(--color-text-tertiary);padding:10px 14px;
    border-bottom:1px solid var(--color-border);text-align:left;white-space:nowrap}
  .cd-wrap th.n{text-align:right}
  .cd-wrap th.c{text-align:center}
  .cd-wrap td{padding:11px 14px;border-bottom:1px solid var(--color-border-soft);
    font-size:12.5px}
  .cd-wrap td.n{text-align:right;font-variant-numeric:tabular-nums}
  .cd-wrap td.c{text-align:center}
  .cd-wrap tr:last-child td{border-bottom:0}
  /* ③ 숫자 + 색 점 */
  .cd-dot{display:inline-block;width:6px;height:6px;border-radius:999px;
    margin-right:5px;vertical-align:middle}
  .cd-dot.sale{background:var(--color-success)}
  .cd-dot.soldout{background:var(--color-warning)}
  .cd-dot.stopped{background:#C9CDD2}
  .cd-dot.waiting{background:var(--color-info)}
  .cd-dot.unknown{background:var(--color-danger)}
  .cd-v.soldout{color:var(--color-warning);font-weight:700}
  .cd-v.unknown{color:var(--color-danger);font-weight:700}
  .cd-v.stopped{color:var(--color-text-tertiary)}
  .cd-mk{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;
    border-radius:999px;background:var(--color-primary-light);
    color:var(--color-primary-dark)}
  .cd-when{font-size:11.5px;color:var(--color-text-tertiary)}
  .cd-btn{border:1px solid var(--color-border);background:#fff;border-radius:6px;
    padding:5px 11px;font-family:inherit;font-size:11.5px;font-weight:600;
    color:var(--color-text-secondary);cursor:pointer}
  .cd-warn{background:#FEF6E7;border:1px solid #F5D9A0;border-radius:8px;
    padding:12px 14px;font-size:12.5px;color:#8A5A00;margin-bottom:var(--sp-4)}
</style>

<div id="cd-root"><p class="cd-when">불러오는 중…</p></div>

<script>
(function () {
  const root = document.getElementById('cd-root');
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
    (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const N = (n) => Number(n || 0).toLocaleString('ko-KR');
  const MK = {smartstore:'스마트스토어', coupang:'쿠팡', lotteon:'롯데온',
              eleven11:'11번가', auction:'옥션', gmarket:'G마켓'};
  const ST = [['sale','판매중'],['soldout','품절'],['stopped','판매중지'],
              ['waiting','승인대기']];
  let scope = 'bundle';   // ② 모음전(기본) / 대량등록

  function when(iso) {
    if (!iso) return '아직 확인 전';
    const d = new Date(iso), now = new Date();
    const min = Math.round((now - d) / 60000);
    if (min < 60) return min + '분 전';
    if (min < 60 * 24) return Math.round(min / 60) + '시간 전';
    return Math.round(min / 60 / 24) + '일 전';
  }

  function render(j) {
    const s = j.summary || {};
    const rows = (j.markets || []).flatMap((m) =>
      m.accounts.map((a, i) => `<tr>
        <td>${i === 0 ? `<span class="cd-mk">${esc(MK[m.market] || m.market)}</span>` : ''}</td>
        <td>${esc(a.account_key)}</td>
        <td class="n"><b>${N(a.total)}</b></td>
        ${ST.map(([k]) => `<td class="n"><span class="cd-v ${k}">${N(a[k])}</span></td>`).join('')}
        ${a.unknown > 0
          ? `<td class="n"><span class="cd-v unknown">${N(a.unknown)}</span></td>`
          : '<td class="n cd-when">—</td>'}
        <td class="c cd-when">${when(a.measured_at)}</td>
        <td class="c"><button class="cd-btn" data-m="${esc(m.market)}"
          data-a="${esc(a.account_key)}">지금 동기화</button></td>
      </tr>`).join('')).join('');

    root.innerHTML = `
      ${j.unknown_total > 0 ? `<div class="cd-warn">
        <b>처음 보는 상태가 ${N(j.unknown_total)}개 있습니다</b> —
        마켓이 새 상태를 쓰기 시작했을 수 있습니다. 그대로 두면 판매중인지 아닌지
        알 수 없으니 확인이 필요합니다.</div>` : ''}
      <div class="cd-seg">
        <button data-scope="bundle" class="${scope === 'bundle' ? 'on' : ''}">모음전</button>
        <button data-scope="bulk" class="${scope === 'bulk' ? 'on' : ''}">대량등록</button>
      </div>
      <div class="cd-kpis">
        <div class="cd-kpi"><div class="l">전체 등록</div>
          <div class="v">${N(s.total)}<small>개</small></div></div>
        ${ST.map(([k, label]) => `<div class="cd-kpi"><div class="l">${label}</div>
          <div class="v"><span class="cd-dot ${k}"></span>${N(s[k])}<small>개</small></div></div>`).join('')}
      </div>
      <div class="cd-wrap"><table>
        <thead><tr><th style="width:120px">마켓</th><th style="width:150px">계정</th>
          <th class="n" style="width:90px">전체</th>
          ${ST.map(([k, label]) =>
            `<th class="n" style="width:90px"><span class="cd-dot ${k}"></span>${label}</th>`).join('')}
          <th class="n" style="width:90px"><span class="cd-dot unknown"></span>모름</th>
          <th class="c" style="width:110px">마지막 확인</th>
          <th class="c" style="width:110px"></th></tr></thead>
        <tbody>${rows || `<tr><td colspan="10" class="c cd-when"
          style="padding:34px">아직 가져온 상품이 없습니다.
          계정별 「지금 동기화」를 눌러주세요.</td></tr>`}</tbody>
      </table></div>`;

    root.querySelectorAll('.cd-seg button').forEach((b) => {
      b.onclick = () => { scope = b.dataset.scope; load(); };
    });
    root.querySelectorAll('.cd-btn').forEach((b) => { b.onclick = () => sync(b); });
  }

  function load() {
    fetch('/catalog/api/dashboard')
      .then((r) => r.json().then((j) => ({ ok: r.ok, j })))
      .then(({ ok, j }) => {
        if (!ok || j.error) {
          root.innerHTML = `<div class="cd-warn"><b>불러오지 못했습니다</b><br>${
            esc(j.detail || j.error)}</div>`;
          return;
        }
        render(j);
      })
      .catch((e) => {
        root.innerHTML = `<div class="cd-warn"><b>불러오지 못했습니다</b><br>${
          esc(e.message)}</div>`;
      });
  }

  function sync(btn) {
    const old = btn.textContent;
    btn.disabled = true; btn.textContent = '가져오는 중…';
    fetch('/catalog/api/sync', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ market: btn.dataset.m, account_key: btn.dataset.a }),
    })
      .then((r) => r.json().then((j) => ({ ok: r.ok, j })))
      .then(({ ok, j }) => {
        btn.disabled = false; btn.textContent = old;
        if (!ok || !j.ok) {
          window.alert((j.error || (j.result && j.result.error)) || '가져오지 못했습니다.');
        }
        load();
      })
      .catch((e) => {
        btn.disabled = false; btn.textContent = old;
        window.alert(e.message);
      });
  }

  load();
})();
</script>
