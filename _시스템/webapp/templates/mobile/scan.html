{% extends "mobile/_base.html" %}
{% block title %}바코드 스캔{% endblock %}
{% set back_url = '/mobile' %}

{% block extra_head %}
<style>
  .scan-container {
    position: relative;
    background: black;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 4 / 3;
    margin-bottom: 12px;
  }
  #scan-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    /* 가이드만 — 실제 디코드는 전체 프레임. 작은 바코드도 OK */
    width: 70%;
    aspect-ratio: 2.4 / 1;
    border: 2px dashed rgba(255,255,255,0.5);
    border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.25);
    position: relative;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #3182F6, transparent);
    animation: scan-anim 1.4s ease-in-out infinite;
  }
  @keyframes scan-anim {
    0%, 100% { top: 8%; }
    50% { top: 92%; }
  }
  .scan-hint {
    margin-top: 16px;
    background: rgba(0,0,0,0.72);
    color: white;
    padding: 7px 16px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
  }
  .scan-hint.success {
    background: rgba(34,197,94,0.92);
  }
  .scan-error {
    background: rgba(240, 68, 82, 0.15);
    color: var(--danger, #F04452);
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  /* 컨트롤 바 — torch + zoom + 카메라 전환 */
  .scan-ctrl {
    position: absolute;
    bottom: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    pointer-events: auto;
  }
  .scan-ctrl button {
    width: 44px; height: 44px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: white;
    border: 0;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .scan-ctrl button.on { background: #FFD700; color: #000; }
  .scan-ctrl .zoom {
    flex: 1;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: white;
    padding: 8px 14px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .scan-ctrl .zoom input {
    flex: 1;
    height: 4px;
    accent-color: #3182F6;
  }
  /* 인식 통계 */
  .scan-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-size: 11.5px;
    color: var(--n600, #6B7684);
  }
  .scan-stats span { background: var(--n100, #F2F4F6); padding: 4px 10px; border-radius: 99px; }
  .scan-stats .ok { background: #DCFCE7; color: #166534; }
  .scan-stats .nat { background: #DBEAFE; color: #1D4ED8; }
</style>
{% endblock %}

{% block content %}
<div id="scan-error-area"></div>

<div class="scan-container">
  <video id="scan-video" autoplay playsinline muted></video>
  <div class="scan-overlay">
    <div class="scan-frame">
      <div class="scan-line"></div>
    </div>
    <div class="scan-hint" id="scan-hint">📷 카메라 시작 중...</div>
  </div>
  <div class="scan-ctrl">
    <button id="btn-torch" title="플래시" onclick="toggleTorch()">🔦</button>
    <div class="zoom" id="zoom-wrap" style="display:none">
      <span>🔍</span>
      <input type="range" id="zoom-range" min="1" max="3" step="0.1" value="1">
      <span id="zoom-val">1x</span>
    </div>
    <button id="btn-cam" title="카메라 전환" onclick="switchCam()">🔄</button>
  </div>
</div>

<div class="scan-stats" id="scan-stats">
  <span id="stat-engine">엔진: …</span>
  <span id="stat-res">해상도: …</span>
  <span id="stat-tries">시도: 0</span>
</div>

<div class="m-card">
  <p style="margin: 0 0 12px; font-size: 13px; color: var(--n600);">또는 SKU·바코드 직접 입력:</p>
  <div class="m-field" style="margin-bottom: 8px;">
    <input type="text" id="manual-sku" placeholder="예: SKU-APOI30AM 또는 8809962710154" autocomplete="off">
  </div>
  <button class="m-btn primary" id="manual-search">검색</button>
</div>
{% endblock %}

{% block extra_script %}
<script src="https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js"></script>
<script>
  const preselectedAction = new URLSearchParams(location.search).get('action');
  let stream = null;
  let track = null;
  let codeReader = null;
  let detector = null;       // Native BarcodeDetector (가능 시)
  let detectLoop = null;
  let triesCount = 0;
  let camIdx = 0;
  let cameras = [];
  let frozen = false;        // 인식 후 다시 시도 방지

  // ───────────── 카메라 초기화 ─────────────
  async function listCameras(){
    const devs = await navigator.mediaDevices.enumerateDevices();
    cameras = devs.filter(d => d.kind === 'videoinput');
    // 후면 우선 정렬
    cameras.sort((a, b) => {
      const ar = /back|rear|environment/i.test(a.label || '') ? -1 : 1;
      const br = /back|rear|environment/i.test(b.label || '') ? -1 : 1;
      return ar - br;
    });
  }

  async function startCamera(camId){
    // ★ 4K 시도 → 미지원 시 1080p 폴백. 후면 + 연속 초점 + macro (가까운 거리)
    const tryConstraints = [
      { video: {
          deviceId: camId ? { exact: camId } : undefined,
          facingMode: camId ? undefined : { ideal: 'environment' },
          width: { ideal: 3840 }, height: { ideal: 2160 },  // 4K
          advanced: [{ focusMode: 'continuous' }, { focusDistance: 0.15 }],
        }, audio: false },
      { video: {
          deviceId: camId ? { exact: camId } : undefined,
          facingMode: camId ? undefined : { ideal: 'environment' },
          width: { ideal: 1920 }, height: { ideal: 1080 },  // 1080p
          advanced: [{ focusMode: 'continuous' }],
        }, audio: false },
    ];
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    let lastErr;
    for (const c of tryConstraints) {
      try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
      catch(e) { lastErr = e; continue; }
    }
    if (!stream) throw lastErr || new Error('카메라 시작 실패');
    track = stream.getVideoTracks()[0];
    const video = document.getElementById('scan-video');
    video.srcObject = stream;
    await video.play();

    // 해상도 표시
    const settings = track.getSettings();
    document.getElementById('stat-res').textContent =
      `해상도: ${settings.width || '?'}×${settings.height || '?'}`;

    // ── torch / zoom capability 검사 ──
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    document.getElementById('btn-torch').style.display = caps.torch ? '' : 'none';
    if (caps.zoom) {
      document.getElementById('zoom-wrap').style.display = '';
      const zr = document.getElementById('zoom-range');
      zr.min = caps.zoom.min; zr.max = caps.zoom.max; zr.step = caps.zoom.step || 0.1;
      zr.value = settings.zoom || caps.zoom.min;
      zr.oninput = async () => {
        try { await track.applyConstraints({ advanced: [{ zoom: parseFloat(zr.value) }] }); }
        catch (e) { console.warn('zoom fail', e); }
        document.getElementById('zoom-val').textContent = parseFloat(zr.value).toFixed(1) + 'x';
      };
    } else {
      document.getElementById('zoom-wrap').style.display = 'none';
    }
  }

  // ───────────── 디코더 — Native 우선 / ZXing 폴백 ─────────────
  async function startDecoder(){
    const hint = document.getElementById('scan-hint');
    // ★ 1) Native BarcodeDetector (Android Chrome 88+, Edge — 매우 빠름)
    if ('BarcodeDetector' in window) {
      try {
        const supported = await BarcodeDetector.getSupportedFormats();
        // EAN-13 등 우선 + 가능한 모든 포맷
        const formats = supported.filter(f =>
          ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e', 'qr_code', 'data_matrix'].includes(f)
        );
        detector = new BarcodeDetector({ formats: formats.length ? formats : undefined });
        document.getElementById('stat-engine').textContent = '엔진: Native';
        document.getElementById('stat-engine').classList.add('nat');
        nativeLoop();
        hint.textContent = '📷 바코드를 프레임 안에';
        return;
      } catch(e) { console.warn('Native fail, fallback ZXing', e); }
    }
    // ★ 2) ZXing 폴백 — TRY_HARDER + EAN_13 우선
    if (typeof ZXing === 'undefined' && typeof ZXingBrowser === 'undefined') {
      throw new Error('바코드 라이브러리 로드 실패');
    }
    const Z = window.ZXing || window.ZXingBrowser;
    const hints = new Map();
    if (Z.DecodeHintType) {
      hints.set(Z.DecodeHintType.TRY_HARDER, true);
      // 흑백 반전·옅은 광 등 더 적극적으로 시도
      if (Z.DecodeHintType.ALSO_INVERTED) hints.set(Z.DecodeHintType.ALSO_INVERTED, true);
      // EAN-13 우선 + 흔한 포맷
      if (Z.BarcodeFormat) {
        hints.set(Z.DecodeHintType.POSSIBLE_FORMATS, [
          Z.BarcodeFormat.EAN_13, Z.BarcodeFormat.EAN_8,
          Z.BarcodeFormat.CODE_128, Z.BarcodeFormat.CODE_39,
          Z.BarcodeFormat.UPC_A, Z.BarcodeFormat.UPC_E,
          Z.BarcodeFormat.QR_CODE, Z.BarcodeFormat.DATA_MATRIX,
          Z.BarcodeFormat.ITF, Z.BarcodeFormat.CODABAR,
        ]);
      }
    }
    codeReader = new ZXingBrowser.BrowserMultiFormatReader(hints);
    document.getElementById('stat-engine').textContent = '엔진: ZXing+TRY_HARDER';
    const video = document.getElementById('scan-video');
    codeReader.decodeFromVideoElement(video, (result, error) => {
      triesCount++;
      document.getElementById('stat-tries').textContent = '시도: ' + triesCount;
      if (result && !frozen) {
        handleResult(result.getText());
      }
    });
    hint.textContent = '📷 바코드를 프레임 안에';
  }

  // Native BarcodeDetector loop — Canvas snapshot (풀 해상도 보장, 잘림 X)
  async function nativeLoop(){
    const video = document.getElementById('scan-video');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    while (!frozen) {
      if (video.readyState >= 2 && video.videoWidth) {
        triesCount++;
        document.getElementById('stat-tries').textContent = '시도: ' + triesCount;
        // ★ video 의 풀 해상도 (videoWidth × videoHeight) 그대로 canvas 에 그림
        // CSS object-fit:cover 와 무관 → 작은 바코드도 픽셀 손실 없이 디코드
        if (canvas.width !== video.videoWidth) canvas.width = video.videoWidth;
        if (canvas.height !== video.videoHeight) canvas.height = video.videoHeight;
        try {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const codes = await detector.detect(canvas);
          if (codes.length && !frozen) {
            handleResult(codes[0].rawValue);
            return;
          }
        } catch(e) { /* 무시 */ }
      }
      await new Promise(r => setTimeout(r, 80));  // 80ms 간격 (초당 ~12회)
    }
  }

  // ───────────── 결과 처리 ─────────────
  function handleResult(code){
    if (frozen) return;
    // 인식 코드 사전 검사 — 너무 짧거나 빈 값 무시 (false positive 회피)
    const trimmed = (code || '').trim();
    if (trimmed.length < 4) {
      console.warn('[scan] 너무 짧은 코드 무시:', JSON.stringify(code));
      return;
    }
    frozen = true;
    // 즉시 video pause — 연속 디코딩 중단 (handleCode 동안 다음 frame 시도 방지)
    try {
      const video = document.getElementById('scan-video');
      video.pause();
    } catch(e) {}
    if (navigator.vibrate) navigator.vibrate(80);
    const hint = document.getElementById('scan-hint');
    hint.textContent = '✅ ' + trimmed;
    hint.classList.add('success');
    handleCode(trimmed);
  }

  async function handleCode(code){
    showToast('검색 중: ' + code, 'info');
    let r;
    try {
      r = await fetch('/mobile/api/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });
    } catch(e) {
      console.error('[lookup] fetch fail:', e);
      showToast('네트워크 오류: ' + (e.message || e), 'error');
      resumeScan();
      return;
    }
    // 응답이 JSON 아닐 가능성 (auth redirect, 500 HTML 등)
    const ct = r.headers.get('content-type') || '';
    if (!ct.includes('application/json')) {
      const text = await r.text();
      console.error('[lookup] non-JSON response:', r.status, text.substring(0, 200));
      if (r.status === 401 || r.status === 302 || text.includes('login')) {
        showToast('로그인 만료 — 새로고침', 'error');
        setTimeout(() => location.reload(), 1500);
      } else {
        showToast('서버 오류 ' + r.status, 'error');
        resumeScan();
      }
      return;
    }
    let d;
    try { d = await r.json(); }
    catch(e) {
      console.error('[lookup] JSON parse fail:', e);
      showToast('응답 파싱 실패', 'error');
      resumeScan();
      return;
    }
    if (!d.ok) {
      showToast('❌ ' + (d.error || '매칭 안 됨: ' + code), 'error');
      resumeScan(d.error || '매칭 안 됨');
      return;
    }
    const url = `/mobile/sku/${encodeURIComponent(d.option.canonical_sku)}` +
      (preselectedAction ? '?action=' + preselectedAction : '');
    location.href = url;
  }

  function resumeScan(msg){
    setTimeout(() => {
      frozen = false;
      const hint = document.getElementById('scan-hint');
      hint.classList.remove('success');
      hint.textContent = '📷 ' + (msg || '다시 비춰주세요');
      try { document.getElementById('scan-video').play(); } catch(e) {}
    }, 1800);
  }

  // ───────────── 컨트롤 ─────────────
  async function toggleTorch(){
    if (!track) return;
    const caps = track.getCapabilities();
    if (!caps.torch) { showToast('플래시 지원 안 됨', 'info'); return; }
    const btn = document.getElementById('btn-torch');
    const on = btn.classList.toggle('on');
    try { await track.applyConstraints({ advanced: [{ torch: on }] }); }
    catch(e) { console.warn('torch fail', e); btn.classList.remove('on'); }
  }

  async function switchCam(){
    if (cameras.length < 2) { showToast('카메라 1개만 사용 가능', 'info'); return; }
    camIdx = (camIdx + 1) % cameras.length;
    frozen = true;
    try {
      await startCamera(cameras[camIdx].deviceId);
      frozen = false;
    } catch(e) { showToast('카메라 전환 실패', 'error'); }
  }

  // ───────────── 시작 ─────────────
  async function start(){
    const errorArea = document.getElementById('scan-error-area');
    const hint = document.getElementById('scan-hint');
    try {
      await listCameras();
      if (!cameras.length) throw new Error('카메라 없음');
      await startCamera(cameras[0].deviceId);
      await startDecoder();
    } catch (e) {
      console.error('[scan]', e);
      let msg = e.message || String(e);
      if (msg.includes('Permission') || msg.includes('NotAllowed')) msg = '카메라 권한이 거부됨. 설정에서 허용해주세요.';
      else if (msg.includes('NotFound') || msg.includes('카메라 없음')) msg = '카메라 없음 — SKU 직접 입력해주세요.';
      errorArea.innerHTML = `<div class="scan-error">⚠️ ${msg}</div>`;
      hint.textContent = '❌ 카메라 실패';
    }
  }

  document.getElementById('manual-search').addEventListener('click', () => {
    const v = document.getElementById('manual-sku').value.trim();
    if (!v) { showToast('SKU 입력해주세요', 'error'); return; }
    handleCode(v);
  });
  document.getElementById('manual-sku').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('manual-search').click();
  });

  window.addEventListener('beforeunload', () => {
    frozen = true;
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (codeReader) codeReader.reset?.();
  });

  start();
</script>
{% endblock %}
