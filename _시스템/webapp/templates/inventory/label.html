<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>라벨 인쇄 — {{ opt.canonical_sku }}</title>
<style>
  @page { size: A4; margin: 0; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; margin: 0; padding: 14px; background: #f5f5f5; color: #191F28; }
  /* 툴바 */
  .tb { background: #fff; padding: 14px 18px; border-radius: 8px; margin-bottom: 14px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; max-width: 900px; margin-left: auto; margin-right: auto; }
  .tb strong { font-size: 15px; }
  .tb label { font-size: 12px; color: #6B7684; font-weight: 600; }
  .tb select, .tb input { padding: 7px 10px; border: 1px solid #CBCCD3; border-radius: 5px; font-size: 13px; font-family: inherit; background: #fff; }
  .tb select { min-width: 200px; }
  .tb button { padding: 8px 14px; border-radius: 6px; border: 0; font-size: 13px; cursor: pointer; font-weight: 700; font-family: inherit; }
  .tb button.primary { background: #3182F6; color: #fff; }
  .tb button.ghost { background: #fff; border: 1px solid #CBCCD3; color: #4E5968; }
  .tb .info { font-size: 11.5px; color: #6B7684; margin-left: 6px; }

  /* A4 시트 — 화면 미리보기 */
  .sheet {
    background: #fff;
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    box-shadow: 0 4px 22px rgba(0,0,0,0.08);
    position: relative;
    page-break-after: always;
  }

  /* 라벨 1칸 */
  .lbl {
    position: absolute;
    border: 1px dashed #ccc;
    box-sizing: border-box;
    padding: 2mm 3mm;
    text-align: center;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .lbl .nm { font-size: 9pt; font-weight: 800; margin-bottom: 1mm; line-height: 1.15; }
  .lbl .sku { font-family: "SF Mono", monospace; font-size: 7pt; color: #6B7684; margin-bottom: 1mm; word-break: break-all; }
  .lbl .bc { font-family: "Libre Barcode 39", monospace; font-size: 26pt; letter-spacing: 0; line-height: 0.8; margin: 0.5mm 0; }
  .lbl .bc-text { font-family: "SF Mono", monospace; font-size: 7pt; color: #191F28; font-weight: 600; }
  .lbl .meta { font-size: 7pt; color: #4E5968; margin-top: 1mm; }
  .lbl .small .bc { font-size: 18pt; }
  .lbl .small .nm { font-size: 7.5pt; }

  @media print {
    body { background: #fff; padding: 0; }
    .tb { display: none; }
    .sheet { box-shadow: none; margin: 0; }
    .lbl { border-color: transparent !important; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
</head>
<body>

<div class="tb">
  <strong>🏷 라벨 인쇄</strong>
  <span class="info">{{ opt.canonical_sku }}</span>

  <label style="margin-left:18px">라벨 용지</label>

      <option value="avery_l7656">Avery L7656 — 4×11 = 44칸 (46×25.4mm)</option>
      <option value="avery_l7657">Avery L7657 — 4×10 = 40칸 (48×25mm) ★4×10</option>
      <option value="avery_l7658">Avery L7658 — 5×8 = 40칸 (38.1×25.4mm)</option>

      <option value="printec_v3700">Printec V3700 — 3×8 = 24칸 (63.5×33.9mm)</option>
      <option value="printec_v3710">Printec V3710 — 2×7 = 14칸 (99×38mm)</option>
      <option value="printec_v3720">Printec V3720 — 2×8 = 16칸 (99×34mm)</option>

  <label style="margin-left:8px">매수</label>

  <button class="primary" onclick="window.print()">🖨 인쇄</button>

<script>
// 라벨 용지 표준 — A4 (210×297mm) 기준. 모든 단위 mm.
// 박스히어로 호환 — Formtec / Avery / Printec 50+ 모델

  'formtec_3109': {cols:3, rows:11,w:64,  h:24,  mt:14.5, ml:7,    gx:3,   gy:0 },
  'formtec_3110': {cols:4, rows:10,w:48,  h:25,  mt:13.5, ml:7,    gx:3,   gy:0 },
  'formtec_3112': {cols:4, rows:12,w:48,  h:21,  mt:13.5, ml:7,    gx:3,   gy:0 },
  'formtec_3113': {cols:4, rows:13,w:48,  h:20,  mt:13.5, ml:7,    gx:3,   gy:0 },
  'formtec_3114': {cols:5, rows:10,w:38,  h:25,  mt:13.5, ml:7,    gx:3,   gy:0 },
  'formtec_3115': {cols:5, rows:11,w:38,  h:23,  mt:13.5, ml:7,    gx:3,   gy:0 },
  'formtec_3120': {cols:3, rows:7, w:70,  h:36,  mt:15,   ml:5,    gx:0,   gy:0 },
  'formtec_3122': {cols:4, rows:7, w:52,  h:38,  mt:13,   ml:5,    gx:0,   gy:0 },
  'formtec_3124': {cols:1, rows:6, w:200, h:46,  mt:5,    ml:5,    gx:0,   gy:0 },
  'formtec_3140': {cols:2, rows:2, w:99,  h:140, mt:5,    ml:7,    gx:3,   gy:0 },
  'formtec_3144': {cols:4, rows:8, w:48,  h:35,  mt:5,    ml:7,    gx:3,   gy:0 },
  'formtec_3170': {cols:3, rows:9, w:64,  h:30,  mt:13.5, ml:7,    gx:3,   gy:0 },
  // ─── Avery ───
  'avery_l7156':  {cols:4, rows:11,w:46,   h:25.4,mt:13.5,ml:7,    gx:2.5, gy:0 },
  'avery_l7160':  {cols:3, rows:7, w:63.5, h:38.1,mt:15.15,ml:7.21,gx:2.5, gy:0 },
  'avery_l7161':  {cols:3, rows:6, w:63.5, h:46.6,mt:11.55,ml:7.21,gx:2.5, gy:0 },
  'avery_l7162':  {cols:2, rows:8, w:99.1, h:33.9,mt:14,  ml:5.7,  gx:2.5, gy:0 },
  'avery_l7163':  {cols:2, rows:7, w:99.1, h:38.1,mt:15.15,ml:5.7, gx:2.5, gy:0 },
  'avery_l7165':  {cols:2, rows:4, w:99.1, h:67.7,mt:13.4,ml:5.7,  gx:2.5, gy:0 },
  'avery_l7166':  {cols:2, rows:3, w:99.1, h:93.1,mt:8.85,ml:5.7,  gx:2.5, gy:0 },
  'avery_l7651':  {cols:3, rows:8, w:38.1, h:21.2,mt:13,  ml:5,    gx:2.5, gy:0 },
  'avery_l7654':  {cols:4, rows:11,w:45.7, h:25.4,mt:13.5,ml:9.7,  gx:2.5, gy:0 },

  'avery_l7658':  {cols:5, rows:8, w:38.1, h:25.4,mt:13.5,ml:7,    gx:2.5, gy:0 },
  'avery_l7670':  {cols:5, rows:13,w:38.1, h:21.2,mt:13,  ml:5,    gx:2.5, gy:0 },
  // ─── Printec ───
  'printec_v3700':{cols:3, rows:8, w:63.5, h:33.9,mt:13,  ml:8.4,  gx:2.5, gy:0 },
  'printec_v3710':{cols:2, rows:7, w:99,   h:38,  mt:15,  ml:7,    gx:3,   gy:0 },
  'printec_v3720':{cols:2, rows:8, w:99,   h:34,  mt:14,  ml:7,    gx:3,   gy:0 },
  'printec_v3725':{cols:2, rows:10,w:99,   h:25,  mt:21.5,ml:7,    gx:3,   gy:0 },
  'printec_v3730':{cols:3, rows:7, w:64,   h:38,  mt:15,  ml:7,    gx:3,   gy:0 },
  'printec_v3740':{cols:3, rows:9, w:64,   h:30,  mt:13.5,ml:7,    gx:3,   gy:0 },
  'printec_v3750':{cols:2, rows:7, w:99,   h:38,  mt:15,  ml:7,    gx:3,   gy:0 },
  'printec_v3780':{cols:3, rows:7, w:64,   h:38,  mt:15,  ml:7,    gx:3,   gy:0 },
  'printec_v3800':{cols:4, rows:8, w:48,   h:34,  mt:15,  ml:7,    gx:3,   gy:0 },

  'printec_v3840':{cols:5, rows:13,w:38,   h:20,  mt:13.5,ml:7,    gx:3,   gy:0 },
};

function getCustomPreset(){
  return {
    cols: parseInt(document.getElementById('c-cols').value || 3),
    rows: parseInt(document.getElementById('c-rows').value || 8),
    w: parseFloat(document.getElementById('c-w').value || 64),
    h: parseFloat(document.getElementById('c-h').value || 34),
    mt: parseFloat(document.getElementById('c-mt').value || 15),
    ml: parseFloat(document.getElementById('c-ml').value || 7),
    gx: parseFloat(document.getElementById('c-gx').value || 3),
    gy: parseFloat(document.getElementById('c-gy').value || 0),
  };
}

function onPresetChange(){
  const key = document.getElementById('preset').value;
  document.getElementById('custom-box').style.display = (key === 'custom') ? '' : 'none';
  redraw();
}

const ITEM = {
  name: {{ ((mdl.model_name_display or mdl.model_name_raw) if mdl else opt.model_code)|tojson|safe }},
  sku: {{ opt.canonical_sku|tojson|safe }},
  barcode: {{ (barcode or '')|tojson|safe }},
  color: {{ (opt.color_display or opt.color_code or '—')|tojson|safe }},
  size: {{ (opt.size_display or opt.size_code or '—')|tojson|safe }},
};

function redraw(){
  const presetKey = document.getElementById('preset').value;
  const p = (presetKey === 'custom') ? getCustomPreset() : (PRESETS[presetKey] || PRESETS['formtec_3102']);
  const count = Math.max(1, parseInt(document.getElementById('cnt').value || 1));
  const start = Math.max(1, parseInt(document.getElementById('start').value || 1));
  const perPage = p.cols * p.rows;
  const totalNeeded = start - 1 + count;
  const numPages = Math.ceil(totalNeeded / perPage);
  const small = p.w < 50 || p.h < 25;  // 작은 라벨은 폰트 작게

  const sheetsEl = document.getElementById('sheets');
  sheetsEl.innerHTML = '';
  let labelIdx = 0;  // 그릴 라벨 카운터
  for (let pg = 0; pg < numPages; pg++) {
    const sheet = document.createElement('div');
    sheet.className = 'sheet';
    for (let r = 0; r < p.rows; r++) {
      for (let c = 0; c < p.cols; c++) {
        const globalIdx = pg * perPage + r * p.cols + c + 1;
        if (globalIdx < start) continue;          // 시작 위치 전 = 빈칸
        if (labelIdx >= count) continue;           // 매수 다 채움
        labelIdx++;
        const x = p.ml + c * (p.w + p.gx);
        const y = p.mt + r * (p.h + p.gy);
        const lbl = document.createElement('div');
        lbl.className = 'lbl' + (small ? ' small' : '');
        lbl.style.left = x + 'mm';
        lbl.style.top  = y + 'mm';
        lbl.style.width = p.w + 'mm';
        lbl.style.height = p.h + 'mm';
        lbl.innerHTML = `
          <div class="nm">${escapeHTML(ITEM.name)}</div>
          <div class="sku">${escapeHTML(ITEM.sku)}</div>
          ${ITEM.barcode ? `
            <div class="bc">*${escapeHTML(ITEM.barcode)}*</div>
            <div class="bc-text">${escapeHTML(ITEM.barcode)}</div>
          ` : '<div style="padding:4mm;color:#9CA3AF;font-size:9pt">바코드 없음</div>'}
          <div class="meta">${escapeHTML(ITEM.color)} · ${escapeHTML(ITEM.size)}</div>
        `;
        sheet.appendChild(lbl);
      }
    }
    sheetsEl.appendChild(sheet);
  }
}

function escapeHTML(s){return String(s).replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"})[c]);}

redraw();
</script>
