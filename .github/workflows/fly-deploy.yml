name: Fly.io 자동 배포

# main 브랜치 push 시 자동 배포
on:
  push:
    branches:
      - main
    paths:
      # 프로그램/_시스템/ 변경 또는 워크플로 변경 시만 (2026-05-17 폴더 이동)
      - '프로그램/_시스템/**'
      - '.github/workflows/fly-deploy.yml'
  # 수동 트리거도 가능 (Actions 탭 → Run workflow)
  workflow_dispatch:

# 동시 배포 방지 (이전 배포 끝나기 전 새 push 오면 대기)
concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 소스 체크아웃 (정확한 SHA + 전체 history + clean)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          clean: true

      - name: 런너의 base.html 코드 직접 확인 (Depot 컨텍스트 cache 진단)
        run: |
          echo "--- 런너의 base.html ?v= ---"
          grep -n "option_url_modal.js" 프로그램/_시스템/webapp/templates/base.html || echo "NOT FOUND"
          echo ""
          echo "--- git SHA ---"
          git rev-parse HEAD

      - name: flyctl 설치
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly.io 배포 (--local-only 로 Depot cache 버그 우회)
        working-directory: ./프로그램/_시스템
        run: flyctl deploy --local-only --ha=false --no-cache --strategy=immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 머신 비정상 시 destroy → deploy 가 새 머신 자동 생성
        working-directory: ./프로그램/_시스템
        run: |
          set +e
          echo "--- 머신 상태 ---"
          flyctl machine list -a modeumjeon-team-share

          # 머신 상태가 stopped/started 가 아니면 (replacing/stopping) destroy
          STALE_IDS=$(flyctl machine list -a modeumjeon-team-share --json | python3 -c "
          import sys,json
          for m in json.load(sys.stdin):
              if m.get('state') not in ('started','stopped'):
                  print(m['id'])
          ")
          if [ -n "$STALE_IDS" ]; then
            echo "--- Stale 머신 발견: $STALE_IDS ---"
            for M in $STALE_IDS; do
              echo "Stop+Destroy $M..."
              flyctl machine stop $M -a modeumjeon-team-share --signal SIGKILL || true
              sleep 3
              flyctl machine destroy $M -a modeumjeon-team-share --force || true
            done

            echo "--- 새 머신 생성 (재배포 --local-only 로 Depot 우회) ---"
            flyctl deploy --local-only --ha=false --no-cache --strategy=immediate
          else
            echo "머신 정상, destroy 불필요"
          fi
          true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 배포 검증 (헬스체크)
        run: |
          # Fly 무료 티어 머신은 스케일-투-제로에서 깨어나며 콜드스타트가 길 수 있어
          # (앱 부팅 + DB 풀 워밍업). 기존 ~25초 윈도우는 너무 짧아 정상 배포도 503으로
          # 오탐 → "failed" 표시 → 진짜 실패 식별력 상실. 넉넉히 재시도하되 각 curl 은
          # --max-time 으로 바운드(행 방지). 끝까지 응답 없으면 진짜 문제로 보고 실패.
          echo "Fly 콜드스타트 대기 — 머신 부팅까지 최대 ~3분 재시도"
          sleep 15
          for i in $(seq 1 12); do
            if curl -fsS --max-time 20 https://modeumjeon-team-share.fly.dev/health > /tmp/health.json 2>/dev/null; then
              echo "✅ 헬스체크 성공 (시도 $i):"
              cat /tmp/health.json
              exit 0
            fi
            echo "대기 중... (시도 $i/12 — 15초 후 재시도)"
            sleep 15
          done
          echo "❌ 헬스체크 실패 — 3분+ 동안 /health 무응답 (실제 배포 문제 가능성)"
          exit 1
