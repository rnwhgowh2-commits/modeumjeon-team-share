# ════════════════════════════════════════════════════════════
# AWS Lightsail 자동배포 — 무중단(zero-downtime) 방식
# ════════════════════════════════════════════════════════════
# 구조: Cloudflare ─▶ Caddy(:80 상시) ─▶ 앱컨테이너(내부 docker 네트워크 web)
#   배포 = ① 새 앱 컨테이너를 내부에 먼저 띄움 → ② 내부 헬스체크 통과 확인
#         → ③ Caddy 를 새 컨테이너로 graceful reload(무중단) → ④ 옛 컨테이너 제거
#   :80 은 Caddy 가 계속 잡고 있으므로 앱 교체 중에도 정전 0초 → 배포발 521 제거.
#
# 안전장치(실패해도 사이트가 죽지 않음):
#   - 새 컨테이너가 헬스체크 실패 → 폐기하고 기존 유지(전환 안 함).
#   - 최초 전환 때 Caddy 경유가 안 되면 → 옛 "직결(:80)" 방식으로 자동 원복.
#   - 평소 배포 때 Caddy 전환 후 응답 실패 → 직전 컨테이너로 Caddy 되돌리고 새 것 폐기.
#
# 필요한 GitHub Secret (등록 완료): LIGHTSAIL_HOST, LIGHTSAIL_SSH_KEY, DATABASE_URL
# 서버 1회 준비(완료): docker 설치 + /home/ubuntu/app.env (환경변수)
# 컨테이너 인라인 -e 플래그(DISABLE_AUTH, MOUM_LIVE_INVOICE)는 이 파일이 단일 진실 원천 —
#   여기 없으면 재배포마다 꺼진다. 송장 실전송=ON(사용자 승인). 가격·재고 업로드(MOUM_LIVE_UPLOAD)는 미포함=OFF.
# ════════════════════════════════════════════════════════════
name: AWS Lightsail 자동배포

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      arm_live_confirm:
        description: '이번 배포만 자동전환 실전환 켜기(MOUM_LIVE_CONFIRM=1). ⚠️ 검증 끝나면 반드시 일반 배포(push)로 되돌려 끌 것.'
        type: boolean
        default: false
      arm_live_upload:
        description: '이번 배포만 가격·재고 실전송 켜기(MOUM_LIVE_UPLOAD=1). ⚠️ 검증 끝나면 반드시 일반 배포(push)로 되돌려 끌 것.'
        type: boolean
        default: false

# 동시 배포 금지 — 2026-07-21 18:32 푸시 배포와 수동 배포가 11초 차로 동시에 들어가
#   같은 ~/app 빌드 폴더·같은 이미지 태그를 서로 덮어써 5분간 502(주문 엑셀 내보내기 실패).
#   같은 그룹의 새 런은 앞 런이 끝날 때까지 대기(취소 아님 — SSH 중단은 서버를 깨뜨림).
concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH 키 준비
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/ls_key
          chmod 600 ~/.ssh/ls_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 코드 압축 → 서버 전송 → 무중단 교체
        run: |
          set -e
          cd "프로그램/_시스템"
          tar czf /tmp/app.tar.gz \
            --exclude='./data' --exclude='./.git' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='./.pytest_cache' --exclude='./logs' \
            --exclude='*.log' --exclude='./.wrangler' .
          scp -i ~/.ssh/ls_key -o StrictHostKeyChecking=accept-new \
            /tmp/app.tar.gz ubuntu@"${{ secrets.LIGHTSAIL_HOST }}":/home/ubuntu/app.tar.gz
          ssh -i ~/.ssh/ls_key -o StrictHostKeyChecking=accept-new \
            ubuntu@"${{ secrets.LIGHTSAIL_HOST }}" '
              set -e
              rm -rf ~/app && mkdir -p ~/app && tar xzf ~/app.tar.gz -C ~/app
              cd ~/app

              # ══ ⓪ 서버 안전장치 3종(멱등) — 2026-07-22 배포발 서버 전체 프리즈 재발 방지 ══
              #   사건: 빌드+옛앱+새앱 동시 상주로 램(2GB) 고갈 → 스왑이 없어 커널 스래싱
              #         → SSH·HTTP 전부 무응답 → 콘솔 재부팅만 가능. 게다가 얼어붙은 배포가
              #         남긴 유령 컨테이너가 재부팅 후 자동 기동돼 또 고갈되는 악순환.
              # ── ⓪-1 스왑 2GB — 램 고갈이 하드프리즈가 아니라 일시 감속으로 끝나게 ──
              if ! sudo swapon --show | grep -q /; then
                sudo fallocate -l 2G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048 status=none
                sudo chmod 600 /swapfile && sudo mkswap /swapfile >/dev/null && sudo swapon /swapfile
                grep -q swapfile /etc/fstab || echo "/swapfile none swap sw 0 0" | sudo tee -a /etc/fstab >/dev/null
                echo "[safety] 스왑 2GB 생성·활성화 완료"
              fi
              sudo sysctl -qw vm.swappiness=10 2>/dev/null || true
              # ── ⓪-2 earlyoom — 완전 고갈 직전 가장 큰 프로세스만 먼저 종료(박스 생존) ──
              if ! command -v earlyoom >/dev/null 2>&1; then
                sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq 2>/dev/null || true
                sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq earlyoom 2>/dev/null \
                  && sudo systemctl enable --now earlyoom 2>/dev/null \
                  && echo "[safety] earlyoom 설치·기동 완료" || echo "[safety] earlyoom 설치 실패(치명 아님)"
              fi
              # ── ⓪-3 유령 앱 컨테이너 정리 — 중단된 배포 잔재가 재부팅 후 같이 뜨는 고리 차단 ──
              if sudo docker ps --format "{{.Names}}" | grep -qx caddy && [ -f /home/ubuntu/Caddyfile ]; then
                KEEP="$(grep -oE "modeumjeon(_[0-9]+)?" /home/ubuntu/Caddyfile | head -1)"
              else
                KEEP="modeumjeon"
              fi
              for c in $(sudo docker ps -a --format "{{.Names}}" | grep -E "^modeumjeon(_[0-9]+)?$"); do
                [ "$c" = "$KEEP" ] || { echo "[safety] 유령 컨테이너 제거: $c"; sudo docker rm -f "$c" 2>/dev/null || true; }
              done

              # ── ① 새 이미지 빌드 (옛 컨테이너는 계속 서비스 중 — 사이트 UP) ──
              sudo docker build --build-arg CACHEBUST=${{ github.sha }} -t modeumjeon . >/tmp/build.log 2>&1 || { tail -30 /tmp/build.log; exit 1; }

              # ── 공통 준비: 내부 네트워크 + 시크릿 폴더 + DB 오버라이드 ──
              sudo docker network inspect web >/dev/null 2>&1 || sudo docker network create web
              sudo mkdir -p /home/ubuntu/ui_secrets
              sudo chown -R 1000:1000 /home/ubuntu/ui_secrets
              sudo chmod 700 /home/ubuntu/ui_secrets
              DBURL="${{ secrets.DATABASE_URL }}"
              EXTRA=""
              case "$DBURL" in
                postgresql://*ap-northeast-2*supabase*) EXTRA="-e DATABASE_URL=$DBURL"; echo "[deploy] DATABASE_URL override → Seoul 적용" ;;
                *) echo "[deploy] DATABASE_URL 미설정/형식불일치 → app.env(도쿄) 유지" ;;
              esac
              # 앱 컨테이너 공통 실행 플래그 (신규·폴백 재사용) — 이 파일이 단일 진실 원천
              FLAG_CONFIRM="${{ github.event.inputs.arm_live_confirm == 'true' && '-e MOUM_LIVE_CONFIRM=1' || '' }}"
              FLAG_UPLOAD="${{ (vars.LIVE_UPLOAD_ARMED == '1' || github.event.inputs.arm_live_upload == 'true') && '-e MOUM_LIVE_UPLOAD=1' || '' }}"
              # 조회기간 상한 실측 프로브(읽기 전용). 조사 끝나면 저장소 변수 PERIOD_PROBE_ARMED 를 0 으로 → 재배포 시 닫힘
              FLAG_PROBE="${{ vars.PERIOD_PROBE_ARMED == '1' && '-e PERIOD_PROBE=1' || '' }}"
              # 업로드 속도한도 실측 프로브(**쓰기**). 재고 무변화 갱신을 반복해 429 지점을 찾는다.
              #   ⚠️ DISABLE_AUTH=1 환경이라 켜져 있는 동안은 무인증으로 열린다 —
              #      측정하는 그 순간에만 켜고 **끝나면 즉시 0 으로** 되돌릴 것.
              FLAG_URPROBE="${{ vars.UPLOAD_RATE_PROBE_ARMED == '1' && '-e UPLOAD_RATE_PROBE=1' || '' }}"
              # 주문 백필 킬스위치. 1코어 서버라 백필이 코어를 다투면 522(원단 응답불가)가
              #   나고 그 상태에선 API 취소도 안 돼 재배포마다 자동 재개되는 악순환이 된다.
              #   저장소 변수 MOUM_BACKFILL_OFF=1 이면 재배포 시 백필이 안 켜져 고리가 끊긴다.
              FLAG_BFOFF="${{ vars.MOUM_BACKFILL_OFF == '1' && '-e MOUM_BACKFILL_OFF=1' || '' }}"
              # 상품 실등록 게이트(**쓰기** — 옥션·G마켓에 실제 상품 생성). 기본 OFF.
              #   ⚠️ DISABLE_AUTH=1 환경이라 켜져 있는 동안은 register-esm 이 무인증으로 열린다 —
              #      실등록하는 그 순간에만 켜고 **끝나면 즉시 0 으로** 되돌릴 것(재배포 시 닫힘).
              FLAG_REGISTER="${{ vars.LIVE_REGISTER_ARMED == '1' && '-e LIVE_REGISTER_ARMED=1' || '' }}"
              # --memory: 앱 컨테이너당 램 상한 — 폭주 시 그 컨테이너 안 프로세스만 죽고
              #   (gunicorn 이 워커를 자동 재기동) 서버 박스는 살아남는다. 블루그린 겹침
              #   구간(앱 2개)에도 900m×2=1.8G+스왑이라 박스 프리즈 불가.
              APP_ENVFLAGS="--memory=900m --memory-swap=1800m --env-file /home/ubuntu/app.env $EXTRA -e DISABLE_AUTH=1 -e MOUM_LIVE_INVOICE=1 $FLAG_CONFIRM $FLAG_UPLOAD $FLAG_PROBE $FLAG_URPROBE $FLAG_BFOFF $FLAG_REGISTER -v /home/ubuntu/ui_secrets:/data/secrets -e MOUM_SECRETS_ENV=/data/secrets/.env"

              # ── ② 새 앱 컨테이너를 내부 네트워크에 기동 (호스트 :80 안 씀) ──
              NEW="modeumjeon_$(date +%s)"
              sudo docker run -d --name "$NEW" --restart unless-stopped --network web $APP_ENVFLAGS modeumjeon \
                || { echo "[deploy] ❌ 새 컨테이너 run 실패 — 기존 유지, 전환 안 함"; exit 1; }

              # 실행 컨테이너 코드 검증 (api_pricing 빈색 매칭 fix 마커)
              if [ "$(sudo docker exec "$NEW" sh -c "grep -c \"has_color and oc\" /app/webapp/routes/api_pricing.py 2>/dev/null || echo 0")" = "0" ]; then
                echo "[deploy] ❌ 새 컨테이너에 최신 코드 없음(빌드/캐시 실패) — 폐기, 기존 유지"; sudo docker rm -f "$NEW"; exit 1
              fi

              # ── 내부 헬스체크: 새 컨테이너가 스스로 응답하는지 (전환 전에 확인) ──
              HEALTHY=0
              for i in $(seq 1 20); do
                if sudo docker exec "$NEW" python -c "import urllib.request,sys; urllib.request.urlopen(\"http://127.0.0.1:8080/health\", timeout=5); sys.exit(0)" >/dev/null 2>&1; then HEALTHY=1; break; fi
                echo "[deploy] 새 컨테이너 기동 대기... ($i/20)"; sleep 3
              done
              if [ "$HEALTHY" != "1" ]; then
                echo "[deploy] ❌ 새 컨테이너 헬스체크 실패 — 폐기, 기존 유지(전환 안 함)"; sudo docker rm -f "$NEW"; exit 1
              fi
              echo "[deploy] ✅ 새 컨테이너 정상 확인: $NEW"

              # ── ③ Caddy 전환 ──────────────────────────────────────────────
              if sudo docker ps --format "{{.Names}}" | grep -qx caddy; then
                # 정상 운영: Caddy 가 이미 :80 앞단 → 새 컨테이너로 graceful reload(무중단)
                OLD="$(sudo docker ps --format "{{.Names}}" | grep -E "^modeumjeon(_[0-9]+)?$" | grep -vx "$NEW" | head -1)"
                printf ":80 {\n    reverse_proxy %s:8080 {\n        lb_try_duration 10s\n    }\n}\n" "$NEW" | sudo tee /home/ubuntu/Caddyfile >/dev/null
                if ! sudo docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile; then
                  echo "[deploy] ❌ Caddy reload 실패 — 새 컨테이너 폐기, 기존 유지"; sudo docker rm -f "$NEW"; exit 1
                fi
                # Caddy 경유 응답 확인 (옛 컨테이너 제거 전에)
                COK=0
                for i in $(seq 1 10); do
                  if curl -fsS --max-time 5 http://127.0.0.1/health >/dev/null 2>&1 || wget -q -T 5 -O /dev/null http://127.0.0.1/health >/dev/null 2>&1; then COK=1; break; fi
                  sleep 2
                done
                if [ "$COK" != "1" ]; then
                  echo "[deploy] ❌ Caddy 경유 응답 실패 — 직전 컨테이너로 되돌림"
                  if [ -n "$OLD" ]; then
                    printf ":80 {\n    reverse_proxy %s:8080 {\n        lb_try_duration 10s\n    }\n}\n" "$OLD" | sudo tee /home/ubuntu/Caddyfile >/dev/null
                    sudo docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
                  fi
                  sudo docker rm -f "$NEW"; exit 1
                fi
                echo "[deploy] ✅ 무중단 전환 완료 → $NEW"
                [ -n "$OLD" ] && { sleep 3; sudo docker rm -f "$OLD" 2>/dev/null || true; }
              else
                # 최초 전환: 지금은 옛 컨테이너 modeumjeon 이 :80 직결. Caddy 를 앞단에 세움.
                echo "[migrate] 최초 무중단 전환 — 앱을 내부로 옮기고 Caddy 를 :80 앞단에 기동"
                printf ":80 {\n    reverse_proxy %s:8080 {\n        lb_try_duration 10s\n    }\n}\n" "$NEW" | sudo tee /home/ubuntu/Caddyfile >/dev/null
                sudo docker rm -f modeumjeon 2>/dev/null || true   # :80 해제 (여기서부터 수 초 갭)
                if sudo docker run -d --name caddy --restart unless-stopped --network web \
                     -p 80:80 -v /home/ubuntu/Caddyfile:/etc/caddy/Caddyfile caddy:2-alpine; then
                  # Caddy 경유 응답 확인 — 실패하면 직결로 원복
                  COK=0
                  for i in $(seq 1 15); do
                    if curl -fsS --max-time 5 http://127.0.0.1/health >/dev/null 2>&1 || wget -q -T 5 -O /dev/null http://127.0.0.1/health >/dev/null 2>&1; then COK=1; break; fi
                    sleep 2
                  done
                  if [ "$COK" != "1" ]; then
                    echo "[migrate] ❌ Caddy 경유 실패 — 직결(:80) 방식으로 자동 원복"
                    sudo docker rm -f caddy 2>/dev/null || true
                    sudo docker rm -f "$NEW" 2>/dev/null || true
                    sudo docker run -d --name modeumjeon --restart unless-stopped -p 80:8080 $APP_ENVFLAGS modeumjeon
                    exit 1
                  fi
                  echo "[migrate] ✅ Caddy 앞단 기동 + 앱 내부화 완료 → $NEW"
                else
                  echo "[migrate] ❌ Caddy 기동 실패 — 직결(:80) 방식으로 자동 원복"
                  sudo docker rm -f "$NEW" 2>/dev/null || true
                  sudo docker run -d --name modeumjeon --restart unless-stopped -p 80:8080 $APP_ENVFLAGS modeumjeon
                  exit 1
                fi
              fi

              # ── ④ 정리: 남은 옛 앱 컨테이너 제거(현재 것·caddy 제외) + 이미지 청소 ──
              for c in $(sudo docker ps -a --format "{{.Names}}" | grep -E "^modeumjeon(_[0-9]+)?$" | grep -vx "$NEW"); do
                sudo docker rm -f "$c" 2>/dev/null || true
              done
              sudo docker image prune -f || true
              echo "[deploy] 실행 이미지: $(sudo docker inspect -f "{{.Image}}" "$NEW" 2>/dev/null)"
            '

      - name: 헬스체크 (Cloudflare→Caddy→앱, 콜드스타트 관대)
        run: |
          echo "배포 후 헬스체크..."
          sleep 8
          for i in $(seq 1 12); do
            if curl -fsS --max-time 20 "http://${{ secrets.LIGHTSAIL_HOST }}/health"; then
              echo "✅ 헬스체크 성공 (시도 $i)"; exit 0
            fi
            echo "대기 중... ($i/12)"; sleep 15
          done
          echo "❌ 헬스체크 실패"; exit 1
