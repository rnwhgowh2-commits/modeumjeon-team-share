name: 서버 진단 (no deploy)
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 키 준비
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/ls_key
          chmod 600 ~/.ssh/ls_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: 로드된 코드 fix 여부
        run: |
          ssh -i ~/.ssh/ls_key -o StrictHostKeyChecking=accept-new ubuntu@"${{ secrets.LIGHTSAIL_HOST }}" '
            echo "=== 로드된(import) _match_option_so 에 fix 있나 ==="
            sudo docker exec modeumjeon sh -c "echo  | base64 -d | python" 2>&1
            echo "=== 컨테이너 시작시각 vs 파일 수정시각 ==="
            sudo docker exec modeumjeon sh -c "stat -c %y /app/webapp/routes/api_pricing.py; ps -o lstart= -p 1 2>/dev/null | head -1"
            echo "=== __pycache__ pyc 존재? ==="
            sudo docker exec modeumjeon sh -c "ls -la /app/webapp/routes/__pycache__/ 2>/dev/null | grep -i api_pricing || echo no_pyc"
          '
