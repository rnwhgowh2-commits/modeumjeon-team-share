name: 서버 진단 (no deploy)
on: {workflow_dispatch: {}}
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 키
        run: |
          mkdir -p ~/.ssh; printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/ls_key; chmod 600 ~/.ssh/ls_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: 무신사 SP 폴루션 전수 조회
        run: ssh -i ~/.ssh/ls_key -o StrictHostKeyChecking=accept-new ubuntu@"${{ secrets.LIGHTSAIL_HOST }}" 'sudo docker exec modeumjeon sh -c "echo  | base64 -d | python" 2>&1'
