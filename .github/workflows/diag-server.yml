name: 서버 진단 (no deploy)
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 키 준비
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/ls_key
          chmod 600 ~/.ssh/ls_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: 마커 추적 + DB/env
        run: |
          M=ZZDIAG1782305160513
          ssh -i ~/.ssh/ls_key -o StrictHostKeyChecking=accept-new ubuntu@"${{ secrets.LIGHTSAIL_HOST }}" "
            echo '=== modeumjeon 로그에 마커?'; sudo docker logs modeumjeon 2>&1 | grep -c \$M || echo 0
            echo '=== margin-calc 로그에 마커?'; sudo docker logs margin-calc 2>&1 | grep -c \$M || echo 0
            echo '=== margin-tunnel 로그에 마커?'; sudo docker logs margin-tunnel 2>&1 | grep -c \$M || echo 0
            echo '=== modeumjeon 최근 access 로그 10줄 ==='; sudo docker logs --tail 10 modeumjeon 2>&1
            echo '=== modeumjeon DATABASE_URL(값숨김) ==='; sudo docker exec modeumjeon sh -c 'test -n \"\$DATABASE_URL\" && echo HAS_DBURL || echo NO_DBURL_sqlite'
            echo '=== modeumjeon DB 파일/크기 ==='; sudo docker exec modeumjeon sh -c 'ls -la /app/data/*.db 2>/dev/null || echo no_db'
            echo '=== modeumjeon options 행수 ==='; sudo docker exec modeumjeon sh -c 'python -c \"import sqlite3,glob; f=glob.glob(chr(47)+chr(97)+chr(112)+chr(112)+chr(47)+chr(100)+chr(97)+chr(116)+chr(97)+chr(47)+chr(42)+chr(46)+chr(100)+chr(98)); print(f)\"' 2>&1 | head -3
          "
