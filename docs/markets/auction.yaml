  fetch_settlement: "TODO(조사필요 — 정산 조회)"
  fetch_options: "TODO(조사필요 — 상품/옵션 상세조회)"
  update_price:  "TODO(조사필요 — 가격 수정)"
  update_stock:  "TODO(조사필요 — 재고 수정)"
  register:      "TODO(조사필요, 나중 — 상품 등록)"

option_structure:
  note: >
    ESM 응답 필드명(주문/옵션/재고/가격)은 스펙 확보 후 확정. 미상은 None 으로 표면화(0/센티넬 금지, CLAUDE.md).

fields:
  connect:
    - { name: seller_product_id, type: string, required: true, source: 사용자입력(옥션 상품번호),
        note: "상세조회로 옵션·가격·재고 자동매칭. 응답 필드명 TODO." }

response:
  success: "TODO(조사필요 — 성공 판정 필드/코드)"
  errors:
    http:
      - "401 인증 실패 (JWT 서명/마스터ID/시크릿 확인)"
      - "403 권한 없음 (판매도구 사용설정/IP)"
      - "429 호출 횟수 초과"
      - "5xx 시스템 오류"
    body: "TODO(조사필요 — 결과코드 매트릭스)"
  rate_limit:
    policy: "TODO(조사필요). 보수적 기본 5/s(ESM_RATE_LIMIT_PER_SEC)."
  retry: "권장 max_retries=3, 지수백오프."

safety:
  price_change_guard: >
    쿠팡·롯데온 선례처럼 업로드 전 sanity(확정매입가×1.05 미만 차단·마진 하한·재고≤소싱재고).
    가격/재고는 실브라우저 소싱처 URL 실값 기준(CLAUDE.md). 폴백 금지.
  notes: >
    라이브 미검증 + 엔드포인트 스펙 미확보. 실계정 100% 검증 전 '완료' 선언 금지.
    현재 배선 범위(스켈레톤) = 계정/키 등록(판매처관리)·시크릿 로더(EsmCredentials)·플랫폼 설정(AUCTION).
    미구현(스펙 선행) = JWT 클라이언트 실호출·주문/정산 조회 빌더(order_export)·가격/재고 업로드·
    formatter emit + DB 매핑컬럼. order_export.SUPPORTED 미포함(주문 엑셀에 노출 안 함 — 거짓주문 방지).

code_map:
  secrets: lemouton/auth/secrets.py                # EsmCredentials + MARKET_SCHEMAS["auction"] (구현됨)
  platform_config: shared/platforms/__init__.py    # AUCTION dict (site_id="A", JWT 메타) (구현됨)
  accounts_ui: webapp/routes/accounts.py           # MARKET_KEY_SUFFIXES/KEY_LABELS/MARKET_METADATA (구현됨)
  auth: "shared/platforms/esm/auth.py"             # JWT/HmacSHA256 서명 (스펙 확보 후)
  client: "shared/platforms/esm/client.py"         # HTTP 전송·rate limit (스펙 확보 후)
  fetch_orders: "TODO — order_export.auction_order_rows (스펙 확보 후, SUPPORTED 추가)"
