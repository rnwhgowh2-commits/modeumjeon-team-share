# docs/markets/auction.yaml — 옥션(Auction · ESM 2.0 이베이코리아) 프로파일
# 근거: ESM Trading API 공개 문서 실측(2026-07-07, 로그인 없이 판독 가능한 범위).
#   https://etapi.gmarket.com/ (ESM Trading API 홈)
#   https://etapi.gmarket.com/pages/API-가이드 (인증 = JWT/HmacSHA256 상세)
#   ESM Plus 판매도구 관리에서 사용 설정 후 발급. Site ID: 옥션 "A" / G마켓 "G".
#   STEP 0(슬러그·접두)= webapp/routes/accounts.py MARKET_METADATA["auction"], default_prefix=AUCTION_MAIN.
# ⚠️ 라이브 미검증(키없음) — 코드 근거만. 상품/가격/재고 엔드포인트는 공개문서 실측 확보(2026-07-09).
#    현재 배선 범위 = 계정/키 등록 + 인증/클라이언트 + 연동(옵션조회)·가격·재고 어댑터 + 자동전송 formatter.
#    실전송은 LEMOUTON_LIVE_UPLOAD OFF 기본. 실계정 100% 검증 전 '완료' 선언 금지(CLAUDE.md 3대 원칙).
# ⚠️ 옥션·G마켓은 같은 ESM+ 마스터 계정. master_id·secret_key 공통, seller_id·site 만 다름.

meta:
  market: auction
  display_name: 옥션
  esm_group: true            # 옥션·G마켓 통합(ESM 2.0). gmarket.yaml 과 인증 공통.
  last_analyzed: "2026-07-07"
  base_url: https://etapi.gmarket.com   # ESM Trading API 호스트(공개 문서). 확정 스펙 확보 시 갱신.
  evidence: >
    ESM Trading API 공개 문서 실측(2026-07-07): 인증=JWT, 서명=HmacSHA256(HS256).
    JWT header{alg:HS256, typ:JWT, kid:ESM+마스터ID}, payload{iss:판매도메인, sub:"sell",
    aud:"sa.esmplus.com", ssi:"{site}:{판매자ID}"} (site 옥션 "A"). secret key 로 서명.
    발급=ESM+ 로그인>판매자정보>판매도구 관리 사용설정 후 ESM Trading API.
    라이브 미검증 — 엔드포인트/응답 필드는 미확보(문서 문의 etapihelp@gmail.com).

auth:
  method: JWT (HmacSHA256 서명 · OAuth 토큰교환 아님)
  token_endpoint: null   # 발급 secret_key 로 매 요청 JWT 서명(자체 생성).
  env_keys:
    - AUCTION_MAIN_MASTER_ID    # ESM+ 마스터 ID → JWT header.kid
    - AUCTION_MAIN_SECRET_KEY   # 발급 시크릿 키 → HmacSHA256 서명(민감)
    - AUCTION_MAIN_SELLER_ID    # 옥션 판매자 ID → payload.ssi = "A:{SELLER_ID}"
  jwt_format: >
    header  = {"alg":"HS256","typ":"JWT","kid":"{MASTER_ID}"}
    payload = {"iss":"{판매도메인}","sub":"sell","aud":"sa.esmplus.com","ssi":"A:{SELLER_ID}","iat":<epoch>}
    signature = HmacSHA256(base64url(header)+"."+base64url(payload), SECRET_KEY)
  signature: HmacSHA256 (payload 서명)
  ip_allowlist: >
    ESM API IP 등록 정책 확인 필요(TODO). 서버 크롤 아님 — 업로드/조회 서버(AWS 54.116.196.90).
  key_issue_path: >
    ESM PLUS 로그인 → 판매자정보 > 판매도구 관리 > 판매도구 사용 '사용' → 판매도구 업체 선택 →
    ESM Trading API secret key 발급. 옥션·G마켓 판매자 ID + ESM 마스터 ID 준비.

# 전 엔드포인트 공개문서 확보(etapi.gmarket.com, 2026-07-09). 상품 host=sa2.esmplus.com /item/v1.
endpoints:
  fetch_orders:  "POST https://sa2.esmplus.com/shipping/v1/Order/RequestOrders (문서 /67, 구현됨)"
  fetch_settlement: "POST https://sa2.esmplus.com/account/v1/settle/getsettleorder (판매대금 정산 /41, 구현됨). 배송비=/account/v1/settle/getsettledeliveryfee /42(후속)"
  resolve_goods_no: "GET /item/v1/site-goods/{siteGoodsNo}/goods-no (사이트상품번호→goodsNo, 문서 /30, 구현됨)"
  fetch_options: "GET /item/v1/goods/{goodsNo} 상세조회(옵션 포함, 문서 /20) + /recommended-options(문서 /26). 구현=esm/products.py"
  update_price:  "PUT /item/v1/goods/{goodsNo}/price body{iac|gmkt:가격}(본품 대표가, 문서 /186, 구현=esm/prices.py). 10원 단위."
  update_stock:  "PUT /item/v1/goods/{goodsNo}/recommended-options full-replace qty(옵션 상품 /26, 구현=esm/inventory.py). 본품재고=/stock(옵션無 전용 /194)."
  register:      "POST /item/v1/goods (상품 등록, 문서 /20·/140). 필드=itemBasicInfo/itemAddtionalInfo. 후속(카테고리·고시코드 등)."

# 주문조회(RequestOrders) 요청/응답 — etapi.gmarket.com/67 실측(2026-07-07). 코드=shared/platforms/esm/orders.py
fetch_orders_spec:
  request:
    siteType: "1:옥션 2:G마켓 (옥션=1)"
    orderStatus: "1:결제완료 2:배송준비중 3:배송중 4:배송완료 5:구매결정완료 — 코드가 1~5 순회+중복제거"
    requestDateType: "1:주문일 (구현=1)"
    requestDateFromTo: '"YYYY-MM-DD hh:mm", 31일 제한 → 코드가 31일 윈도우 분할'
    paging: "pageIndex·pageSize"
    rate_limit: "주문조회 5초당 1회(client order_min_interval_sec=5)"
  response:
    envelope: "{ResultCode:0, Message, Data:{TotalCount, RequestOrders:[...]}}"
    fields: >
      OrderNo(주문번호=_shipkey)·OrderDate(주문일시)·OrderStatus(1~5)·GoodsName(상품명)·
      ItemOptionSelectList(옵션배열)·ContrAmount(수량)·SalePrice(단가)·ShippingFee(배송비)·
      ReceiverName·HpNo·TelNo(수령인)·ZipCode·DelFrontAddress·DelBackAddress(주소)·
      BuyerName·BuyerId(구매자,마스킹)·DelMemo(배송메모).
  note: >
    정산예정금액은 주문 API 에 없음 → 공란(폴백 금지). ItemOptionSelectList 하위 필드명은
    라이브 응답에서 확정(현재 방어적 결합). 미상은 None/공란(0·센티넬 금지, CLAUDE.md).

# 상품/옵션/가격/재고 스펙 — etapi.gmarket.com 실측(2026-07-09). 코드=shared/platforms/esm/{products,prices,inventory}.py
product_spec:
  detail_response: >
    goodsNo·SiteGoodsNo·itemBasicInfo.goodsName.kor·itemAddtionalInfo.price.{Gmkt|Iac}(사이트별 현재가)·
    itemAddtionalInfo.stock.{Gmkt|Iac}(본품재고)·itemAddtionalInfo.recommendedOpts.independent.details[](옵션).
  option_details_fields: >
    manageCode(판매자옵션코드=옵션ID)·recommendedOptValue(색/사이즈)·qty.{gmkt|iac}(사이트별 옵션재고)·
    addAmnt(옵션 추가금)·isSoldOut(품절). ESM 이 대소문자 혼용 → 파서 대소문자 무시.
  update:
    price: "PUT .../price {iac|gmkt:가격}. 본품(대표) 판매가. 10원 단위·양수. 옵션차등가는 recommended-options addAmnt(후속·라이브검증)."
    stock: "옵션 상품 = PUT .../recommended-options 로 details[] 전체 재전송(PATCH 없음). GET 후 대상 옵션 qty[사이트]만 바꿔 echo-back(누락 방지)."
    site_key: "옥션=iac / G마켓=gmkt."
  traps:
    - "모음전=색·사이즈 옵션 상품 → 본품 재고수정(/194)·본품가(/186)로는 옵션 재고를 못 바꿈. 옵션재고=recommended-options full-replace."
    - "실시간 가격·재고 체크(/86·/87)는 조회 API 아님(판매자 호스팅 콜백) → 연동 조회는 상세조회/옵션조회 사용."

option_structure:
  note: >
    옵션=recommendedOpts.independent.details[]. option_id=manageCode. 재고=qty[사이트].
    미상은 None 표면화(0/센티넬 금지, CLAUDE.md).

fields:
  connect:
    - { name: seller_product_id, type: string, required: true, source: 사용자입력(옥션 사이트 상품번호),
        note: "resolve_goods_no 로 goodsNo 변환 후 상세조회 → 옵션·재고 자동매칭." }

response:
  success: "상품/가격/재고 응답 resultCode 0(=성공). 주문/정산은 ResultCode 0. 대소문자 무시 파싱."
  errors:
    http:
      - "401 인증 실패 (JWT 서명/마스터ID/시크릿 확인)"
      - "403 권한 없음 (판매도구 사용설정/IP)"
      - "429 호출 횟수 초과"
      - "5xx 시스템 오류"
    body: "TODO(조사필요 — 결과코드 매트릭스)"
  rate_limit:
    policy: "TODO(조사필요). 보수적 기본 5/s(ESM_RATE_LIMIT_PER_SEC)."
  retry: "권장 max_retries=3, 지수백오프."

safety:
  price_change_guard: >
    쿠팡·롯데온 선례처럼 업로드 전 sanity(확정매입가×1.05 미만 차단·마진 하한·재고≤소싱재고).
    가격/재고는 실브라우저 소싱처 URL 실값 기준(CLAUDE.md). 폴백 금지.
  notes: >
    라이브 미검증(키없음) — 코드 근거만(엔드포인트는 공개문서 확보). 실계정 100% 검증 전 '완료' 선언 금지.
    배선 완료 = 계정/키 등록 + 인증(JWT)·클라이언트 + 연동(옵션조회 _fetch_esm)·가격(prices)·재고(inventory)
    어댑터(EsmAdapter) + 오케스트레이터 라우팅 + 자동전송 formatter(build_auction_payload) + DB 매핑컬럼
    (auction_product_id/auction_option_id) + 연결테스트(_test_esm).
    실전송 게이트 = LEMOUTON_LIVE_UPLOAD(기본 OFF, DryRunAdapter). order_export.SUPPORTED 미포함(주문 엑셀 미노출).
    남은 검증(실계정 키 후) = 옵션 응답 필드명·recommended-options PUT envelope·가격 addAmnt 차등가.

code_map:
  secrets: lemouton/auth/secrets.py                # EsmCredentials + MARKET_SCHEMAS["auction"] (구현됨)
  platform_config: shared/platforms/__init__.py    # AUCTION dict (site_id="A", paths 상품/가격/재고) (구현됨)
  accounts_ui: webapp/routes/accounts.py           # MARKET_KEY_SUFFIXES/KEY_LABELS/MARKET_METADATA (구현됨)
  connection_test: webapp/routes/accounts.py::_test_esm  # JWT 인증 read-only 주문 프로브 (구현됨)
  auth: shared/platforms/esm/auth.py               # JWT/HmacSHA256 서명 (구현됨·Bearer)
  client: shared/platforms/esm/client.py           # HTTP post/request(GET·PUT)·재시도 (구현됨)
  orders: shared/platforms/esm/orders.py           # RequestOrders 페이징·31일윈도우·중복제거 (구현됨)
  settlements: shared/platforms/esm/settlements.py  # getsettleorder → ContrNo:SettlementPrice 맵 (구현됨)
  products: shared/platforms/esm/products.py       # 상세조회·옵션추출·goodsNo 변환 (연동, 구현됨)
  prices: shared/platforms/esm/prices.py           # 본품 가격수정(사이트키) (구현됨)
  inventory: shared/platforms/esm/inventory.py     # 옵션 재고 full-replace echo-back (구현됨)
  adapter: lemouton/uploader/adapters/esm.py       # EsmAdapter("auction")·MockEsmAdapter (구현됨)
  formatter: lemouton/formatter/esm.py             # build_auction_payload (미매핑=None → 자동전송0) (구현됨)
  fetch_options: lemouton/uploader/market_fetch.py::_fetch_esm  # 기존 상품 연동(옵션 조회) (구현됨)
  fetch_orders: lemouton/markets/order_export.py::auction_order_rows  # 행 매핑+정산 조인(구현됨). 라이브 검증 후 SUPPORTED 추가
  registry: lemouton/uploader/runtime.py::select_adapters + orchestrator._extract_uploads  # auction 라우팅 (구현됨)
  db_columns: lemouton/sourcing/models.py + shared/db.py  # models.auction_product_id·options.auction_option_id (구현됨)
  tests: tests/uploader/test_esm_upload_wiring.py + test_esm_markets_wiring.py  # Mock/Fake 단위테스트 (green)
