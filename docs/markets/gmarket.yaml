safety:
  price_change_guard: >
    업로드 전 sanity(확정매입가×1.05 미만 차단·마진 하한·재고≤소싱재고). 실브라우저 소싱처 URL 실값 기준.
  notes: >
    라이브 미검증 + 엔드포인트 스펙 미확보. 실계정 100% 검증 전 '완료' 선언 금지.
    현재 배선 범위(스켈레톤) = 계정/키 등록·시크릿 로더(EsmCredentials 공용)·플랫폼 설정(GMARKET).
    order_export.SUPPORTED 미포함(주문 엑셀 미노출). 실 조회/전송은 스펙 확보+검증 후.

