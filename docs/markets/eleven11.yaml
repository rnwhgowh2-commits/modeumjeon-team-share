# docs/markets/eleven11.yaml — 11번가(11st 셀러 Open API) 프로파일
# 근거: 11번가 OPEN API CENTER 공개 개발문서 실측(2026-07-06, 로그인 없이 판독 가능한 범위).
#   https://openapi.11st.co.kr/openapi/OpenApiServiceIntroduce.tmall (서비스 소개·XML 규격)
#   https://openapi.11st.co.kr/openapi/OpenApiOperationGuide.tmall (인증·openapikey 헤더)
#   https://openapi.11st.co.kr/openapi/OpenApiFrontMain.tmall (키 발급·서비스 등록·IP 등록)
#   STEP 0(슬러그·접두)= webapp/routes/accounts.py MARKET_METADATA["eleven11"], default_prefix=ELEVEN11_MAIN.
# ⚠️ 라이브 미검증(키 없음) — 코드·공개문서 근거만. MOUM_LIVE_UPLOAD OFF, status=coming_soon 유지.
# ⚠️ 셀러 REST 엔드포인트(상품/재고/가격) 경로·요청/응답 XML 필드명은 로그인 게이트 안 → 미확보.
#    해당 값은 TODO(조사필요)로 두고, 코드는 뼈대만(실제 호출 로직 없음). 추측·폴백 금지(CLAUDE.md).

meta:
  market: eleven11
  display_name: 11번가
  last_analyzed: "2026-07-06"
  base_url: https://api.11st.co.kr   # 셀러 REST 호스트(공개 문서상). 확정 스펙 확보 시 갱신.
  evidence: >
    11번가 OPEN API CENTER 공개 문서 실측(2026-07-06):
    인증=openapikey 헤더(단일 키·시크릿/토큰교환 없음), 포맷=XML(서비스소개 "HTTP와 XML"),
    키발급/IP등록=셀러오피스 로그인 후 Open API > 서비스 등록·확인.
    일반 Open API(openapi.11st.co.kr/openapi/OpenApiService.tmall)는 상품/카테고리 '검색'만 →
    셀러 상품/재고/가격 수정은 셀러 REST API(로그인 게이트) 필요. 그 엔드포인트·XML 필드는 미확보.
    라이브 미검증(키 없음) — 코드 근거만.

auth:
  method: API Key (openapikey 헤더 · OAuth/HMAC 아님)
  token_endpoint: null   # 토큰 발급 단계 없음. 발급받은 OPENAPI KEY 를 그대로 헤더로 사용.
  env_keys:
    - ELEVEN11_MAIN_OPENAPI_KEY   # 셀러오피스 발급 OPENAPI KEY (32자). openapikey 헤더로 전달.
  header_format: >
    openapikey: {ELEVEN11_MAIN_OPENAPI_KEY}
    Accept: application/xml
    Content-Type: application/xml; charset=euc-kr   # POST/PUT XML 본문
  signature: null   # 서명 없음
  ip_allowlist: >
    API 센터에 등록된 출발지 IP 만 통과(미등록 차단). 업로드 서버(AWS 54.116.196.90 등)를
    셀러오피스 Open API 서비스 등록 화면에서 개발/상용 IP 로 등록해야 함. [[project_market_api_server_side]]
  key_issue_path: >
    11번가 셀러오피스 로그인 → 하단 [Open API] → Home > 서비스 등록·확인 > 서비스등록
    (담당업무=개발, 사용용도=주문 통합관리 등) → OPENAPI KEY 발급 + 서비스 IP 등록.

# 주문조회(발주확인) = 셀러오피스 로그인 문서 실측 확보(2026-07-07, 사용자 로그인 브라우저 판독).
#    상품/가격/재고 셀러 REST 는 아직 미확보 → TODO(추측 금지).
endpoints:
  fetch_orders:  "GET /rest/ordservices/complete/{start}/{end} (발송대기·결제완료, 구현됨) + GET /rest/ordservices/completed/{start}/{end} (구매확정, 구현됨) — 두 목록 병합"
  fetch_options: "TODO(조사필요 — 셀러 REST 상품/옵션 상세조회)"
  get_detail:    "TODO(조사필요 — 상품 상세조회)"
  # ★ 확보(콘솔 추출, 2026-07-16) — 구현됨. 성공 resultCode 정확값은 라이브(승인+IP) 확정 대상.
  fetch_stocks:  "POST /rest/prodmarketservice/prodmarket/stocks (구현됨 · 현재 옵션 재고 전체 조회 · echo-back 소스)"
  update_price:  "GET /rest/prodservices/product/price/{prdNo}/{selPrc} (구현됨 · 상품단위 · 본문없음 · 인상50%/인하80% 한도)"
  update_stock:  "POST /rest/prodservices/updateProductOption/{prdNo} (구현됨 · 옵션 full-replace · 가격+재고)"
  register:      "TODO(조사필요, 나중 — 상품 등록)"
  # 참고(미구현 — 주석 기록만):
  #   가격+즉시할인  POST /rest/prodservices/product/priceCoupon/{prdNo}
  #   상품 전체 수정 PUT  /rest/prodservices/product/{prdNo}
  #   실시간 품절옵션 GET  /rest/prodservices/getRealTimeCheckSoldOutOpt/{startDt}/{endDt}

# 재고조회(현재 옵션 읽기) — 콘솔 스펙 확보(2026-07-16). echo-back full-replace 의 소스.
fetch_stocks_spec:
  request:
    url: "POST http://api.11st.co.kr/rest/prodmarketservice/prodmarket/stocks"
    body: "prdNo(상품번호) 담은 XML(euc-kr). ⚠️ 요청 루트 엘리먼트명은 라이브 확정 대상."
    auth: "openapikey 헤더(Eleven11Client)."
  response:
    root: "ns2: <ProductStocks> 하위 <ProductStock> 반복(옵션마다 1요소)"
    fields: >
      mixOptNo(옵션번호)·mixOptNm(옵션명)·mixDtlOptNm(상세옵션명)·stckQty(재고수량)·
      prdStckStatCd(재고상태 enum)·sellerStockCd(셀러재고번호)·addPrc(옵션가격)·
      selQty(판매수량)·prdStckNo(재고번호). (productComponent/addCompPrc=추가구성 — 옵션과 분리, 무시.)
  parse: >
    ns2 프리픽스는 localname 으로 처리(프리픽스 변동 견고). 빈 응답/파싱 실패는 예외로
    표면화(조용한 0/빈 리스트 붕괴 금지). stckQty 공란=None(0 으로 날조 금지).

# ★ echo-back full-replace 흐름 (재고 안전 배선의 핵심) — 도구/수동 검증 전용.
echo_back_full_replace:
  why: >
    updateProductOption 은 옵션 full-replace 라 일부만 보내면 나머지 옵션이 삭제/초기화될 수
    있다(금전·재고 손실). 따라서 반드시 현재 옵션 '전체'를 fetch_stocks 로 읽어 그대로
    되보내되(echo-back), 바꿀 옵션의 재고만 교체한다. 옵션 소실 0 을 테스트로 못 박음.
  flow: >
    stocks_query.get_stocks(현재 옵션 전체) → inventory.build_full_replace_from_current
    (echo-back, 대상만 colCount 교체) → inventory.update_option_stocks(full-replace)
    → (판매가 있으면) prices.update_price. partial 방지 — 재고 실패 시 가격 미전송.
  field_mapping:   # 조회필드 → 수정필드
    colCount:          "stock (changes 대상이면 new_stock)"
    colSellerStockCd:  "seller_stock_cd"
    colOptPrice:       "add_prc (없으면 0)"
    colValue0:         "dtl_opt_nm (없으면 opt_nm)"
    useYn:             "'Y' 고정(보존). 품절도 colCount=0 로 표현, useYn 임의 N 전환 금지."
  mapping_uncertainty: >    # ⚠️ 라이브 라운드트립 검증 전 자동 무장 금지
    ① colValue0 가 updateProductOption 의 옵션 매칭키인지(mixDtlOptNm vs mixOptNm) 미확정 —
       잘못 매핑 시 옵션 중복/소실 위험. ② optionMappingKey 는 재고조회 응답에 없어 생략 —
       만약 update 가 매핑키를 옵션 식별에 '필수'로 요구하면 별도 상세조회 선행 필요(현재 미확보,
       colValue0 매칭 가정). ③ useYn 보존 정책도 라이브 검증 대상.
  auto_arm: >
    ⚠️⚠️ 배치(inventory.update_product_price_stock)는 select_adapters armed 경로에 연결하지 않는다.
    기본적으로 호출되지 않음(파이프라인 미배선) — 라이브 라운드트립으로 위 매핑 3종이 검증되기
    전에는 자동 무장 금지. 수동/검증 도구로만. SellerAPI 승인·서버IP 없이는 실검증 불가.
    어댑터(update_price_and_stock)는 계속 전송 보류(부분전송 방지) 유지.

# 발주확인(기간별 결제완료 목록조회) 요청/응답 — 개발가이드>주문>결제완료 실측(2026-07-07).
fetch_orders_spec:
  request:
    url: "GET https://api.11st.co.kr/rest/ordservices/complete/{startTime}/{endTime}"
    startTime_endTime: '"YYYYMMDDhhmm"(분 단위). 조회기간 최대 7일 → 코드가 7일 윈도우 분할. 최대 3,000건.'
    auth: "openapikey 헤더(Eleven11Client). 응답 XML(euc-kr)."
  response:
    root: "<ns2:orders> 하위 <ns2:order> 반복(주문 상품라인 1개 = 1 요소)"
    fields: >
      ordNo(주문번호)·ordDt(주문일시)·prdNm(상품명)·prdNo(상품번호)·ordPrdSeq(상품순번)·
      slctPrdOptNm(선택옵션)·ordQty(수량)·selPrc(판매단가)·ordAmt/ordPayAmt(주문·결제금액)·
      dlvCst/bmDlvCst(배송비/묶음배송비)·bndlDlvSeq·bndlDlvYN(묶음배송)·rcvrNm(수령자)·
      rcvrPrtblNo/rcvrTlphn(수령자 연락처)·rcvrBaseAddr+rcvrDtlsAddr(주소)·rcvrMailNo(우편)·
      ordNm/memID(구매자)·ordPrtblTel/ordTlphnNo(구매자 연락처)·ordDlvReqCont(배송요청).
  note: >
    이 엔드포인트=결제완료(발주확인·발송대기) 목록 → 주문상태 "결제완료" 고정. 정산예정금액은
    주문 API 에 없음(11번가 정산 별도) → 공란(폴백 금지). 배송비는 묶음배송이면 bmDlvCst.
    다른 상태(발송처리·완료조회)는 별도 엔드포인트(후속).

option_structure:
  option_id_field: "TODO(조사필요 — 11번가 단품/옵션 식별자. 응답 XML 필드명 미확보)"
  color_field: "TODO(조사필요)"
  size_field: "TODO(조사필요)"
  stock_field: "TODO(조사필요)"
  price_field: "TODO(조사필요)"
  status_field: "TODO(조사필요 — 판매상태(판매중/품절))"
  note: >
    11번가는 응답이 XML. 옵션/단품 구조와 필드명은 셀러 REST 문서(로그인 게이트) 확보 후 확정.
    0/센티넬로 재고·가격을 붕괴시키지 말고 미상은 None 으로 표면화(CLAUDE.md).

fields:
  connect:
    - { name: product_id, type: string, required: true, source: 사용자입력(11번가 상품번호),
        note: "상세조회로 옵션·가격·재고 읽어 자동매칭. = SetChannel.market_product_id. 응답 필드명 TODO." }
  update:
    # ★ 확보(콘솔 추출) — 구현됨(shared/platforms/eleven11/prices.py·inventory.py).
    update_price: >
      GET /rest/prodservices/product/price/{prdNo}/{selPrc} — 경로 파라미터(본문 없음).
      selPrc=새 판매가(원, 정수). 응답 <ClientMessage>: resultCode·message·productNo·
      preSelPrc(수정전가)·selPrc·prdNo. 성공=resultCode∈{200,210}(보수적, 라이브 확정 대상).
    update_stock: >
      POST /rest/prodservices/updateProductOption/{prdNo} — 옵션 full-replace(가격+재고).
      본문 <Product><ProductOption> 반복: colValue0(옵션값)·colOptPrice(옵션가 +/-)·
      colCount(재고수량)·useYn(Y/N)·colSellerStockCd(선택)·optionMappingKey(선택). 값 XML 이스케이프.
      응답 <ClientMessage> resultCode/message. 성공=resultCode∈{200,210}(보수적).
      ⚠️ 단건 옵션 전송은 다른 옵션을 날릴 수 있어 inventory.update_stock(단건)은 막힘 →
         상품 전체 옵션을 모아 update_option_stocks 로 호출(어댑터 배선은 후속).
  register: "TODO(조사필요, 나중) — 표준카테고리·상품정보제공고시·배송/반품 등 필드 방대."

step4_form:
  connect_mode:
    user_inputs:
      - 11번가 상품번호 *필수
    auto_or_display:
      - 옵션/가격/재고 = 상세조회로 읽어 표시 (스펙 확보 후 활성)
  update_mode:
    user_inputs:
      - 옵션별 재고 / (선택) 판매가
  register_mode: "TODO(나중)"

response:
  success: >
    가격·옵션수정 응답 <ClientMessage> 의 resultCode 로 판정. 성공=resultCode∈{200,210}
    (상품등록 선례 기반 보수적 기본). HTTP 2xx 만으로 성공 판정 금지(거짓 성공 방지).
    ⚠️ 정확한 성공 코드값은 라이브(SellerAPI 승인+서버IP)에서 확정 — 확정 시 SUCCESS_CODES 갱신.
  errors:
    http:
      - "401 등록되지 않은 OpenAPI Key (키 확인)"
      - "403 접근 거부 (출발지 IP 미등록)"
      - "429 호출 횟수 초과"
      - "5xx 시스템 오류"
    body: "TODO(조사필요 — XML 결과코드 매트릭스)"
  rate_limit:
    policy: "TODO(조사필요 — 문서상 호출 상한). 보수적 기본 5/s 로 클라이언트 설정."
  retry: "권장 max_retries=3, 지수백오프 (롯데온·쿠팡 어댑터 선례 준용)."

safety:
  draft_on_register: "TODO — 등록 착수 시 확인. 현재 등록 미구현."
  price_change_guard: >
    쿠팡·롯데온 선례처럼 업로드 전 sanity(확정매입가×1.05 미만 차단·마진 하한·재고≤소싱재고).
    가격/재고는 실브라우저 소싱처 URL 실값 기준(CLAUDE.md). 폴백 금지.
  notes: >
    라이브 미검증(키없음) + 셀러 REST 스펙 미확보. 실계정 100% 검증 전 '완료' 선언 금지.
    현재 배선 범위 = 계정/키 등록·시크릿 로더·dispatcher client·어댑터(가격→재고 순서·Mock)·
    market_fetch 조회 분기·runtime 드라이런/실전송 레지스터·orchestrator 라우팅.
    미구현(스펙/DB 선행) = products/prices/inventory 실호출(XML 필드), formatter 자동전송 emit +
    DB 매핑컬럼(eleven11_product_id/option_id) — 신규등록·모델매핑 단계(나중).

