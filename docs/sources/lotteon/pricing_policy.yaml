---
# 롯데ON 매입가 정책 (memory ⑥ 롯데온)

site: lotteon
schema_version: 0.1
last_updated: 2026-05-17

# ────────────────────────────────────────
# 혜택 1개 (사용자 명세 — 단순)
# ────────────────────────────────────────
benefit_items:
  - name: 카드즉시할인 / 장바구니쿠폰
    category: "%할인"
    value: 변동                                          # 상품별 X% (XXX원)
    auto: false                                          # ★ 자동 적용 아님
    crawled: true
    extraction: |
      favorBox/benefits.discountGroups[]
        where title == "카드즉시할인/장바구니쿠폰" (groupId=ORDER)
      → discountApplyPromotionList[]
        where prKndCd in ('CRD_IMMD', 'CPN_BSK_CPN')
      각 항목 dcRt (%) + dcAmt (원) + dispTitle/dispName + mainFlag + minPdAmt/maxPdAmt
    behavior: "조건부 적용 — 조건 미충족 시 표시만 (예: 주문금액 부족 등)"

# ────────────────────────────────────────
# ★ 조건부 적용 — 핵심 룰 (사용자 명세)
# ────────────────────────────────────────
conditional_rules:
  condition_fields:
    - minPdAmt: 최소 주문금액
    - maxPdAmt: 최대 주문금액
    - mainFlag: 조건 비트
  condition_check: "주문금액 (sale_price 또는 수량 변경 후 가격) 이 minPdAmt 이상이고 maxPdAmt 이하여야 적용"
  if_unmet:
    display: true                                        # 사용자에게 표시
    apply: false                                         # 매입가 산정에는 미적용
    reason: "사용자 명세 — '쿠폰의 사용조건(주문금액부족 등) 추출. 조건 미충족 시 표시만 하고 적용 안 함'"

# ────────────────────────────────────────
# 다른 그룹 (사용자 명세 외 — 매입가 미반영)
# ────────────────────────────────────────
excluded_groups:
  - groupId: IMMD
    title: 스토어즉시할인
    reason: 자동 적용이지만 사용자 명세 외 항목
  - groupId: IMMD_AND_PRODUCT_COUPON
    title: "스토어즉시할인+상품쿠폰"
    reason: 사용자 명세 외
  - groupId: STORE_COUPON
    title: 스토어쿠폰
    reason: 사용자 명세 외

# ────────────────────────────────────────
# 계산 순서
# ────────────────────────────────────────
formula_order:
  step_1: "정액 (해당 없음)"
  step_2: "%적립금 (해당 없음)"
  step_3: "%할인 (카드즉시할인 / 장바구니쿠폰, 조건 충족 시만)"

# ────────────────────────────────────────
# 산식 예시
# ────────────────────────────────────────
formula_example_with_coupon:
  scenario: "sale_price 100,000원, 카드즉시할인 5% (조건: 50,000원 이상 충족)"
  step_3: "100,000 × 0.95 = 95,000원"
  result: "매입가 = 95,000원"

formula_example_condition_unmet:
  scenario: "sale_price 30,000원, 카드즉시할인 5% (조건: 50,000원 이상 미충족)"
  display: "쿠폰 표시 ✓ (사용자에게 안내)"
  step_3: "조건 미충족 — 차감 안 함"
  result: "매입가 = 30,000원"

# ────────────────────────────────────────
# 롯데홈쇼핑 vs 롯데온 차이
# ────────────────────────────────────────
diff_from_lotteimall:
  data_source: "lotteimall=SSR HTML / lotteon=pbf API (Playwright 캡처)"
  benefits: "lotteimall=카드 청구할인 + L.POINT 2개 / lotteon=카드즉시할인/장바구니쿠폰 1개"
  policy: "lotteimall=자동 (max_price 에 반영) / lotteon=조건부 (조건 미충족 시 미적용)"
  review_reward: "둘 다 없음 (memory 명시)"
