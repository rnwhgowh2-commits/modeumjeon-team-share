      notes: "★ 이중차감 방지 룰 핵심 검증 — bestAmt=49,000-4,900-4,410=39,690. already_applied=True → 매트릭스 추가 차감 X"
      verified_on: 2026-05-17
    - item_id: 1000644956258
      name: 여성 나이키 카고 팬츠 HM6977-297
      url: "https://www.ssg.com/item/itemView.ssg?itemId=1000644956258&siteNo=6009&salestrNo=1004"
      sale_price: 60605
      options_count: 4
      ssg_money_pattern: E_charge_payment_fallback
      ssg_money_already_applied: false
      verified_on: 2026-05-17
    - item_id: 1000631699134
      name: DBBE5E722W3 닥스 비조벨트
      url: "https://www.ssg.com/item/itemView.ssg?itemId=1000631699134&siteNo=6009&salestrNo=1004"
      sale_price: 107355
      options_count: 1
      ssg_money_pattern: E_charge_payment_fallback
      card_benefit_price: 98767
      card_benefit_condition: "5만원 이상 결제 시 98,767원"
      product_coupon_rate: 0.12
      product_coupon_min_order: 30000
