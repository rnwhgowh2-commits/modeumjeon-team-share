      verified_on: 2026-05-17
  last_verified: 2026-05-17
  match_rate: 100                                          # 4/4 정상 (모든 패턴 검증)
  verification_strategy:
    primary: "curl_cffi (운영 SsgCrawler 기본)"
    fallback_for_429: "docs/sources/ssg/_demo_via_playwright.py — 영구 프로필 우회 (ssg_ditodalal_pw)"
    why: "오늘 검증 시 사용자 active work 와 IP 단위 rate limit 충돌 → Playwright 우회로 4 패턴 모두 검증 완료"

meta:
  schema_version: 0.1
  last_analyzed: 2026-05-17
  analyzed_by: claude+rnwhgowh2
  source_code:
    - _시스템/lemouton/sourcing/crawlers/ssg.py
  origin: "2026-05-14 신규. 2026-05-15 SSG MONEY 4 패턴 + 매입가 반영 + 중복 방지"
  user_active_work_warning: "★ 사용자가 _시스템/scripts/_ssg_*.py 9개 untracked 파일로 active work 중. 본 yaml 은 docs 만 — 코드 안 건드림. 충돌 없음"
